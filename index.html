<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống bài tập</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .btn-test { display: flex; align-items: center; justify-content: center; padding: 20px; background-color: #4361ee; color: white; text-decoration: none; border-radius: 8px; font-size: 18px; font-weight: bold; text-align: center; transition: transform 0.2s, background-color 0.2s; box-shadow: 0 4px 6px rgba(67, 97, 238, 0.2); }
        .btn-test:hover { background-color: #3f37c9; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Chọn bài tập để bắt đầu</h1>
        <div class="grid">
            <a href="READING + LISTENING PRACTICE.html" class="btn-test" target="_blank">READING + LISTENING PRACTICE</a>
            
        </div>
    </div>
</body>
</html>
