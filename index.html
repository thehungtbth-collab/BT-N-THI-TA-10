=\\\"true\\\" ondragstart=\\\"dragWord(event, this.id, 'entertainment')\\\">entertainment</div><div id=\\\"dd-opt-4-3\\\" class=\\\"dd-word\\\" draggable=\\\"true\\\" ondragstart=\\\"dragWord(event, this.id, 'popular')\\\">popular</div><div id=\\\"dd-opt-4-4\\\" class=\\\"dd-word\\\" draggable=\\\"true\\\" ondragstart=\\\"dragWord(event, this.id, 'promote')\\\">promote</div></div>\\n                            </div>\\n                        </div>\\n                        <button class=\\\"action-btn btn-primary\\\" style=\\\"margin-top:15px\\\" onclick=\\\"checkDragDrop('4')\\\">Check Answers</button>\\n                    </div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Read the following passage and mark the letter A, B, C, or D on your answer sheet to indicate the correct word that best fits each of the numbered blanks.</h3><div class=\\\"gap-fill-text\\\">The Great Pyramid of Giza, one of the world's wonders, has captivated humanity for  <span class=\\\"gap-btn\\\" id=\\\"gap-5-31\\\" onclick=\\\"showGapOptions(event, '5', '31')\\\">(31)</span> . Rising proudly from Egypt's sands, it showcases the  <span class=\\\"gap-btn\\\" id=\\\"gap-5-32\\\" onclick=\\\"showGapOptions(event, '5', '32')\\\">(32)</span>  of ancient architecture. Created as Pharaoh Khufu's tomb, its construction puzzles experts. Precisely aligned and built from  <span class=\\\"gap-btn\\\" id=\\\"gap-5-33\\\" onclick=\\\"showGapOptions(event, '5', '33')\\\">(33)</span>  massive limestone blocks, its secrets remain debated, from ramps to math techniques.<br>The grandeur of the pyramid  <span class=\\\"gap-btn\\\" id=\\\"gap-5-34\\\" onclick=\\\"showGapOptions(event, '5', '34')\\\">(34)</span>  everyone’s breath away. Once nearly 480 feet tall, it comprises 2.3 million limestone blocks. Beyond size, the pyramid holds cultural value. It's not just a tomb; it symbolizes the pharaoh's might and divine link. Its precision highlights ancient Egypt's grasp of astronomy and geometry.  <span class=\\\"gap-btn\\\" id=\\\"gap-5-35\\\" onclick=\\\"showGapOptions(event, '5', '35')\\\">(35)</span> , The Great Pyramid of Giza stands as a mesmerizing puzzle and a testament to human skill, echoing the achievements of our past<br></div></div><div class=\\\"section-box\\\">\\n                    <div class=\\\"section-header\\\">\\n                        <h3 class=\\\"section-title\\\">Read the following passage and mark the letter A, B, C, or D on your answer sheet to indicate the correct answer to each of the questions.</h3>\\n                        <button class=\\\"fullscreen-btn\\\" onclick=\\\"toggleFullScreenReading(this)\\\">⛶ Full Screen</button>\\n                    </div>\\n                    <div class=\\\"reading-container\\\" id=\\\"reading-6\\\"><div class=\\\"reading-left\\\">Vietnam, a country <b>steeped in</b> history and culture, has undergone remarkable transformations over the years. Once scarred by war, the nation now stands as a thriving example of resilience and development. In the past, Vietnam was torn by conflict, particularly during the Vietnam War. The war left a lasting impact on the country, affecting its economy and infrastructure. However, Vietnam's post-war period marked a turning point. The government embraced economic reforms, transitioning from a centrally planned economy to a market-oriented one. This shift led to rapid economic growth, attracting foreign investment and boosting international trade.<br><br>Today, Vietnam's landscape is a blend of ancient traditions and modern advancements. Bustling cities like Ho Chi Minh City and Hanoi boast skyscrapers, vibrant markets, and buzzing nightlife. The countryside remains picturesque, with terraced rice fields and traditional villages showcasing the nation's agricultural roots. Tourism plays a significant role in Vietnam's contemporary identity. The country's rich heritage, including its UNESCO World Heritage Sites, draws millions of visitors annually. From the stunning limestone karsts of Ha Long Bay to the ancient town of Hoi An, Vietnam offers a diverse range of experiences. And that the government is also trying to keep these proud heritages while developing the economy.<br><br>In essence, Vietnam's journey from a war-torn past to a thriving present highlights <b>its</b> determination and adaptability. The nation continues to evolve, embracing its history while striving for progress on the global stage.<br><br></div><div class=\\\"reading-right\\\"><div class=\\\"mcq-question\\\"><b>Question 36.</b> Which can be the best title for the passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '36', 'A')\\\"> A. Vietnam's Remarkable Journey</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '36', 'B')\\\"> B. Vietnam's Economic Transformation</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '36', 'C')\\\"> C. Vietnam's Cultural Heritage</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '36', 'D')\\\"> D. Vietnam's Tourism Industry</label></div><div id=\\\"res-6-36\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 37.</b> Which of the following statements is supported by the passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '37', 'A')\\\"> A. Vietnam's economy is still heavily reliant on agriculture.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '37', 'B')\\\"> B. Vietnam's tourism industry is focused on its natural beauty.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '37', 'C')\\\"> C. Vietnam's government is committed to preserving its cultural heritage.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '37', 'D')\\\"> D. Vietnam's economic growth has been driven by foreign investment.</label></div><div id=\\\"res-6-37\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 38.</b> The phrase \\\"steeped in” in the first sentence is closest in meaning to ________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '38', 'A')\\\"> A. inclined to</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '38', 'B')\\\"> B. surrounded by</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '38', 'C')\\\"> C. influenced by</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '38', 'D')\\\"> D. saturated with</label></div><div id=\\\"res-6-38\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 39.</b> The word \\\"its” in the last paragraph refers to __________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '39', 'A')\\\"> A. Vietnam's journey’s</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '39', 'B')\\\"> B. war-torn past’s</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '39', 'C')\\\"> C. Vietnam’s</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '39', 'D')\\\"> D. thriving present's</label></div><div id=\\\"res-6-39\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 40.</b> It can be inferred from the passage that __________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '40', 'A')\\\"> A. Vietnam's ancient traditions have been replaced by modern advancements.</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '40', 'B')\\\"> B. Tourism in Vietnam is primarily focused on modern cities.</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '40', 'C')\\\"> C. Vietnam's economy is still recovering gradually from the Vietnam War.</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '40', 'D')\\\"> D. Despite rapid development, Vietnam still proudly embraces its identity.</label></div><div id=\\\"res-6-40\\\" style=\\\"margin-top:5px\\\"></div></div></div></div></div>\\n                    <div class=\\\"section-box\\\">\\n                        <h3 class=\\\"section-title\\\">Rewrite each of the following sentences beginning as shown, so that the meaning stay the same.</h3>\\n                        <div class=\\\"writing-container\\\">\\n                <div class=\\\"writing-item\\\" data-qid=\\\"41\\\">\\n                    <div class=\\\"writing-q\\\">41. The children are excited about seeing you again.</div>\\n                    <div class=\\\"writing-input-wrapper\\\">\\n                        <span class=\\\"writing-prefix\\\">The children are looking</span>\\n                        <input type=\\\"text\\\" class=\\\"writing-input\\\" id=\\\"wr-7-41\\\" data-sec=\\\"7\\\" data-qid=\\\"41\\\" autocomplete=\\\"off\\\" placeholder=\\\"Gõ tiếp câu trả lời...\\\">\\n                    </div>\\n                </div>\\n            \\n                <div class=\\\"writing-item\\\" data-qid=\\\"42\\\">\\n                    <div class=\\\"writing-q\\\">42. Nobody has answered my questions properly.</div>\\n                    <div class=\\\"writing-input-wrapper\\\">\\n                        <span class=\\\"writing-prefix\\\">My questions</span>\\n                        <input type=\\\"text\\\" v>\\n            \\n                <div class=\\\"writing-item\\\" data-qid=\\\"46\\\">\\n                    <div class=\\\"writing-q\\\">46. If you work hard, you will find it easy to get good marks. <span class=\\\"writing-hint\\\">(EASIER)</span></div>\\n                    <div class=\\\"writing-input-wrapper\\\">\\n                        <span class=\\\"writing-prefix\\\">The</span>\\n                        <input type=\\\"text\\\" class=\\\"writing-input\\\" id=\\\"wr-7-46\\\" data-sec=\\\"7\\\" data-qid=\\\"46\\\" autocomplete=\\\"off\\\" placeholder=\\\"Gõ tiếp câu trả lời...\\\">\\n                    </div>\\n                </div>\\n            \\n                <div class=\\\"writing-item\\\" data-qid=\\\"47\\\">\\n                    <div class=\\\"writing-q\\\">47. Because Tom is very lazy, he can’t get good marks at school. <span class=\\\"writing-hint\\\">(SO)</span></div>\\n                    <div class=\\\"writing-input-wrapper\\\">\\n                        <span class=\\\"writing-prefix\\\">Tom is very lazy,</span>\\n                        <input type=\\\"text\\\" class=\\\"writing-input\\\" id=\\\"wr-7-47\\\" data-sec=\\\"7\\\" data-qid=\\\"47\\\" autocomplete=\\\"off\\\" placeholder=\\\"Gõ tiếp câu trả lời...\\\">\\n                    </div>\\n                </div>\\n            \\n                <div class=\\\"writing-item\\\" data-qid=\\\"48\\\">\\n                    <div class=\\\"writing-q\\\">48. Michael loves to play football after school. <span class=\\\"writing-hint\\\">(OF)</span></div>\\n                    <div class=\\\"writing-input-wrapper\\\">\\n                        <span class=\\\"writing-prefix\\\">Michael</span>\\n                        <input type=\\\"text\\\" class=\\\"writing-input\\\" id=\\\"wr-7-48\\\" data-sec=\\\"7\\\" data-qid=\\\"48\\\" autocomplete=\\\"off\\\" placeholder=\\\"Gõ tiếp câu trả lời...\\\">\\n                    </div>\\n                </div>\\n            \\n                <div class=\\\"writing-item\\\" data-qid=\\\"49\\\">\\n                    <div class=\\\"writing-q\\\">49. My sister started working as an English teacher ten years ago. <span class=\\\"writing-hint\\\">(WORKED)</span></div>\\n                    <div class=\\\"writing-input-wrapper\\\">\\n                        <span class=\\\"writing-prefix\\\">My sister</span>\\n                        <input type=\\\"text\\\" class=\\\"writing-input\\\" id=\\\"wr-7-49\\\" data-sec=\\\"7\\\" data-qid=\\\"49\\\" autocomplete=\\\"off\\\" placeholder=\\\"Gõ tiếp câu trả lời...\\\">\\n                    </div>\\n                </div>\\n            \\n                <div class=\\\"writing-item\\\" data-qid=\\\"50\\\">\\n                    <div class=\\\"writing-q\\\">50. Mary is the most excellent in her class. <span class=\\\"writing-hint\\\">(ONE)</span></div>\\n                    <div class=\\\"writing-input-wrapper\\\">\\n                        <span class=\\\"writing-prefix\\\">No one</span>\\n                        <input type=\\\"text\\\" class=\\\"writing-input\\\" id=\\\"wr-7-50\\\" data-sec=\\\"7\\\" data-qid=\\\"50\\\" autocomplete=\\\"off\\\" placeholder=\\\"Gõ tiếp câu trả lời...\\\">\\n                    </div>\\n                </div>\\n            </div>\\n                        <button class=\\\"action-btn btn-primary\\\" style=\\\"margin-top:15px\\\" onclick=\\\"checkWriting('7')\\\">Check Answers</button>\\n                    </div>\"}; const allKeys = DATA.keys; \n\n        function showGapOptions(e, secId, id) { \n            const p = document.getElementById('gap-popover'); \n            const uniqueKey = secId + '-' + id; \n            const o = DATA.gapOptions[uniqueKey]; \n            if(!o) return;\n            let h = \"\"; \n            for(let k in o) h += '<span class=\"popover-option\" onclick=\"selectGap(\\''+secId+'\\', \\''+id+'\\', \\''+k+'\\', \\''+o[k].replace(/'/g, \"\\\\'\")+'\\')\"><b>'+k+'.</b> '+o[k]+'</span>'; \n            p.innerHTML = h; p.style.display = 'block'; p.style.left = e.pageX + 'px'; p.style.top = (e.pageY + 20) + 'px'; \n            setTimeout(() => { document.addEventListener('click', function close(ev) { if (!p.contains(ev.target) && ev.target !== e.target) { p.style.display = 'none'; document.removeEventListener('click', close); } }); }, 0); \n        } \n\n        function selectGap(secId, qId, key, text) { \n            const btn = document.getElementById('gap-'+secId+'-'+qId); \n            if(!btn) return;\n            btn.innerText = text; btn.classList.add('filled'); \n            document.getElementById('gap-popover').style.display = 'none'; \n            \n            const fullKey = secId + '-' + qId;\n            if(allKeys[fullKey]) { \n                btn.style.borderColor = (key === allKeys[fullKey]) ? \"#22c55e\" : \"#ef4444\"; \n                btn.classList.remove('correct', 'wrong'); \n                if(key === allKeys[fullKey]) btn.classList.add('correct'); else btn.classList.add('wrong'); \n            } \n        } \n\n        function checkWordForm() { \n            const inputs = document.querySelectorAll('.word-form-input'); \n            inputs.forEach(inp => { \n                const parts = inp.id.split('-');\n                const fullKey = parts[1] + '-' + parts[2];\n                const userVal = inp.value.trim().toLowerCase(); \n                const correctKey = allKeys[fullKey] ? String(allKeys[fullKey]).trim().toLowerCase() : \"\"; \n                inp.classList.remove('correct', 'wrong'); \n                const parent = inp.parentNode; \n                const oldCorr = parent.querySelector('.correction-text'); \n                if(oldCorr) oldCorr.remove(); \n                if (!correctKey) return; \n                if (userVal === correctKey) { inp.classList.add('correct'); } \n                else { inp.classList.add('wrong'); const span = document.createElement('span'); span.className = 'correction-text'; span.innerHTML = '✓ ' + allKeys[fullKey]; if(inp.nextSibling) { parent.insertBefore(span, inp.nextSibling); } else { parent.appendChild(span); } } \n            }); \n        }\n\n// --- DRAG AND DROP LOGIC ---\n    window.dragWord = function(ev, elId, word) {\n        ev.dataTransfer.setData(\"text/plain\", word);\n        ev.dataTransfer.setData(\"source-id\", elId); // Lưu thêm ID của từ bị kéo\n        ev.target.style.opacity = '0.5';\n        setTimeout(function() { ev.target.style.opacity = '1'; }, 100);\n    }\n\n    window.allowDrop = function(ev) {\n        ev.preventDefault(); \n    }\n\n    window.dropWord = function(ev, el) {\n        ev.preventDefault();\n        let word = ev.dataTransfer.getData(\"text/plain\");\n        let sourceId = ev.dataTransfer.getData(\"source-id\");\n        \n        if(word && sourceId) {\n            let blank = el.querySelector('.dd-blank');\n            \n            // Nếu chỗ trống đã có từ trước đó, ta phải hiện lại từ cũ lên danh sách\n            if(blank.getAttribute('data-source-id')) {\n                let oldOpt = document.getElementById(blank.getAttribute('data-source-id'));\n                if(oldOpt) oldOpt.style.display = 'inline-block';\n            }\n            \n            // Điền từ mới vào chỗ trống\n            blank.innerText = word;\n            blank.setAttribute('data-source-id', sourceId); // Nhớ ID của từ để sau này còn khôi phục\n            blank.classList.add('filled');\n            blank.classList.remove('correct', 'wrong'); \n            \n            let oldCorr = el.querySelector('.correction-text');\n            if(oldCorr) oldCorr.remove();\n            \n            // Ẩn từ vừa kéo đi khỏi danh sách\n            let newOpt = document.getElementById(sourceId);\n            if(newOpt) newOpt.style.display = 'none';\n        }\n    }\n    \n    window.clearDrop = function(el) {\n        if(document.body.getAttribute('data-is-graded') === 'true') return; \n        \n        // Hiện lại từ trên danh sách\n        let sourceId = el.getAttribute('data-source-id');\n        if(sourceId) {\n            let oldOpt = document.getElementById(sourceId);\n            if(oldOpt) oldOpt.style.display = 'inline-block';\n        }\n        \n        // Xóa chỗ trống\n        el.innerText = \"\";\n        el.removeAttribute('data-source-id');\n        el.classList.remove('filled', 'correct', 'wrong');\n        let oldCorr = el.parentNode.querySelector('.correction-text');\n        if(oldCorr) oldCorr.remove();\n    }\n\n    window.checkDragDrop = function(secId) {\n        const dropzones = document.querySelectorAll('.dd-dropzone[data-sec=\"' + secId + '\"]');\n        \n        dropzones.forEach(function(dz) {\n            const qId = dz.getAttribute('data-qid');\n            const fullKey = secId + '-' + qId;\n            const blank = dz.querySelector('.dd-blank');\n            \n            const userVal = blank.innerText.trim().toLowerCase();\n            const correctKey = allKeys[fullKey] ? String(allKeys[fullKey]).trim().toLowerCase() : \"\";\n            \n            let oldCorr = dz.querySelector('.correction-text');\n            if(oldCorr) oldCorr.remove();\n            \n            if(!correctKey) return; \n\n            if(userVal === correctKey) {\n                blank.classList.add('correct');\n            } else {\n                blank.classList.add('wrong');\n                const span = document.createElement('span');\n                span.className = 'correction-text';\n                span.innerHTML = '✓ ' + allKeys[fullKey]; \n                dz.appendChild(span);\n            }\n        });\n    }\n        window.checkWriting = function(secId) {\n            // Đã sửa lại lỗi backtick thành cộng chuỗi thông thường\n            const inputs = document.querySelectorAll('.writing-input[data-sec=\"' + secId + '\"]');\n            \n            inputs.forEach(function(inp) {\n                const qId = inp.getAttribute('data-qid');\n                const fullKey = secId + '-' + qId;\n                \n                let correctKeyRaw = allKeys[fullKey] ? String(allKeys[fullKey]) : \"\";\n                if (!correctKeyRaw) return;\n                \n                const parent = inp.closest('.writing-item');\n                const prefixEl = parent.querySelector('.writing-prefix');\n                const prefixText = prefixEl ? prefixEl.innerText.trim().toLowerCase() : \"\";\n                \n                // Xử lý chuỗi của học sinh: lower case, xóa khoảng trắng thừa, xóa dấu chấm/phẩy ở cuối câu\n                let normUser = inp.value.toLowerCase().replace(/s+/g, ' ').replace(/[.,!?]$/, '').trim();\n                // Xử lý chuỗi của Key\n                let normKey = correctKeyRaw.toLowerCase().replace(/s+/g, ' ').replace(/[.,!?]$/, '').trim();\n                \n                // Thuật toán so khớp\n                if (prefixText) {\n                    if (normUser.indexOf(prefixText) === 0) {\n                        normUser = normUser.substring(prefixText.length).trim();\n                    }\n                    if (normKey.indexOf(prefixText) === 0) {\n                        normKey = normKey.substring(prefixText.length).trim();\n                    }\n                }\n\n                inp.classList.remove('correct', 'wrong');\n                let oldCorr = parent.querySelector('.writing-correction');\n                if (oldCorr) oldCorr.remove();\n\n                if (normUser === normKey) {\n                    inp.classList.add('correct');\n                } else {\n                    inp.classList.add('wrong');\n                    const div = document.createElement('div');\n                    div.className = 'writing-correction';\n                    div.innerHTML = '✓ Key: ' + allKeys[fullKey];\n                    parent.appendChild(div);\n                }\n            });\n        }\n    }\n\t\t\n\t\tfunction checkMCQ(secId, qId, selected) { \n            const resDiv = document.getElementById('res-'+secId+'-'+qId);\n            const fullKey = secId + '-' + qId;\n            resDiv.innerHTML = (allKeys[fullKey] && selected === allKeys[fullKey]) ? '<span style=\"color:#22c55e\">✓ Correct</span>' : '<span style=\"color:#ef4444\">✗ Incorrect</span>'; \n        }\n\n        // SAVE RESULT LOGIC\n        window.saveResult = () => {\n            document.querySelectorAll('input[type=\"text\"]').forEach(el => el.setAttribute('value', el.value));\n            document.querySelectorAll('input[type=\"checkbox\"], input[type=\"radio\"]').forEach(el => {\n                if(el.checked) el.setAttribute('checked', 'checked');\n                else el.removeAttribute('checked');\n            });\n            \n            document.body.setAttribute('data-is-graded', 'true');\n            \n            const htmlContent = '<!DOCTYPE html>\\n<html lang=\"vi\">' + document.documentElement.innerHTML + '</html>';\n            const blob = new Blob([htmlContent], {type: 'text/html;charset=utf-8'});\n            const a = document.createElement('a');\n            a.href = URL.createObjectURL(blob);\n            a.download = 'Graded_English_Practice.html';\n            document.body.appendChild(a);\n            a.click();\n            document.body.removeChild(a);\n            \n            document.body.removeAttribute('data-is-graded');\n        };\n\n        // HIGHLIGHT AND NOTE LOGIC\n        const hlToolbar = document.getElementById('hl-toolbar');\n        let currentRange = null;\n        document.addEventListener('mouseup', (e) => {\n            if(e.target.closest('#hl-toolbar')) return;\n            if(e.target.closest('#vocab-game-overlay')) return;\n            setTimeout(() => {\n                const sel = window.getSelection();\n                if(sel.toString().trim().length > 0) {\n                    const range = sel.getRangeAt(0);\n                    const parent = range.commonAncestorContainer.parentElement;\n                    if(parent.closest('.section-box') || parent.closest('.reading-container') || parent.closest('.gap-fill-text')) {\n                        currentRange = range;\n                        const rect = range.getBoundingClientRect();\n                        hlToolbar.style.display = 'flex'; \n                        hlToolbar.style.top = (rect.top + window.scrollY - 40) + 'px'; \n                        hlToolbar.style.left = (rect.left + (rect.width/2)) + 'px';\n                        return;\n                    }\n                }\n                hlToolbar.style.display = 'none';\n            }, 10);\n        });\n\n        window.applyHighlight = (e) => {\n            e.preventDefault(); e.stopPropagation();\n            if(currentRange) {\n                const span = document.createElement('span'); span.className = 'user-highlight'; span.setAttribute('onclick', 'removeHighlight(this, event)');\n                try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection quá phức tạp, vui lòng bôi đen gọn hơn.'); }\n                hlToolbar.style.display = 'none';\n            }\n        };\n\n        window.applyNote = (e) => {\n            e.preventDefault(); e.stopPropagation();\n            if(currentRange) {\n                const noteText = prompt('Nhập ghi chú của bạn:');\n                if(noteText) {\n                    const span = document.createElement('span'); \n                    span.className = 'user-highlight has-note'; \n                    span.setAttribute('onclick', 'removeHighlight(this, event)');\n                    span.title = noteText;\n                    try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection quá phức tạp, vui lòng bôi đen gọn hơn.'); }\n                }\n                hlToolbar.style.display = 'none';\n            }\n        };\n\n        window.removeHighlight = (el, e) => { \n            e.stopPropagation(); \n            if(el.classList.contains('has-note') && !confirm('Xóa ghi chú này?')) return;\n            const txt = document.createTextNode(el.innerText); \n            el.parentNode.replaceChild(txt, el); \n            hlToolbar.style.display = 'none'; \n        };\n\n        let dragSrcEl = null; \n        function addDragEvents() { \n            document.querySelectorAll('.sortable-item').forEach(item => { \n                item.addEventListener('dragstart', function(e) { dragSrcEl = this; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/html', this.innerHTML); }); \n                item.addEventListener('dragover', function(e) { if (e.preventDefault) e.preventDefault(); return false; }); \n                item.addEventListener('drop', function(e) { if (e.stopPropagation) e.stopPropagation(); if (dragSrcEl !== this) { const srcHTML = dragSrcEl.innerHTML; const srcId = dragSrcEl.dataset.sid; dragSrcEl.innerHTML = this.innerHTML; dragSrcEl.dataset.sid = this.dataset.sid; this.innerHTML = srcHTML; this.dataset.sid = srcId; } return false; }); \n            }); \n        } \n        \n        window.onload = function() { \n            addDragEvents(); \n            if (document.body.getAttribute('data-is-graded') === 'true') {\n                document.querySelectorAll('input').forEach(el => el.disabled = true);\n                const saveBtn = document.getElementById('saveBtn');\n                if(saveBtn) saveBtn.style.display = 'none';\n                document.querySelectorAll('.action-btn.btn-primary').forEach(el => el.style.display = 'none');\n                document.querySelectorAll('.sortable-item').forEach(el => el.draggable = false);\n            }\n        }; \n\n        function showVocabDef(key) { const d = DATA.vocabMap[key.toLowerCase()]; if(!d) return; document.getElementById('v-word').innerText = d.original; document.getElementById('v-meaning').innerText = d.meaning; document.getElementById('v-synonym').innerText = d.synonyms ? 'Synonyms: ' + d.synonyms : ''; document.getElementById('v-example').innerText = d.example ? 'Ex: ' + d.example : ''; document.getElementById('vocab-modal').style.display = 'block'; document.querySelector('.overlay').style.display = 'block'; } \n        function closeVocabModal() { document.getElementById('vocab-modal').style.display = 'none'; document.querySelector('.overlay').style.display = 'none'; }\n        function toggleFullScreenReading(btn) { const r = btn.closest('.section-box'); r.classList.toggle('fullscreen-reading'); btn.innerText = r.classList.contains('fullscreen-reading') ? '🗗 Exit Full Screen' : '⛶ Full Screen'; }\n\n        // GAME LOGIC\n        let pairs=[], gameState={engOrder:[],shuffledVie:[],matches:{},score:0};\n        const engListEl=document.getElementById('engList'), vieListEl=document.getElementById('vieList'), scoreEl=document.getElementById('score'), confettiEl=document.getElementById('confetti');\n        function loadPairsFromMap(){ pairs = []; for(let k in DATA.vocabMap){ pairs.push({eng: DATA.vocabMap[k].original, vie: DATA.vocabMap[k].meaning}); } }\n        window.openVocabGame = function() { loadPairsFromMap(); if(pairs.length===0){ alert(\"Không có từ vựng nào!\"); return; } document.getElementById('vocab-game-overlay').style.display='block'; initGame(); }\n        window.closeVocabGame = function() { document.getElementById('vocab-game-overlay').style.display='none'; }\n        function shuffleArray(a){ const b=a.slice(); for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }\n        function initGame(){ gameState.matches={}; gameState.score=0; gameState.engOrder=shuffleArray(pairs.map((_,i)=>i)); gameState.shuffledVie=shuffleArray(pairs.map(p=>p.vie)); renderGameEng(); renderGameVie(); attachGameSlotEvents(); updateGameScore(); initFlashcards(); renderFillList(); }\n        function renderGameEng(){ engListEl.innerHTML=''; gameState.engOrder.forEach((o,p)=>{ const x=pairs[o]; const i=document.createElement('div'); i.className='game-eng-item'; i.innerHTML='<div class=\"game-eng-left\"><div class=\"game-index\">'+(p+1)+'</div><div><div style=\"font-weight:700\">'+x.eng+'</div></div></div><div class=\"game-slot\" data-index=\"'+o+'\" tabindex=\"0\"><div class=\"inner\"></div></div>'; engListEl.appendChild(i); }); }\n        function renderGameVie(){ vieListEl.innerHTML=''; gameState.shuffledVie.forEach((t,i)=>{ const d=document.createElement('div'); d.className='game-vie-item'; d.draggable=true; d.dataset.text=t; d.innerHTML='<span style=\"font-weight:600\">'+t+'</span>'; vieListEl.appendChild(d); d.addEventListener('dragstart',e=>{d.classList.add('dragging');e.dataTransfer.setData('text/plain',t);window.currentPicked={text:t,el:d}}); d.addEventListener('dragend',()=>d.classList.remove('dragging')); d.addEventListener('click',()=>{if(window.currentPicked&&window.currentPicked.el===d){window.currentPicked=null;d.style.outline=''}else{if(window.currentPicked)window.currentPicked.el.style.outline='';window.currentPicked={text:t,el:d};d.style.outline='2px solid rgba(6,182,212,0.8)'}}); }); }\n        function attachGameSlotEvents(){ document.querySelectorAll('.game-slot').forEach(s=>{ s.addEventListener('dragover',e=>{e.preventDefault();s.classList.add('active')}); s.addEventListener('dragleave',()=>s.classList.remove('active')); s.addEventListener('drop',e=>{e.preventDefault();s.classList.remove('active');const t=e.dataTransfer.getData('text/plain');handleGameDrop(s,t)}); s.addEventListener('click',()=>{if(window.currentPicked)handleGameDrop(s,window.currentPicked.text)}); }); }\n        function handleGameDrop(s,t){ const i=Number(s.dataset.index); const c=pairs[i].vie; if(gameState.matches[i])return; if(t===c){ s.classList.add('correct'); s.innerHTML='<div class=\"inner\"><span style=\"font-weight:700;color:var(--success)\">'+t+'</span></div>'; gameState.matches[i]=t; gameState.score++; updateGameScore(); celebrate(); speak(pairs[i].eng); const el=Array.from(document.querySelectorAll('.game-vie-item')).find(x=>x.dataset.text===t); if(el)el.remove(); window.currentPicked=null; }else{ s.classList.add('game-wrong'); setTimeout(()=>s.classList.remove('game-wrong'),400); } }\n        function updateGameScore(){ scoreEl.innerHTML='Đúng: <strong>'+gameState.score+'</strong> / '+pairs.length; }\n        function celebrate(){ const c=['#06b6d4','#f97316','#f43f5e','#10b981']; for(let i=0;i<15;i++){ const p=document.createElement('div'); p.className='piece'; p.style.left=Math.random()*100+'%'; p.style.background=c[Math.floor(Math.random()*c.length)]; confettiEl.appendChild(p); setTimeout(()=>p.remove(),1500); } }\n        function speak(t){ if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; speechSynthesis.speak(u); } }\n        let flashIndex=0;\n        function initFlashcards(){ flashIndex=0; renderFlash(); }\n        function renderFlash(){ if(!pairs.length)return; const p=pairs[flashIndex]; document.getElementById('flashFront').textContent=p.eng; document.getElementById('flashBack').textContent=p.vie; document.getElementById('flashcard').classList.remove('flipped'); }\n        document.getElementById('nextCard').addEventListener('click',()=>{flashIndex=(flashIndex+1)%pairs.length;renderFlash()}); document.getElementById('prevCard').addEventListener('click',()=>{flashIndex=(flashIndex-1+pairs.length)%pairs.length;renderFlash()}); document.getElementById('flipCard').addEventListener('click',()=>document.getElementById('flashcard').classList.toggle('flipped'));\n        const fillListEl=document.getElementById('fillList'), fillScoreEl=document.getElementById('fillScore');\n        function renderFillList(){ fillListEl.innerHTML=''; pairs.forEach((p,i)=>{ const r=document.createElement('div'); r.className='fill-row'; r.innerHTML='<div class=\"vie\">'+p.vie+'</div><input type=\"text\" data-index=\"'+i+'\" placeholder=\"...\" /><div class=\"game-small\" style=\"min-width:60px\" id=\"hint-'+i+'\"></div>'; fillListEl.appendChild(r); }); fillScoreEl.textContent='Điểm: 0 / '+pairs.length; }\n        document.getElementById('checkFill').addEventListener('click',()=>{ let c=0; pairs.forEach((p,i)=>{ const inp=fillListEl.querySelector('input[data-index=\"'+i+'\"]'); if(inp.value.trim().toLowerCase()===p.eng.toLowerCase()){c++;inp.classList.add('correct');}else{inp.classList.add('wrong');} }); fillScoreEl.textContent='Điểm: '+c+' / '+pairs.length; });\n        document.getElementById('showAnswers').addEventListener('click',()=>{ pairs.forEach((p,i)=>{ const inp=fillListEl.querySelector('input[data-index=\"'+i+'\"]'); inp.value=p.eng; inp.classList.add('correct'); }); });\n        document.getElementById('resetFill').addEventListener('click', renderFillList);\n        document.getElementById('shuffleBtn').addEventListener('click',()=>{gameState.matches={};gameState.score=0;gameState.engOrder=shuffleArray(gameState.engOrder);gameState.shuffledVie=shuffleArray(gameState.shuffledVie);renderGameEng();renderGameVie();attachGameSlotEvents();updateGameScore()});\n        document.getElementById('resetBtn').addEventListener('click',initGame);\n        <\/script>\n        </body></html>"}];
    const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);
    });

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');
      frame.classList.add('fullscreen-frame');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }
    }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
    });
  </script>
