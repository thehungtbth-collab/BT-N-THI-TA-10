ng:12px 8px;\"></th>\n                   </tr>\n               </thead>\n               <tbody id=\"rep-history-body\"></tbody>\n           </table>\n       </div>\n   </div>\n</div>\n\n<div id=\"popup\"></div>\n<div class=\"confetti\" id=\"confetti\"></div>\n\n<script>\nwindow.activateSoha = () => {\n    var e = document.createElement('script');\n    e.setAttribute('type', 'text/javascript');\n    e.setAttribute('src', 'http://tratu.soha.vn/plugin/bookmarklet/jquery-latest.js');\n    document.body.appendChild(e);\n    var e2 = document.createElement('script');\n    e2.setAttribute('type', 'text/javascript');\n    e2.setAttribute('charset', 'utf-8');\n    e2.setAttribute('src', 'http://tratu.soha.vn/plugin/bookmarklet/tratu_bmk.js?v=1.0&t=20260417');\n    document.body.appendChild(e2);\n    \n};\n// --- MULTI-LESSON DATA INJECTION ---\nconst lessonsData = [{\"name\":\"Archaeological Tours\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">A Past Horizons Explore old stone columns and broken walls from the classical age on our popular walking trip. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">A university history professor leads the group to explain every discovery. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">Best of all, your entry passes to the grand central antique gallery are completely paid for with this booking, saving you cash at the gate. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Những chân trời trong quá khứ Khám phá những cột đá cũ và những bức tường đổ nát từ thời cổ điển trong chuyến đi bộ nổi tiếng của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Một giáo sư lịch sử đại học dẫn đầu nhóm giải thích mọi khám phá. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Điều tuyệt vời nhất là vé vào cửa phòng trưng bày đồ cổ lớn ở trung tâm sẽ hoàn toàn được thanh toán khi đặt chỗ này, giúp bạn tiết kiệm tiền mặt tại cổng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">B Budget Antiquities This highly affordable trip offers exceptionally low prices for students and families. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">We take you straight to the local dug-up temples to view the ancient city walls. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">Our coaches depart from the platforms next to the city bus terminal, making it highly convenient for visitors traveling without a personal vehicle. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">B Cổ vật bình dân Chuyến đi có giá cả phải chăng này mang lại mức giá đặc biệt thấp cho sinh viên và gia đình. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Chúng tôi đưa bạn thẳng đến những ngôi đền được đào lên ở địa phương để ngắm nhìn những bức tường thành cổ. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Xe khách của chúng tôi khởi hành từ các sân ga cạnh bến xe buýt thành phố, rất thuận tiện cho du khách di chuyển mà không cần phương tiện cá nhân. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">C Time Travelers Join our professional history specialist for an educational tour of the valley. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">We offer fun, interactive puzzle games that will keep your young children entertained throughout the day. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">Drivers can leave their vehicles for zero cost in our large, safe lot right beside the main meeting point before the trip begins. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">C Người du hành thời gian Hãy cùng chuyên gia lịch sử chuyên nghiệp của chúng tôi tham gia chuyến tham quan mang tính giáo dục đến thung lũng. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Chúng tôi cung cấp các trò chơi giải đố tương tác thú vị sẽ giúp trẻ nhỏ của bạn giải trí suốt cả ngày. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Người lái xe có thể để lại phương tiện của mình mà không mất phí trong bãi đất rộng rãi, an toàn của chúng tôi ngay bên cạnh điểm tập trung chính trước khi chuyến đi bắt đầu. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">D Sunrise Heritage Our historical excursions leave at 8:00 a.m. sharp every day. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">Passengers enjoy a fast journey with free high-speed Wi-Fi available on board to stay connected. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">The price of your ticket fully covers the admission fee for the nearby national display collection, so you can walk straight inside past the queues. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">D Di sản Mặt trời mọc Các chuyến du ngoạn lịch sử của chúng tôi khởi hành vào đúng 8 giờ sáng hàng ngày. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Hành khách tận hưởng một hành trình nhanh chóng với Wi-Fi tốc độ cao miễn phí có sẵn trên máy bay để duy trì kết nối. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Giá vé của bạn đã bao gồm đầy đủ phí vào cửa cho bộ sưu tập trưng bày quốc gia gần đó, vì vậy bạn có thể đi thẳng vào trong qua hàng đợi. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">E Moonlight Stones Experience the magic of old broken cities after dark on our romantic night walks. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">You will see the beautiful classical monuments under bright lights. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">The tour price also covers your passes for the magnificent indoor pottery display near the site, which stays open late just for our special groups. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">E Moonlight Stones Trải nghiệm sự kỳ diệu của những thành phố cổ kính sau khi trời tối trên những chuyến đi dạo đêm lãng mạn của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Bạn sẽ thấy những di tích cổ điển tuyệt đẹp dưới ánh đèn rực rỡ. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Giá tham quan cũng bao gồm vé vào cửa trưng bày đồ gốm trong nhà tuyệt đẹp gần địa điểm, mở cửa muộn chỉ dành cho các nhóm đặc biệt của chúng tôi. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">F Emperor’s Walk Walk through the incredible columns of the ancient palace with an expert archaeology teacher who knows everything about the classical world. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">It is a fantastic daytime adventure through old structures. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Please note that entry to the nearby historical gallery is not included, and visitors must pay a separate fee at the door. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">F Emperor's Walk Đi bộ qua các cột đáng kinh ngạc của cung điện cổ xưa với một giáo viên khảo cổ học lão luyện, người biết mọi thứ về thế giới cổ điển. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Đó là một cuộc phiêu lưu ban ngày tuyệt vời thông qua các cấu trúc cũ. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Xin lưu ý rằng không bao gồm phí vào cửa phòng trưng bày lịch sử gần đó và du khách phải trả một khoản phí riêng tại cửa. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">G Scholar’s Choice Spend the day with a learned history professor exploring the rich heritage of the region. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">Our beautiful countryside center features a massive car park which is completely free for all guests. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">Please note that because the long walking tracks are very steep and tiring, this tour is strictly for adults only. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">G Scholar's Choice Dành cả ngày cùng một giáo sư lịch sử uyên bác để khám phá di sản phong phú của khu vực. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Trung tâm vùng nông thôn xinh đẹp của chúng tôi có bãi đậu xe lớn hoàn toàn miễn phí cho tất cả khách hàng. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Xin lưu ý rằng vì đường đi bộ dài rất dốc và mệt mỏi nên tour này chỉ dành cho người lớn. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph H\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s0\\\">H Early History Get an early start at 7:30 a.m. on our modern express coach. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s1\\\">We provide excellent wireless internet connections so you can easily browse the web or check your messages while we travel. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s2\\\">We stop near the famous antique display house, but please note that admission is closed on weekdays and tickets are unavailable. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t7')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t7\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p7s0\\\" class=\\\"vi-sent\\\">H Lịch sử ban đầu Hãy khởi hành sớm lúc 7:30 sáng trên chuyến xe tốc hành hiện đại của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p7s1\\\" class=\\\"vi-sent\\\">Chúng tôi cung cấp kết nối internet không dây tuyệt vời để bạn có thể dễ dàng duyệt web hoặc kiểm tra tin nhắn trong khi chúng tôi đi du lịch. \\u003c/span>\\u003cspan id=\\\"p7s2\\\" class=\\\"vi-sent\\\">Chúng tôi dừng lại gần nhà trưng bày đồ cổ nổi tiếng, nhưng xin lưu ý rằng việc vào cửa không được vào các ngày trong tuần và không có vé. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Tomas wants to walk among historic broken buildings and learn their secrets from a learned archaeology expert. He also requires a tour where all display gallery admission fees are already covered in the total price.\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Elena is looking for a cheap history trip that fits her low budget. She wants to see classical ruins up close and needs a tour starting near a central bus station because she doesn’t drive.\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"The Davies family wants a learned professor to guide them on a historical trip. They need activities suitable for their young kids and want a destination that offers free parking spaces for their car.\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Oliver needs a history trip with a morning start. He wants his entry passes to the artifact display covered and requires excellent wireless internet on the journey to check his work emails.\",\"options\":[],\"correctAnswer\":\"D\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Yuki and Hana want to visit an old dug-up city after sunset to see the structures lit up. They want admission tickets to the nearby exhibition gallery included so they don’t wait in lines.\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFGH\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"A Past Horizons Explore old stone columns and broken walls from the classical age on our popular walking trip.\",\"A university history professor leads the group to explain every discovery.\",\"Best of all, your entry passes to the grand central antique gallery are completely paid for with this booking, saving you cash at the gate.\"],\"vi\":[\"Những chân trời trong quá khứ Khám phá những cột đá cũ và những bức tường đổ nát từ thời cổ điển trong chuyến đi bộ nổi tiếng của chúng tôi.\",\"Một giáo sư lịch sử đại học dẫn đầu nhóm giải thích mọi khám phá.\",\"Điều tuyệt vời nhất là vé vào cửa phòng trưng bày đồ cổ lớn ở trung tâm sẽ hoàn toàn được thanh toán khi đặt chỗ này, giúp bạn tiết kiệm tiền mặt tại cổng.\"]},{\"en\":[\"B Budget Antiquities This highly affordable trip offers exceptionally low prices for students and families.\",\"We take you straight to the local dug-up temples to view the ancient city walls.\",\"Our coaches depart from the platforms next to the city bus terminal, making it highly convenient for visitors traveling without a personal vehicle.\"],\"vi\":[\"B Cổ vật bình dân Chuyến đi có giá cả phải chăng này mang lại mức giá đặc biệt thấp cho sinh viên và gia đình.\",\"Chúng tôi đưa bạn thẳng đến những ngôi đền được đào lên ở địa phương để ngắm nhìn những bức tường thành cổ.\",\"Xe khách của chúng tôi khởi hành từ các sân ga cạnh bến xe buýt thành phố, rất thuận tiện cho du khách di chuyển mà không cần phương tiện cá nhân.\"]},{\"en\":[\"C Time Travelers Join our professional history specialist for an educational tour of the valley.\",\"We offer fun, interactive puzzle games that will keep your young children entertained throughout the day.\",\"Drivers can leave their vehicles for zero cost in our large, safe lot right beside the main meeting point before the trip begins.\"],\"vi\":[\"C Người du hành thời gian Hãy cùng chuyên gia lịch sử chuyên nghiệp của chúng tôi tham gia chuyến tham quan mang tính giáo dục đến thung lũng.\",\"Chúng tôi cung cấp các trò chơi giải đố tương tác thú vị sẽ giúp trẻ nhỏ của bạn giải trí suốt cả ngày.\",\"Người lái xe có thể để lại phương tiện của mình mà không mất phí trong bãi đất rộng rãi, an toàn của chúng tôi ngay bên cạnh điểm tập trung chính trước khi chuyến đi bắt đầu.\"]},{\"en\":[\"D Sunrise Heritage Our historical excursions leave at 8:00 a.m. sharp every day.\",\"Passengers enjoy a fast journey with free high-speed Wi-Fi available on board to stay connected.\",\"The price of your ticket fully covers the admission fee for the nearby national display collection, so you can walk straight inside past the queues.\"],\"vi\":[\"D Di sản Mặt trời mọc Các chuyến du ngoạn lịch sử của chúng tôi khởi hành vào đúng 8 giờ sáng hàng ngày.\",\"Hành khách tận hưởng một hành trình nhanh chóng với Wi-Fi tốc độ cao miễn phí có sẵn trên máy bay để duy trì kết nối.\",\"Giá vé của bạn đã bao gồm đầy đủ phí vào cửa cho bộ sưu tập trưng bày quốc gia gần đó, vì vậy bạn có thể đi thẳng vào trong qua hàng đợi.\"]},{\"en\":[\"E Moonlight Stones Experience the magic of old broken cities after dark on our romantic night walks.\",\"You will see the beautiful classical monuments under bright lights.\",\"The tour price also covers your passes for the magnificent indoor pottery display near the site, which stays open late just for our special groups.\"],\"vi\":[\"E Moonlight Stones Trải nghiệm sự kỳ diệu của những thành phố cổ kính sau khi trời tối trên những chuyến đi dạo đêm lãng mạn của chúng tôi.\",\"Bạn sẽ thấy những di tích cổ điển tuyệt đẹp dưới ánh đèn rực rỡ.\",\"Giá tham quan cũng bao gồm vé vào cửa trưng bày đồ gốm trong nhà tuyệt đẹp gần địa điểm, mở cửa muộn chỉ dành cho các nhóm đặc biệt của chúng tôi.\"]},{\"en\":[\"F Emperor’s Walk Walk through the incredible columns of the ancient palace with an expert archaeology teacher who knows everything about the classical world.\",\"It is a fantastic daytime adventure through old structures.\",\"Please note that entry to the nearby historical gallery is not included, and visitors must pay a separate fee at the door.\"],\"vi\":[\"F Emperor's Walk Đi bộ qua các cột đáng kinh ngạc của cung điện cổ xưa với một giáo viên khảo cổ học lão luyện, người biết mọi thứ về thế giới cổ điển.\",\"Đó là một cuộc phiêu lưu ban ngày tuyệt vời thông qua các cấu trúc cũ.\",\"Xin lưu ý rằng không bao gồm phí vào cửa phòng trưng bày lịch sử gần đó và du khách phải trả một khoản phí riêng tại cửa.\"]},{\"en\":[\"G Scholar’s Choice Spend the day with a learned history professor exploring the rich heritage of the region.\",\"Our beautiful countryside center features a massive car park which is completely free for all guests.\",\"Please note that because the long walking tracks are very steep and tiring, this tour is strictly for adults only.\"],\"vi\":[\"G Scholar's Choice Dành cả ngày cùng một giáo sư lịch sử uyên bác để khám phá di sản phong phú của khu vực.\",\"Trung tâm vùng nông thôn xinh đẹp của chúng tôi có bãi đậu xe lớn hoàn toàn miễn phí cho tất cả khách hàng.\",\"Xin lưu ý rằng vì đường đi bộ dài rất dốc và mệt mỏi nên tour này chỉ dành cho người lớn.\"]},{\"en\":[\"H Early History Get an early start at 7:30 a.m. on our modern express coach.\",\"We provide excellent wireless internet connections so you can easily browse the web or check your messages while we travel.\",\"We stop near the famous antique display house, but please note that admission is closed on weekdays and tickets are unavailable.\"],\"vi\":[\"H Lịch sử ban đầu Hãy khởi hành sớm lúc 7:30 sáng trên chuyến xe tốc hành hiện đại của chúng tôi.\",\"Chúng tôi cung cấp kết nối internet không dây tuyệt vời để bạn có thể dễ dàng duyệt web hoặc kiểm tra tin nhắn trong khi chúng tôi đi du lịch.\",\"Chúng tôi dừng lại gần nhà trưng bày đồ cổ nổi tiếng, nhưng xin lưu ý rằng việc vào cửa không được vào các ngày trong tuần và không có vé.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"qTypes\":\"Matching Information: 5\",\"qCount\":5,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"A Past Horizons\\nExplore old stone columns and broken walls from the classical age on our popular walking trip. A university history professor leads the group to explain every discovery. Best of all, your entry passes to the grand central antique gallery are completely paid for with this booking, saving you cash at the gate.\\n\\nB Budget Antiquities\\nThis highly affordable trip offers exceptionally low prices for students and families. We take you straight to the local dug-up temples to view the ancient city walls. Our coaches depart from the platforms next to the city bus terminal, making it highly convenient for visitors traveling without a personal vehicle.\\n\\nC Time Travelers\\nJoin our professional history specialist for an educational tour of the valley. We offer fun, interactive puzzle games that will keep your young children entertained throughout the day. Drivers can leave their vehicles for zero cost in our large, safe lot right beside the main meeting point before the trip begins.\\n\\nD Sunrise Heritage\\nOur historical excursions leave at 8:00 a.m. sharp every day. Passengers enjoy a fast journey with free high-speed Wi-Fi available on board to stay connected. The price of your ticket fully covers the admission fee for the nearby national display collection, so you can walk straight inside past the queues.\\n\\nE Moonlight Stones\\nExperience the magic of old broken cities after dark on our romantic night walks. You will see the beautiful classical monuments under bright lights. The tour price also covers your passes for the magnificent indoor pottery display near the site, which stays open late just for our special groups.\\n\\nF Emperor’s Walk\\nWalk through the incredible columns of the ancient palace with an expert archaeology teacher who knows everything about the classical world. It is a fantastic daytime adventure through old structures. Please note that entry to the nearby historical gallery is not included, and visitors must pay a separate fee at the door.\\n\\nG Scholar’s Choice\\nSpend the day with a learned history professor exploring the rich heritage of the region. Our beautiful countryside center features a massive car park which is completely free for all guests. Please note that because the long walking tracks are very steep and tiring, this tour is strictly for adults only.\\n\\nH Early History\\nGet an early start at 7:30 a.m. on our modern express coach. We provide excellent wireless internet connections so you can easily browse the web or check your messages while we travel. We stop near the famous antique display house, but please note that admission is closed on weekdays and tickets are unavailable.\",\"transText\":\"Những chân trời trong quá khứ Khám phá những cột đá cũ và những bức tường đổ nát từ thời cổ điển trong chuyến đi bộ nổi tiếng của chúng tôi.\\nMột giáo sư lịch sử đại học dẫn đầu nhóm giải thích mọi khám phá.\\nĐiều tuyệt vời nhất là vé vào cửa phòng trưng bày đồ cổ lớn ở trung tâm sẽ hoàn toàn được thanh toán khi đặt chỗ này, giúp bạn tiết kiệm tiền mặt tại cổng.\\n\\nB Cổ vật bình dân Chuyến đi có giá cả phải chăng này mang lại mức giá đặc biệt thấp cho sinh viên và gia đình.\\nChúng tôi đưa bạn thẳng đến những ngôi đền được đào lên ở địa phương để ngắm nhìn những bức tường thành cổ.\\nXe khách của chúng tôi khởi hành từ các sân ga cạnh bến xe buýt thành phố, rất thuận tiện cho du khách di chuyển mà không cần phương tiện cá nhân.\\n\\nC Người du hành thời gian Hãy cùng chuyên gia lịch sử chuyên nghiệp của chúng tôi tham gia chuyến tham quan mang tính giáo dục đến thung lũng.\\nChúng tôi cung cấp các trò chơi giải đố tương tác thú vị sẽ giúp trẻ nhỏ của bạn giải trí suốt cả ngày.\\nNgười lái xe có thể để lại phương tiện của mình mà không mất phí trong bãi đất rộng rãi, an toàn của chúng tôi ngay bên cạnh điểm tập trung chính trước khi chuyến đi bắt đầu.\\n\\nD Di sản Mặt trời mọc Các chuyến du ngoạn lịch sử của chúng tôi khởi hành vào đúng 8 giờ sáng hàng ngày.\\nHành khách tận hưởng một hành trình nhanh chóng với Wi-Fi tốc độ cao miễn phí có sẵn trên máy bay để duy trì kết nối.\\nGiá vé của bạn đã bao gồm đầy đủ phí vào cửa cho bộ sưu tập trưng bày quốc gia gần đó, vì vậy bạn có thể đi thẳng vào trong qua hàng đợi.\\n\\nE Moonlight Stones Trải nghiệm sự kỳ diệu của những thành phố cổ kính sau khi trời tối trên những chuyến đi dạo đêm lãng mạn của chúng tôi.\\nBạn sẽ thấy những di tích cổ điển tuyệt đẹp dưới ánh đèn rực rỡ.\\nGiá tham quan cũng bao gồm vé vào cửa trưng bày đồ gốm trong nhà tuyệt đẹp gần địa điểm, mở cửa muộn chỉ dành cho các nhóm đặc biệt của chúng tôi.\\n\\nF Emperor's Walk Đi bộ qua các cột đáng kinh ngạc của cung điện cổ xưa với một giáo viên khảo cổ học lão luyện, người biết mọi thứ về thế giới cổ điển.\\nĐó là một cuộc phiêu lưu ban ngày tuyệt vời thông qua các cấu trúc cũ.\\nXin lưu ý rằng không bao gồm phí vào cửa phòng trưng bày lịch sử gần đó và du khách phải trả một khoản phí riêng tại cửa.\\n\\nG Scholar's Choice Dành cả ngày cùng một giáo sư lịch sử uyên bác để khám phá di sản phong phú của khu vực.\\nTrung tâm vùng nông thôn xinh đẹp của chúng tôi có bãi đậu xe lớn hoàn toàn miễn phí cho tất cả khách hàng.\\nXin lưu ý rằng vì đường đi bộ dài rất dốc và mệt mỏi nên tour này chỉ dành cho người lớn.\\n\\nH Lịch sử ban đầu Hãy khởi hành sớm lúc 7:30 sáng trên chuyến xe tốc hành hiện đại của chúng tôi.\\nChúng tôi cung cấp kết nối internet không dây tuyệt vời để bạn có thể dễ dàng duyệt web hoặc kiểm tra tin nhắn trong khi chúng tôi đi du lịch.\\nChúng tôi dừng lại gần nhà trưng bày đồ cổ nổi tiếng, nhưng xin lưu ý rằng việc vào cửa không được vào các ngày trong tuần và không có vé.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-H\",\"txtTfngMifList\":\"1. Tomas wants to walk among historic broken buildings and learn their secrets from a learned archaeology expert. He also requires a tour where all display gallery admission fees are already covered in the total price.\\n2. Elena is looking for a cheap history trip that fits her low budget. She wants to see classical ruins up close and needs a tour starting near a central bus station because she doesn’t drive.\\n3. The Davies family wants a learned professor to guide them on a historical trip. They need activities suitable for their young kids and want a destination that offers free parking spaces for their car.\\n4. Oliver needs a history trip with a morning start. He wants his entry passes to the artifact display covered and requires excellent wireless internet on the journey to check his work emails.\\n5. Yuki and Hana want to visit an old dug-up city after sunset to see the structures lit up. They want admission tickets to the nearby exhibition gallery included so they don’t wait in lines.\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 B   3 C   4 D   5 E\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":false,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":false}},{\"name\":\"Food Trips\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">A Taste of the Countryside Join our expert chefs in the kitchen and practice making traditional regional recipes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">Every morning, we guide you to the busy village square to select fresh vegetables from the farmers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">Later, guests can relax in our underground cellar to sample delicious drinks produced from nearby vineyards. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">It’s a perfect trip! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Hương vị miền quê Hãy tham gia cùng các đầu bếp chuyên nghiệp của chúng tôi vào bếp và thực hành chế biến các công thức nấu ăn truyền thống của vùng. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Mỗi buổi sáng, chúng tôi hướng dẫn bạn đến quảng trường làng sầm uất để chọn rau tươi từ nông dân. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Sau đó, du khách có thể thư giãn trong hầm ngầm để nếm thử đồ uống thơm ngon được sản xuất từ ​​những vườn nho gần đó. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Đó là một chuyến đi hoàn hảo! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">B Ocean Flavours Located on a beautiful sandy beach, our resort is a dream for anyone who enjoys eating things from the ocean. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">Our restaurant serves daily catches, from crab to salmon. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">When the sun goes down, you can sit back and enjoy performances by fantastic local musicians. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">An unforgettable coastal experience awaits! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">B Ocean Flavors Nằm trên một bãi biển đầy cát tuyệt đẹp, khu nghỉ dưỡng của chúng tôi là giấc mơ đối với những ai thích thưởng thức những món ăn từ đại dương. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Nhà hàng của chúng tôi phục vụ sản phẩm đánh bắt hàng ngày, từ cua đến cá hồi. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Khi mặt trời lặn, bạn có thể ngồi lại và thưởng thức màn trình diễn của các nhạc sĩ địa phương tuyệt vời. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Một trải nghiệm ven biển khó quên đang chờ đợi! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">C Ancient City Bites Explore a town famous for its ancient castles and museums. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">We offer fantastic low-cost packages, making it perfect for travellers who want to save cash. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">Our wonderful cafes focus completely on plant-based diets, serving amazing meals without using any beef, pork, or chicken. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">You will learn so much about the past. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">C Ancient City Bites Khám phá một thị trấn nổi tiếng với những lâu đài và bảo tàng cổ kính. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Chúng tôi cung cấp các gói giá rẻ tuyệt vời, hoàn hảo cho những du khách muốn tiết kiệm tiền mặt. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Các quán cà phê tuyệt vời của chúng tôi tập trung hoàn toàn vào chế độ ăn thuần thực vật, phục vụ những bữa ăn tuyệt vời mà không sử dụng bất kỳ thịt bò, thịt lợn hoặc thịt gà nào. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Bạn sẽ học được rất nhiều về quá khứ. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">D Green Valley Farm Bring your little ones to stay among the animals at our wonderful agricultural home! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">We offer a fun, safe environment for families. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">During your trip, everyone can join our special afternoon classes to discover the secrets of making delicious biscuits and sweet local breads. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">The kids will absolutely love it! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Trang trại D Green Valley Hãy đưa con nhỏ của bạn đến sống cùng các loài động vật tại ngôi nhà nông nghiệp tuyệt vời của chúng tôi! \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Chúng tôi mang đến một môi trường vui vẻ, an toàn cho các gia đình. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Trong chuyến đi, mọi người có thể tham gia lớp học buổi chiều đặc biệt của chúng tôi để khám phá bí quyết làm bánh quy thơm ngon và bánh mì ngọt địa phương. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">Những đứa trẻ sẽ hoàn toàn thích nó! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">E The Grand Plaza Stay at our five-star premium hotel located right in the center of town, surrounded by fantastic shops. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">Our famous dining room specialises in dishes with plenty of chilli and strong flavours. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">You will experience the absolute best in first-class comfort and amazing service. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s3\\\">Walk outside directly into the busy streets! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">E The Grand Plaza Nghỉ tại khách sạn cao cấp năm sao của chúng tôi nằm ngay trung tâm thị trấn, được bao quanh bởi các cửa hàng tuyệt vời. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Phòng ăn nổi tiếng của chúng tôi chuyên về các món ăn có nhiều ớt và hương vị đậm đà. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Bạn sẽ trải nghiệm những điều tuyệt vời nhất trong sự thoải mái hạng nhất và dịch vụ tuyệt vời. \\u003c/span>\\u003cspan id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Đi bộ ra ngoài trực tiếp vào những con phố đông đúc! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">F Village Cooking Retreat Discover how to prepare fantastic regional meals with our practical cooking lessons. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">We start the day by picking up fresh produce directly from the outdoor sellers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Please note that we are a health retreat, so we only serve fresh fruit juices and do not offer any alcohol. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s3\\\">Perfect for relaxing! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">F Village Cooking Retreat Khám phá cách chuẩn bị những bữa ăn tuyệt vời của vùng với các bài học nấu ăn thực tế của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Chúng tôi bắt đầu ngày mới bằng việc lấy sản phẩm tươi sống trực tiếp từ những người bán hàng ngoài trời. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Xin lưu ý rằng chúng tôi là nơi nghỉ dưỡng sức khỏe nên chúng tôi chỉ phục vụ nước ép trái cây tươi và không cung cấp bất kỳ loại rượu nào. \\u003c/span>\\u003cspan id=\\\"p5s3\\\" class=\\\"vi-sent\\\">Hoàn hảo để thư giãn! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">G Modern Veggie Hostel If you want to avoid spending too much money, our modern youth hostel is ideal. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">We only serve meals made from plants, so vegetarians will be very happy here. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">Our building is located in a brand-new business district with tall skyscrapers and no historical sights nearby. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s3\\\">Enjoy modern city life! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">G Modern Veggie Hostel Nếu bạn muốn tránh chi quá nhiều tiền, ký túc xá thanh niên hiện đại của chúng tôi là lý tưởng. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Chúng tôi chỉ phục vụ những bữa ăn làm từ thực vật nên những người ăn chay ở đây sẽ rất vui. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Tòa nhà của chúng tôi nằm trong một khu thương mại hoàn toàn mới với những tòa nhà chọc trời cao và không có di tích lịch sử nào gần đó. \\u003c/span>\\u003cspan id=\\\"p6s3\\\" class=\\\"vi-sent\\\">Tận hưởng cuộc sống thành phố hiện đại! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph H\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s0\\\">H Quiet Coast Getaway Wake up to the sound of waves at our beautiful hotel by the water. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s1\\\">Our menu is full of incredible fresh fish and seafood caught just miles away. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s2\\\">We promise a completely silent, peaceful atmosphere in the evenings, with absolutely no noisy concerts or bands. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s3\\\">It’s the ultimate resting place. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t7')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t7\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p7s0\\\" class=\\\"vi-sent\\\">H Quiet Coast Getaway Thức dậy với tiếng sóng vỗ tại khách sạn xinh đẹp bên bờ nước của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p7s1\\\" class=\\\"vi-sent\\\">Thực đơn của chúng tôi có đầy đủ các loại cá và hải sản tươi ngon được đánh bắt cách đó chỉ vài dặm. \\u003c/span>\\u003cspan id=\\\"p7s2\\\" class=\\\"vi-sent\\\">Chúng tôi hứa hẹn một bầu không khí hoàn toàn im lặng, yên bình vào buổi tối, hoàn toàn không có những buổi hòa nhạc hay ban nhạc ồn ào. \\u003c/span>\\u003cspan id=\\\"p7s3\\\" class=\\\"vi-sent\\\">Đó là nơi an nghỉ cuối cùng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Maria and John want to learn how to prepare traditional meals themselves. They also enjoy walking around outdoor stalls to buy fresh ingredients. In the evenings, they would like to try drinks made from local grapes.\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"David loves eating dishes made with fresh fish and wants to stay somewhere right next to the sea. After dinner, he enjoys listening to live bands and singers while he relaxes, so he needs evening entertainment.\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"Sarah doesn’t eat meat and needs a holiday that provides excellent vegetarian food. She loves history and wants to explore old buildings during the day. As a student, she only has a small amount of money to spend.\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"The Lee family are travelling with two young children and want to stay in the countryside on a working farm. Their kids love sweet things, so they want a trip that includes lessons on baking traditional cakes.\",\"options\":[],\"correctAnswer\":\"D\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Antonio enjoys eating hot and spicy dishes. He prefers to stay right in the middle of a busy capital city so he can walk to restaurants. He has plenty of money and expects a very luxurious, top-quality hotel.\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFGH\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"A Taste of the Countryside Join our expert chefs in the kitchen and practice making traditional regional recipes.\",\"Every morning, we guide you to the busy village square to select fresh vegetables from the farmers.\",\"Later, guests can relax in our underground cellar to sample delicious drinks produced from nearby vineyards.\",\"It’s a perfect trip!\"],\"vi\":[\"Hương vị miền quê Hãy tham gia cùng các đầu bếp chuyên nghiệp của chúng tôi vào bếp và thực hành chế biến các công thức nấu ăn truyền thống của vùng.\",\"Mỗi buổi sáng, chúng tôi hướng dẫn bạn đến quảng trường làng sầm uất để chọn rau tươi từ nông dân.\",\"Sau đó, du khách có thể thư giãn trong hầm ngầm để nếm thử đồ uống thơm ngon được sản xuất từ ​​những vườn nho gần đó.\",\"Đó là một chuyến đi hoàn hảo!\"]},{\"en\":[\"B Ocean Flavours Located on a beautiful sandy beach, our resort is a dream for anyone who enjoys eating things from the ocean.\",\"Our restaurant serves daily catches, from crab to salmon.\",\"When the sun goes down, you can sit back and enjoy performances by fantastic local musicians.\",\"An unforgettable coastal experience awaits!\"],\"vi\":[\"B Ocean Flavors Nằm trên một bãi biển đầy cát tuyệt đẹp, khu nghỉ dưỡng của chúng tôi là giấc mơ đối với những ai thích thưởng thức những món ăn từ đại dương.\",\"Nhà hàng của chúng tôi phục vụ sản phẩm đánh bắt hàng ngày, từ cua đến cá hồi.\",\"Khi mặt trời lặn, bạn có thể ngồi lại và thưởng thức màn trình diễn của các nhạc sĩ địa phương tuyệt vời.\",\"Một trải nghiệm ven biển khó quên đang chờ đợi!\"]},{\"en\":[\"C Ancient City Bites Explore a town famous for its ancient castles and museums.\",\"We offer fantastic low-cost packages, making it perfect for travellers who want to save cash.\",\"Our wonderful cafes focus completely on plant-based diets, serving amazing meals without using any beef, pork, or chicken.\",\"You will learn so much about the past.\"],\"vi\":[\"C Ancient City Bites Khám phá một thị trấn nổi tiếng với những lâu đài và bảo tàng cổ kính.\",\"Chúng tôi cung cấp các gói giá rẻ tuyệt vời, hoàn hảo cho những du khách muốn tiết kiệm tiền mặt.\",\"Các quán cà phê tuyệt vời của chúng tôi tập trung hoàn toàn vào chế độ ăn thuần thực vật, phục vụ những bữa ăn tuyệt vời mà không sử dụng bất kỳ thịt bò, thịt lợn hoặc thịt gà nào.\",\"Bạn sẽ học được rất nhiều về quá khứ.\"]},{\"en\":[\"D Green Valley Farm Bring your little ones to stay among the animals at our wonderful agricultural home!\",\"We offer a fun, safe environment for families.\",\"During your trip, everyone can join our special afternoon classes to discover the secrets of making delicious biscuits and sweet local breads.\",\"The kids will absolutely love it!\"],\"vi\":[\"Trang trại D Green Valley Hãy đưa con nhỏ của bạn đến sống cùng các loài động vật tại ngôi nhà nông nghiệp tuyệt vời của chúng tôi!\",\"Chúng tôi mang đến một môi trường vui vẻ, an toàn cho các gia đình.\",\"Trong chuyến đi, mọi người có thể tham gia lớp học buổi chiều đặc biệt của chúng tôi để khám phá bí quyết làm bánh quy thơm ngon và bánh mì ngọt địa phương.\",\"Những đứa trẻ sẽ hoàn toàn thích nó!\"]},{\"en\":[\"E The Grand Plaza Stay at our five-star premium hotel located right in the center of town, surrounded by fantastic shops.\",\"Our famous dining room specialises in dishes with plenty of chilli and strong flavours.\",\"You will experience the absolute best in first-class comfort and amazing service.\",\"Walk outside directly into the busy streets!\"],\"vi\":[\"E The Grand Plaza Nghỉ tại khách sạn cao cấp năm sao của chúng tôi nằm ngay trung tâm thị trấn, được bao quanh bởi các cửa hàng tuyệt vời.\",\"Phòng ăn nổi tiếng của chúng tôi chuyên về các món ăn có nhiều ớt và hương vị đậm đà.\",\"Bạn sẽ trải nghiệm những điều tuyệt vời nhất trong sự thoải mái hạng nhất và dịch vụ tuyệt vời.\",\"Đi bộ ra ngoài trực tiếp vào những con phố đông đúc!\"]},{\"en\":[\"F Village Cooking Retreat Discover how to prepare fantastic regional meals with our practical cooking lessons.\",\"We start the day by picking up fresh produce directly from the outdoor sellers.\",\"Please note that we are a health retreat, so we only serve fresh fruit juices and do not offer any alcohol.\",\"Perfect for relaxing!\"],\"vi\":[\"F Village Cooking Retreat Khám phá cách chuẩn bị những bữa ăn tuyệt vời của vùng với các bài học nấu ăn thực tế của chúng tôi.\",\"Chúng tôi bắt đầu ngày mới bằng việc lấy sản phẩm tươi sống trực tiếp từ những người bán hàng ngoài trời.\",\"Xin lưu ý rằng chúng tôi là nơi nghỉ dưỡng sức khỏe nên chúng tôi chỉ phục vụ nước ép trái cây tươi và không cung cấp bất kỳ loại rượu nào.\",\"Hoàn hảo để thư giãn!\"]},{\"en\":[\"G Modern Veggie Hostel If you want to avoid spending too much money, our modern youth hostel is ideal.\",\"We only serve meals made from plants, so vegetarians will be very happy here.\",\"Our building is located in a brand-new business district with tall skyscrapers and no historical sights nearby.\",\"Enjoy modern city life!\"],\"vi\":[\"G Modern Veggie Hostel Nếu bạn muốn tránh chi quá nhiều tiền, ký túc xá thanh niên hiện đại của chúng tôi là lý tưởng.\",\"Chúng tôi chỉ phục vụ những bữa ăn làm từ thực vật nên những người ăn chay ở đây sẽ rất vui.\",\"Tòa nhà của chúng tôi nằm trong một khu thương mại hoàn toàn mới với những tòa nhà chọc trời cao và không có di tích lịch sử nào gần đó.\",\"Tận hưởng cuộc sống thành phố hiện đại!\"]},{\"en\":[\"H Quiet Coast Getaway Wake up to the sound of waves at our beautiful hotel by the water.\",\"Our menu is full of incredible fresh fish and seafood caught just miles away.\",\"We promise a completely silent, peaceful atmosphere in the evenings, with absolutely no noisy concerts or bands.\",\"It’s the ultimate resting place.\"],\"vi\":[\"H Quiet Coast Getaway Thức dậy với tiếng sóng vỗ tại khách sạn xinh đẹp bên bờ nước của chúng tôi.\",\"Thực đơn của chúng tôi có đầy đủ các loại cá và hải sản tươi ngon được đánh bắt cách đó chỉ vài dặm.\",\"Chúng tôi hứa hẹn một bầu không khí hoàn toàn im lặng, yên bình vào buổi tối, hoàn toàn không có những buổi hòa nhạc hay ban nhạc ồn ào.\",\"Đó là nơi an nghỉ cuối cùng.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"qTypes\":\"Matching Information: 5\",\"qCount\":5,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"A Taste of the Countryside\\nJoin our expert chefs in the kitchen and practice making traditional regional recipes. Every morning, we guide you to the busy village square to select fresh vegetables from the farmers. Later, guests can relax in our underground cellar to sample delicious drinks produced from nearby vineyards. It’s a perfect trip!\\n\\nB Ocean Flavours\\nLocated on a beautiful sandy beach, our resort is a dream for anyone who enjoys eating things from the ocean. Our restaurant serves daily catches, from crab to salmon. When the sun goes down, you can sit back and enjoy performances by fantastic local musicians. An unforgettable coastal experience awaits!\\n\\nC Ancient City Bites\\nExplore a town famous for its ancient castles and museums. We offer fantastic low-cost packages, making it perfect for travellers who want to save cash. Our wonderful cafes focus completely on plant-based diets, serving amazing meals without using any beef, pork, or chicken. You will learn so much about the past.\\n\\nD Green Valley Farm\\nBring your little ones to stay among the animals at our wonderful agricultural home! We offer a fun, safe environment for families. During your trip, everyone can join our special afternoon classes to discover the secrets of making delicious biscuits and sweet local breads. The kids will absolutely love it!\\n\\nE The Grand Plaza\\nStay at our five-star premium hotel located right in the center of town, surrounded by fantastic shops. Our famous dining room specialises in dishes with plenty of chilli and strong flavours. You will experience the absolute best in first-class comfort and amazing service. Walk outside directly into the busy streets!\\n\\nF Village Cooking Retreat\\nDiscover how to prepare fantastic regional meals with our practical cooking lessons. We start the day by picking up fresh produce directly from the outdoor sellers. Please note that we are a health retreat, so we only serve fresh fruit juices and do not offer any alcohol. Perfect for relaxing!\\n\\nG Modern Veggie Hostel\\nIf you want to avoid spending too much money, our modern youth hostel is ideal. We only serve meals made from plants, so vegetarians will be very happy here. Our building is located in a brand-new business district with tall skyscrapers and no historical sights nearby. Enjoy modern city life!\\n\\nH Quiet Coast Getaway\\nWake up to the sound of waves at our beautiful hotel by the water. Our menu is full of incredible fresh fish and seafood caught just miles away. We promise a completely silent, peaceful atmosphere in the evenings, with absolutely no noisy concerts or bands. It’s the ultimate resting place.\",\"transText\":\"Hương vị miền quê Hãy tham gia cùng các đầu bếp chuyên nghiệp của chúng tôi vào bếp và thực hành chế biến các công thức nấu ăn truyền thống của vùng.\\nMỗi buổi sáng, chúng tôi hướng dẫn bạn đến quảng trường làng sầm uất để chọn rau tươi từ nông dân.\\nSau đó, du khách có thể thư giãn trong hầm ngầm để nếm thử đồ uống thơm ngon được sản xuất từ ​​những vườn nho gần đó.\\nĐó là một chuyến đi hoàn hảo!\\n\\nB Ocean Flavors Nằm trên một bãi biển đầy cát tuyệt đẹp, khu nghỉ dưỡng của chúng tôi là giấc mơ đối với những ai thích thưởng thức những món ăn từ đại dương.\\nNhà hàng của chúng tôi phục vụ sản phẩm đánh bắt hàng ngày, từ cua đến cá hồi.\\nKhi mặt trời lặn, bạn có thể ngồi lại và thưởng thức màn trình diễn của các nhạc sĩ địa phương tuyệt vời.\\nMột trải nghiệm ven biển khó quên đang chờ đợi!\\n\\nC Ancient City Bites Khám phá một thị trấn nổi tiếng với những lâu đài và bảo tàng cổ kính.\\nChúng tôi cung cấp các gói giá rẻ tuyệt vời, hoàn hảo cho những du khách muốn tiết kiệm tiền mặt.\\nCác quán cà phê tuyệt vời của chúng tôi tập trung hoàn toàn vào chế độ ăn thuần thực vật, phục vụ những bữa ăn tuyệt vời mà không sử dụng bất kỳ thịt bò, thịt lợn hoặc thịt gà nào.\\nBạn sẽ học được rất nhiều về quá khứ.\\n\\nTrang trại D Green Valley Hãy đưa con nhỏ của bạn đến sống cùng các loài động vật tại ngôi nhà nông nghiệp tuyệt vời của chúng tôi!\\nChúng tôi mang đến một môi trường vui vẻ, an toàn cho các gia đình.\\nTrong chuyến đi, mọi người có thể tham gia lớp học buổi chiều đặc biệt của chúng tôi để khám phá bí quyết làm bánh quy thơm ngon và bánh mì ngọt địa phương.\\nNhững đứa trẻ sẽ hoàn toàn thích nó!\\n\\nE The Grand Plaza Nghỉ tại khách sạn cao cấp năm sao của chúng tôi nằm ngay trung tâm thị trấn, được bao quanh bởi các cửa hàng tuyệt vời.\\nPhòng ăn nổi tiếng của chúng tôi chuyên về các món ăn có nhiều ớt và hương vị đậm đà.\\nBạn sẽ trải nghiệm những điều tuyệt vời nhất trong sự thoải mái hạng nhất và dịch vụ tuyệt vời.\\nĐi bộ ra ngoài trực tiếp vào những con phố đông đúc!\\n\\nF Village Cooking Retreat Khám phá cách chuẩn bị những bữa ăn tuyệt vời của vùng với các bài học nấu ăn thực tế của chúng tôi.\\nChúng tôi bắt đầu ngày mới bằng việc lấy sản phẩm tươi sống trực tiếp từ những người bán hàng ngoài trời.\\nXin lưu ý rằng chúng tôi là nơi nghỉ dưỡng sức khỏe nên chúng tôi chỉ phục vụ nước ép trái cây tươi và không cung cấp bất kỳ loại rượu nào.\\nHoàn hảo để thư giãn!\\n\\nG Modern Veggie Hostel Nếu bạn muốn tránh chi quá nhiều tiền, ký túc xá thanh niên hiện đại của chúng tôi là lý tưởng.\\nChúng tôi chỉ phục vụ những bữa ăn làm từ thực vật nên những người ăn chay ở đây sẽ rất vui.\\nTòa nhà của chúng tôi nằm trong một khu thương mại hoàn toàn mới với những tòa nhà chọc trời cao và không có di tích lịch sử nào gần đó.\\nTận hưởng cuộc sống thành phố hiện đại!\\n\\nH Quiet Coast Getaway Thức dậy với tiếng sóng vỗ tại khách sạn xinh đẹp bên bờ nước của chúng tôi.\\nThực đơn của chúng tôi có đầy đủ các loại cá và hải sản tươi ngon được đánh bắt cách đó chỉ vài dặm.\\nChúng tôi hứa hẹn một bầu không khí hoàn toàn im lặng, yên bình vào buổi tối, hoàn toàn không có những buổi hòa nhạc hay ban nhạc ồn ào.\\nĐó là nơi an nghỉ cuối cùng.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-H\",\"txtTfngMifList\":\"1. Maria and John want to learn how to prepare traditional meals themselves. They also enjoy walking around outdoor stalls to buy fresh ingredients. In the evenings, they would like to try drinks made from local grapes.\\n2. David loves eating dishes made with fresh fish and wants to stay somewhere right next to the sea. After dinner, he enjoys listening to live bands and singers while he relaxes, so he needs evening entertainment.\\n3. Sarah doesn’t eat meat and needs a holiday that provides excellent vegetarian food. She loves history and wants to explore old buildings during the day. As a student, she only has a small amount of money to spend.\\n4. The Lee family are travelling with two young children and want to stay in the countryside on a working farm. Their kids love sweet things, so they want a trip that includes lessons on baking traditional cakes.\\n5. Antonio enjoys eating hot and spicy dishes. He prefers to stay right in the middle of a busy capital city so he can walk to restaurants. He has plenty of money and expects a very luxurious, top-quality hotel.\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 B   3 C   4 D   5 E\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Historical Site Tours\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">A A Ride Through History Discover the battlegrounds of the 1914-1918 conflict while getting some fresh air and exercise! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">We provide the bikes and helmets for this unique journey. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">At the start of the trip, every guest receives a fantastic pocket-sized reading guide packed with maps and historical details to keep as a special souvenir. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Chuyến đi xuyên lịch sử Khám phá chiến trường của cuộc xung đột 1914-1918 trong khi tận hưởng không khí trong lành và tập thể dục! \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Chúng tôi cung cấp xe đạp và mũ bảo hiểm cho hành trình độc đáo này. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Khi bắt đầu chuyến đi, mỗi du khách sẽ nhận được một cuốn sách hướng dẫn đọc bỏ túi tuyệt vời chứa đầy bản đồ và thông tin chi tiết về lịch sử để lưu giữ làm kỷ niệm đặc biệt. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">B The Front Line Experience Walk through the original dug-out paths where soldiers lived between 1914 and 1918. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">Your leader will be someone who grew up in the nearby village and knows all the hidden stories. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">Afterwards, don’t forget to stop at our fantastic store to pick up some unique presents for your relatives! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">B Trải nghiệm tiền tuyến Đi bộ qua những con đường đào nguyên thủy nơi những người lính sinh sống từ năm 1914 đến năm 1918. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Người lãnh đạo của bạn sẽ là người lớn lên ở ngôi làng gần đó và biết tất cả những câu chuyện ẩn giấu. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Sau đó, đừng quên ghé qua cửa hàng tuyệt vời của chúng tôi để chọn cho mình những món quà độc đáo dành tặng người thân nhé! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">C Heroes of the 1940s Join us for an all-day coach trip exploring the major battle sites of the Second World War. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">We will spend the afternoon walking around a beautiful stone structure built to honour the brave fighters. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">Please note, this is a day trip only, so guests must find their own place to sleep. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">C Những anh hùng của những năm 1940 Hãy cùng chúng tôi tham gia chuyến đi cả ngày bằng xe khách khám phá các địa điểm chiến đấu chính trong Thế chiến thứ hai. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Chúng ta sẽ dành cả buổi chiều đi dạo quanh một công trình kiến ​​trúc bằng đá tuyệt đẹp được xây dựng để tôn vinh những chiến binh dũng cảm. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Xin lưu ý, đây chỉ là chuyến đi trong ngày nên du khách phải tìm chỗ ngủ riêng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">D Dawn Remembrance Tour Focusing entirely on the 1939-1945 battles, this short excursion begins early and finishes perfectly in time for your midday meal. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">The highlight of the journey is a quiet stop at the beautiful national remembrance site, where guests can lay flowers and spend a few quiet moments honouring those who fought. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Chuyến tham quan tưởng nhớ bình minh D Tập trung hoàn toàn vào các trận chiến 1939-1945, chuyến tham quan ngắn này bắt đầu sớm và kết thúc hoàn hảo đúng lúc cho bữa ăn trưa của bạn. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Điểm nhấn của hành trình là điểm dừng chân yên tĩnh tại khu tưởng niệm quốc gia xinh đẹp, nơi du khách có thể đặt hoa và dành những phút giây yên tĩnh để tưởng nhớ những người đã chiến đấu. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">E The Complete Century Tour Spend Saturday and Sunday discovering the events of both the First and Second World Wars. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">The price includes a comfortable bed and breakfast at a local guesthouse. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">During the trip, you will also spend a few hours looking at real uniforms and weapons displayed inside the famous national gallery. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">E Chuyến tham quan thế kỷ trọn vẹn Hãy dành thứ bảy và chủ nhật để khám phá các sự kiện của cả Thế chiến thứ nhất và Thế chiến thứ hai. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Giá bao gồm một chiếc giường và bữa sáng thoải mái tại một nhà khách địa phương. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Trong chuyến đi, bạn cũng sẽ dành vài giờ để ngắm nhìn những bộ đồng phục và vũ khí thật được trưng bày bên trong phòng trưng bày quốc gia nổi tiếng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">F The Great War by Coach Sit back and relax on our luxury bus as we drive you around the famous 1914-1918 battlefields. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">It is a very comfortable way to see the historic sites. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Everyone on board will be handed a detailed, printed magazine containing incredible stories about the soldiers to take away with them. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">F The Great War của Huấn luyện viên Hãy ngồi thư giãn trên chiếc xe buýt sang trọng của chúng tôi khi chúng tôi đưa bạn đi vòng quanh các chiến trường nổi tiếng 1914-1918. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Đó là một cách rất thoải mái để xem các di tích lịch sử. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Mọi người trên tàu sẽ được trao một cuốn tạp chí in chi tiết chứa đựng những câu chuyện đáng kinh ngạc về những người lính để mang theo bên mình. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">G Skies of the Forties Explore the history of military aircraft from the Second World War at our famous old airfield. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">There are no stairs anywhere on the site, making it completely flat and simple for everyone to move around. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">A delicious hot midday meal at our café is also part of your ticket! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">G Skies of the Forties Khám phá lịch sử của máy bay quân sự từ Thế chiến thứ hai tại sân bay cũ nổi tiếng của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Không có cầu thang ở bất cứ đâu trên trang web, khiến nó hoàn toàn bằng phẳng và dễ dàng cho mọi người di chuyển. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Một bữa trưa nóng hổi thơm ngon tại quán cà phê của chúng tôi cũng là một phần trong tấm vé của bạn! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph H\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s0\\\">H The Hidden Bunker Climb down the steep, narrow stairs into a secret underground room used by commanders during the 1940s conflict. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s1\\\">After exploring the dark rooms, you can enjoy a sandwich in our cafe and buy postcards at the gift desk. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s2\\\">Unfortunately, the difficult steps mean this site isn’t suitable for everyone. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t7')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t7\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p7s0\\\" class=\\\"vi-sent\\\">H The Hidden Bunker Leo xuống cầu thang dốc và hẹp vào một căn phòng bí mật dưới lòng đất được các chỉ huy sử dụng trong cuộc xung đột những năm 1940. \\u003c/span>\\u003cspan id=\\\"p7s1\\\" class=\\\"vi-sent\\\">Sau khi khám phá những căn phòng tối, bạn có thể thưởng thức bánh sandwich trong quán cà phê của chúng tôi và mua bưu thiếp tại quầy quà tặng. \\u003c/span>\\u003cspan id=\\\"p7s2\\\" class=\\\"vi-sent\\\">Thật không may, các bước khó có nghĩa là trang web này không phù hợp với tất cả mọi người. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Hans is fascinated by the First World War. He wants to explore the areas on two wheels rather than by bus. He’d also like a printed document full of facts to take home and read later.\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Clara is looking for a tour about the Second World War. She only has a few hours free before lunch. It is very important to her that the trip includes stopping at a monument to remember the soldiers.\",\"options\":[],\"correctAnswer\":\"D\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"David wants to learn about the planes used during the 1940s conflict. He needs a tour that is easy for someone in a wheelchair to use. He would also like lunch to be included in the ticket price.\",\"options\":[],\"correctAnswer\":\"G\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Sarah is studying photography and wants to take pictures of the old fighting ditches from the 1914-1918 war. She prefers having a guide from the area, and she wants the chance to purchase gifts for her family.\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"The Martin family want a weekend trip covering the history of both major twentieth-century wars. They need a tour that provides a hotel to sleep in, and they’d like to look around an indoor exhibition of historical objects.\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFGH\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"A A Ride Through History Discover the battlegrounds of the 1914-1918 conflict while getting some fresh air and exercise!\",\"We provide the bikes and helmets for this unique journey.\",\"At the start of the trip, every guest receives a fantastic pocket-sized reading guide packed with maps and historical details to keep as a special souvenir.\"],\"vi\":[\"Chuyến đi xuyên lịch sử Khám phá chiến trường của cuộc xung đột 1914-1918 trong khi tận hưởng không khí trong lành và tập thể dục!\",\"Chúng tôi cung cấp xe đạp và mũ bảo hiểm cho hành trình độc đáo này.\",\"Khi bắt đầu chuyến đi, mỗi du khách sẽ nhận được một cuốn sách hướng dẫn đọc bỏ túi tuyệt vời chứa đầy bản đồ và thông tin chi tiết về lịch sử để lưu giữ làm kỷ niệm đặc biệt.\"]},{\"en\":[\"B The Front Line Experience Walk through the original dug-out paths where soldiers lived between 1914 and 1918.\",\"Your leader will be someone who grew up in the nearby village and knows all the hidden stories.\",\"Afterwards, don’t forget to stop at our fantastic store to pick up some unique presents for your relatives!\"],\"vi\":[\"B Trải nghiệm tiền tuyến Đi bộ qua những con đường đào nguyên thủy nơi những người lính sinh sống từ năm 1914 đến năm 1918.\",\"Người lãnh đạo của bạn sẽ là người lớn lên ở ngôi làng gần đó và biết tất cả những câu chuyện ẩn giấu.\",\"Sau đó, đừng quên ghé qua cửa hàng tuyệt vời của chúng tôi để chọn cho mình những món quà độc đáo dành tặng người thân nhé!\"]},{\"en\":[\"C Heroes of the 1940s Join us for an all-day coach trip exploring the major battle sites of the Second World War.\",\"We will spend the afternoon walking around a beautiful stone structure built to honour the brave fighters.\",\"Please note, this is a day trip only, so guests must find their own place to sleep.\"],\"vi\":[\"C Những anh hùng của những way to see the historic sites.\",\"Everyone on board will be handed a detailed, printed magazine containing incredible stories about the soldiers to take away with them.\"],\"vi\":[\"F The Great War của Huấn luyện viên Hãy ngồi thư giãn trên chiếc xe buýt sang trọng của chúng tôi khi chúng tôi đưa bạn đi vòng quanh các chiến trường nổi tiếng 1914-1918.\",\"Đó là một cách rất thoải mái để xem các di tích lịch sử.\",\"Mọi người trên tàu sẽ được trao một cuốn tạp chí in chi tiết chứa đựng những câu chuyện đáng kinh ngạc về những người lính để mang theo bên mình.\"]},{\"en\":[\"G Skies of the Forties Explore the history of military aircraft from the Second World War at our famous old airfield.\",\"There are no stairs anywhere on the site, making it completely flat and simple for everyone to move around.\",\"A delicious hot midday meal at our café is also part of your ticket!\"],\"vi\":[\"G Skies of the Forties Khám phá lịch sử của máy bay quân sự từ Thế chiến thứ hai tại sân bay cũ nổi tiếng của chúng tôi.\",\"Không có cầu thang ở bất cứ đâu trên trang web, khiến nó hoàn toàn bằng phẳng và dễ dàng cho mọi người di chuyển.\",\"Một bữa trưa nóng hổi thơm ngon tại quán cà phê của chúng tôi cũng là một phần trong tấm vé của bạn!\"]},{\"en\":[\"H The Hidden Bunker Climb down the steep, narrow stairs into a secret underground room used by commanders during the 1940s conflict.\",\"After exploring the dark rooms, you can enjoy a sandwich in our cafe and buy postcards at the gift desk.\",\"Unfortunately, the difficult steps mean this site isn’t suitable for everyone.\"],\"vi\":[\"H The Hidden Bunker Leo xuống cầu thang dốc và hẹp vào một căn phòng bí mật dưới lòng đất được các chỉ huy sử dụng trong cuộc xung đột những năm 1940.\",\"Sau khi khám phá những căn phòng tối, bạn có thể thưởng thức bánh sandwich trong quán cà phê của chúng tôi và mua bưu thiếp tại quầy quà tặng.\",\"Thật không may, các bước khó có nghĩa là trang web này không phù hợp với tất cả mọi người.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"qTypes\":\"Matching Information: 5\",\"qCount\":5,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"A A Ride Through History\\nDiscover the battlegrounds of the 1914-1918 conflict while getting some fresh air and exercise! We provide the bikes and helmets for this unique journey. At the start of the trip, every guest receives a fantastic pocket-sized reading guide packed with maps and historical details to keep as a special souvenir.\\n\\nB The Front Line Experience\\nWalk through the original dug-out paths where soldiers lived between 1914 and 1918. Your leader will be someone who grew up in the nearby village and knows all the hidden stories. Afterwards, don’t forget to stop at our fantastic store to pick up some unique presents for your relatives!\\n\\nC Heroes of the 1940s\\nJoin us for an all-day coach trip exploring the major battle sites of the Second World War. We will spend the afternoon walking around a beautiful stone structure built to honour the brave fighters. Please note, this is a day trip only, so guests must find their own place to sleep.\\n\\nD Dawn Remembrance Tour\\nFocusing entirely on the 1939-1945 battles, this short excursion begins early and finishes perfectly in time for your midday meal. The highlight of the journey is a quiet stop at the beautiful national remembrance site, where guests can lay flowers and spend a few quiet moments honouring those who fought.\\n\\nE The Complete Century Tour\\nSpend Saturday and Sunday discovering the events of both the First and Second World Wars. The price includes a comfortable bed and breakfast at a local guesthouse. During the trip, you will also spend a few hours looking at real uniforms and weapons displayed inside the famous national gallery.\\n\\nF The Great War by Coach\\nSit back and relax on our luxury bus as we drive you around the famous 1914-1918 battlefields. It is a very comfortable way to see the historic sites. Everyone on board will be handed a detailed, printed magazine containing incredible stories about the soldiers to take away with them.\\n\\nG Skies of the Forties\\nExplore the history of military aircraft from the Second World War at our famous old airfield. There are no stairs anywhere on the site, making it completely flat and simple for everyone to move around. A delicious hot midday meal at our café is also part of your ticket!\\n\\nH The Hidden Bunker\\nClimb down the steep, narrow stairs into a secret underground room used by commanders during the 1940s conflict. After exploring the dark rooms, you can enjoy a sandwich in our cafe and buy postcards at the gift desk. Unfortunately, the difficult steps mean this site isn’t suitable for everyone.\",\"transText\":\"Chuyến đi xuyên lịch sử Khám phá chiến trường của cuộc xung đột 1914-1918 trong khi tận hưởng không khí trong lành và tập thể dục!\\nChúng tôi cung cấp xe đạp và mũ bảo hiểm cho hành trình độc đáo này.\\nKhi bắt đầu chuyến đi, mỗi du khách sẽ nhận được một cuốn sách hướng dẫn đọc bỏ túi tuyệt vời chứa đầy bản đồ và thông tin chi tiết về lịch sử để lưu giữ làm kỷ niệm đặc biệt.\\n\\nB Trải nghiệm tiền tuyến Đi bộ qua những con đường đào nguyên thủy nơi những người lính sinh sống từ năm 1914 đến năm 1918.\\nNgười lãnh đạo của bạn sẽ là người lớn lên ở ngôi làng gần đó và biết tất cả những câu chuyện ẩn giấu.\\nSau đó, đừng quên ghé qua cửa hàng tuyệt vời của chúng tôi để chọn cho mình những món quà độc đáo dành tặng người thân nhé!\\n\\nC Những anh hùng của những năm 1940 Hãy cùng chúng tôi tham gia chuyến đi cả ngày bằng xe khách khám phá các địa điểm chiến đấu chính trong Thế chiến thứ hai.\\nChúng ta sẽ dành cả buổi chiều đi dạo quanh một công trình kiến ​​trúc bằng đá tuyệt đẹp được xây dựng để tôn vinh những chiến binh dũng cảm.\\nXin lưu ý, đây chỉ là chuyến đi trong ngày nên du khách phải tìm chỗ ngủ riêng.\\n\\nChuyến tham quan tưởng nhớ bình minh D Tập trung hoàn toàn vào các trận chiến 1939-1945, chuyến tham quan ngắn này bắt đầu sớm và kết thúc hoàn hảo đúng lúc cho bữa ăn trưa của bạn.\\nĐiểm nhấn của hành trình là điểm dừng chân yên tĩnh tại khu tưởng niệm quốc gia xinh đẹp, nơi du khách có thể đặt hoa và dành những phút giây yên tĩnh để tưởng nhớ những người đã chiến đấu.\\n\\nE Chuyến tham quan thế kỷ trọn vẹn Hãy dành thứ bảy và chủ nhật để khám phá các sự kiện của cả Thế chiến thứ nhất và Thế chiến thứ hai.\\nGiá bao gồm một chiếc giường và bữa sáng thoải mái tại một nhà khách địa phương.\\nTrong chuyến đi, bạn cũng sẽ dành vài giờ để ngắm nhìn những bộ đồng phục và vũ khí thật được trưng bày bên trong phòng trưng bày quốc gia nổi tiếng.\\n\\nF The Great War của Huấn luyện viên Hãy ngồi thư giãn trên chiếc xe buýt sang trọng của chúng tôi khi chúng tôi đưa bạn đi vòng quanh các chiến trường nổi tiếng 1914-1918.\\nĐó là một cách rất thoải mái để xem các di tích lịch sử.\\nMọi người trên tàu sẽ được trao một cuốn tạp chí in chi tiết chứa đựng những câu chuyện đáng kinh ngạc về những người lính để mang theo bên mình.\\n\\nG Skies of the Forties Khám phá lịch sử của máy bay quân sự từ Thế chiến thứ hai tại sân bay cũ nổi tiếng của chúng tôi.\\nKhông có cầu thang ở bất cứ đâu trên trang web, khiến nó hoàn toàn bằng phẳng và dễ dàng cho mọi người di chuyển.\\nMột bữa trưa nóng hổi thơm ngon tại quán cà phê của chúng tôi cũng là một phần trong tấm vé của bạn!\\n\\nH The Hidden Bunker Leo xuống cầu thang dốc và hẹp vào một căn phòng bí mật dưới lòng đất được các chỉ huy sử dụng trong cuộc xung đột những năm 1940.\\nSau khi khám phá những căn phòng tối, bạn có thể thưởng thức bánh sandwich trong quán cà phê của chúng tôi và mua bưu thiếp tại quầy quà tặng.\\nThật không may, các bước khó có nghĩa là trang web này không phù hợp với tất cả mọi người.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-H\",\"txtTfngMifList\":\"1. Hans is fascinated by the First World War. He wants to explore the areas on two wheels rather than by bus. He’d a
