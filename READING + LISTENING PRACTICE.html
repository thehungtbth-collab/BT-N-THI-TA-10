lso like a printed document full of facts to take home and read later.\\n2. Clara is looking for a tour about the Second World War. She only has a few hours free before lunch. It is very important to her that the trip includes stopping at a monument to remember the soldiers.\\n3. David wants to learn about the planes used during the 1940s conflict. He needs a tour that is easy for someone in a wheelchair to use. He would also like lunch to be included in the ticket price.\\n4. Sarah is studying photography and wants to take pictures of the old fighting ditches from the 1914-1918 war. She prefers having a guide from the area, and she wants the chance to purchase gifts for her family.\\n5. The Martin family want a weekend trip covering the history of both major twentieth-century wars. They need a tour that provides a hotel to sleep in, and they’d like to look around an indoor exhibition of historical objects.\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 D   3 G   4 B   5 E\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Movie Location Tours\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">A The Wizard’s Journey Step onto our painted, spell-casting coach for a wonderful ride! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">We will take you directly to the ancient stone fortresses and hidden alleys where the fantasy scenes were actually shot. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">Afterwards, you can explore our gallery, which is filled with original flying brooms, dark cloaks, and wooden sticks used by the actors. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Hành trình của phù thủy Hãy bước lên chiếc xe dùng phép thuật được sơn màu của chúng tôi để có một chuyến đi tuyệt vời! \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Chúng tôi sẽ đưa bạn thẳng đến những pháo đài bằng đá cổ kính và những con hẻm khuất, nơi thực sự đã quay những cảnh giả tưởng. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Sau đó, bạn có thể khám phá phòng trưng bày của chúng tôi, nơi chứa đầy những cây chổi bay nguyên bản, áo choàng đen và gậy gỗ được các diễn viên sử dụng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">B Fantasy World Experience Climb aboard our specially painted, flying-style coach! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">This fantastic trip takes you straight to the historic town squares and bridges where the famous wizard movie was created. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">Unfortunately, our collection of original actor cloaks and wands is currently travelling to another country, so the museum area is completely empty today. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">B Fantasy World Experience Leo lên chiếc huấn luyện viên kiểu bay được sơn đặc biệt của chúng tôi! \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Chuyến đi tuyệt vời này sẽ đưa bạn thẳng đến các quảng trường và cây cầu lịch sử của thị trấn, nơi bộ phim phù thủy nổi tiếng được tạo ra. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Thật không may, bộ sưu tập áo choàng và đũa phép diễn viên gốc của chúng tôi hiện đang du lịch đến một quốc gia khác, vì vậy khu vực bảo tàng hôm nay hoàn toàn trống rỗng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">C Secret Agent Tour Feel like a real hero as you travel the streets in a classic, luxury agent automobile! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">Your driver will show you the exact urban squares and bridges where the exciting chases were filmed. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">You will also get access to an exclusive room showing the hidden cameras and clever tools from the cinema hits. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">C Secret Agent Tour Cảm thấy như một anh hùng thực sự khi bạn đi du lịch trên đường phố trong một chiếc ô tô đặc vụ sang trọng, cổ điển! \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Tài xế sẽ chỉ cho bạn những quảng trường và cây cầu đô thị chính xác nơi quay những cuộc rượt đuổi thú vị. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Bạn cũng sẽ có quyền truy cập vào một căn phòng độc quyền trưng bày các camera ẩn và các công cụ thông minh từ các bộ phim đình đám. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">D Comic Book Heroes Get ready for an amazing adventure! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">You will have the unique chance to sit on the famous two-wheeled, custom motorbike driven by the masked hero. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">You can also admire the colourful capes and tight suits worn on screen. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">However, this is entirely a studio experience, so we do not visit any outside city areas. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">D Comic Book Heroes Hãy sẵn sàng cho một cuộc phiêu lưu kỳ thú! \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Bạn sẽ có cơ hội duy nhất được ngồi trên chiếc xe máy hai bánh nổi tiếng được điều khiển bởi người anh hùng đeo mặt nạ. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Bạn cũng có thể chiêm ngưỡng những chiếc áo choàng đầy màu sắc và những bộ đồ bó sát mặc trên màn ảnh. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">Tuy nhiên, đây hoàn toàn là trải nghiệm tại studio nên chúng tôi không ghé thăm bất kỳ khu vực bên ngoài thành phố nào. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">E Galactic Adventures Board our specially designed rocket-craft rover and blast off! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">We drive you deep into the dry, sandy environment where the famous alien world battles were caught on camera. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">At the visitor centre, you can get close to the incredible plastic armour, laser guns, and pilot uniforms worn during the production. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">E Galactic Adventures Lên chiếc xe tự hành tên lửa được thiết kế đặc biệt của chúng tôi và phóng đi! \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Chúng tôi đưa bạn vào sâu trong môi trường cát khô, nơi các trận chiến nổi tiếng của thế giới ngoài hành tinh được ghi lại trên máy ảnh. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Tại trung tâm du khách, bạn có thể đến gần bộ giáp nhựa, súng laze và đồng phục phi công đáng kinh ngạc được mặc trong quá trình sản xuất. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">F Royal History Cinema Travel back in time by riding in our traditional, animal-pulled cart. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">We will guide you to the magnificent country estates and gardens where your favourite nineteenth-century characters were filmed. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Later, wander through our indoor display to see the incredibly detailed silk gowns and sparkling crowns worn by the famous actresses. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">F Rạp chiếu phim Lịch sử Hoàng gia Du hành ngược thời gian bằng cách cưỡi trên chiếc xe kéo truyền thống do động vật kéo của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Chúng tôi sẽ hướng dẫn bạn đến những khu vườn và điền trang tráng lệ ở vùng nông thôn, nơi các nhân vật thế kỷ 19 bạn yêu thích đã được quay phim. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Sau đó, hãy dạo quanh khu trưng bày trong nhà của chúng tôi để chiêm ngưỡng những chiếc váy lụa cực kỳ chi tiết và những chiếc vương miện lấp lánh được các nữ diễn viên nổi tiếng đội. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">G Classic Times Travel Discover the magnificent ancient properties and beautiful gardens where the famous historical television show was made. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">Inside the main hall, visitors can admire a wonderful collection of handmade silk gowns and original necklaces from the production. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">To keep costs low, all travel between sights is done on a standard, modern public bus. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">G Classic Times Travel Khám phá những di sản cổ kính tráng lệ và những khu vườn xinh đẹp, nơi thực hiện chương trình truyền hình lịch sử nổi tiếng. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Bên trong sảnh chính, du khách có thể chiêm ngưỡng bộ sưu tập tuyệt vời gồm áo choàng lụa thủ công và dây chuyền nguyên bản từ quá trình sản xuất. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Để giữ chi phí ở mức thấp, tất cả việc di chuyển giữa các điểm tham quan đều được thực hiện trên xe buýt công cộng tiêu chuẩn, hiện đại. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph H\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s0\\\">H Defender of the City Experience the thrill of riding the dark, custom-built motorbike used by the famous comic-book star! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s1\\\">We will drive you past the incredible skyscrapers and banks where the massive action scenes were recorded. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s2\\\">Finally, step inside our gallery to view the original plastic masks and heavy boots worn by the actors. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t7')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t7\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p7s0\\\" class=\\\"vi-sent\\\">H Defender of the City Trải nghiệm cảm giác hồi hộp khi lái chiếc mô tô tối màu được chế tạo theo yêu cầu của ngôi sao truyện tranh nổi tiếng! \\u003c/span>\\u003cspan id=\\\"p7s1\\\" class=\\\"vi-sent\\\">Chúng tôi sẽ đưa bạn đi qua những tòa nhà chọc trời và ngân hàng đáng kinh ngạc, nơi đã ghi lại những cảnh hành động hoành tráng. \\u003c/span>\\u003cspan id=\\\"p7s2\\\" class=\\\"vi-sent\\\">Cuối cùng, hãy bước vào phòng trưng bày của chúng tôi để xem những chiếc mặt nạ nhựa nguyên bản và đôi ủng nặng nề mà các diễn viên đã đeo. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Anna loves movies about magic. She wants to see the actual streets and castles used in her favourite films. She also hopes to look at the real wands and costumes, and she wants to travel around in a magical-looking bus.\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Leo is a huge fan of spy movies. He wants to explore the exact city areas where the action was recorded. He is eager to examine the secret gadgets on display, and he insists on riding in a famous secret agent’s car.\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"The Smith family enjoys science fiction. They want to walk through the desert where the alien planet scenes were recorded. They also want to view original astronaut suits on display, and they hope to travel in a vehicle shaped like a spaceship.\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Maria loves historical films. She wants to visit the ancient houses where the actors worked. She also hopes to admire the beautiful old dresses and jewellery saved from the movie, and she wants to ride in an old-fashioned horse-drawn carriage.\",\"options\":[],\"correctAnswer\":\"F\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"David is crazy about superhero films. He wants to see the tall buildings where the hero fought the bad guys. He also wants to look at the original hero masks, and he wants to ride the hero’s special custom motorcycle.\",\"options\":[],\"correctAnswer\":\"H\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFGH\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"A The Wizard’s Journey Step onto our painted, spell-casting coach for a wonderful ride!\",\"We will take you directly to the ancient stone fortresses and hidden alleys where the fantasy scenes were actually shot.\",\"Afterwards, you can explore our gallery, which is filled with original flying brooms, dark cloaks, and wooden sticks used by the actors.\"],\"vi\":[\"Hành trình của phù thủy Hãy bước lên chiếc xe dùng phép thuật được sơn màu của chúng tôi để có một chuyến đi tuyệt vời!\",\"Chúng tôi sẽ đưa bạn thẳng đến những pháo đài bằng đá cổ kính và những con hẻm khuất, nơi thực sự đã quay những cảnh giả tưởng.\",\"Sau đó, bạn có thể khám phá phòng trưng bày của chúng tôi, nơi chứa đầy những cây chổi bay nguyên bản, áo choàng đen và gậy gỗ được các diễn viên sử dụng.\"]},{\"en\":[\"B Fantasy World Experience Climb aboard our specially painted, flying-style coach!\",\"This fantastic trip takes you straight to the historic town squares and bridges where the famous wizard movie was created.\",\"Unfortunately, our collection of original actor cloaks and wands is currently travelling to another country, so the museum area is completely empty today.\"],\"vi\":[\"B Fantasy World Experience Leo lên chiếc huấn luyện viên kiểu bay được sơn đặc biệt của chúng tôi!\",\"Chuyến đi tuyệt vời này sẽ đưa bạn thẳng đến các quảng trường và cây cầu lịch sử của thị trấn, nơi bộ phim phù thủy nổi tiếng được tạo ra.\",\"Thật không may, bộ sưu tập áo choàng và đũa phép diễn viên gốc của chúng tôi hiện đang du lịch đến một quốc gia khác, vì vậy khu vực bảo tàng hôm nay hoàn toàn trống rỗng.\"]},{\"en\":[\"C Secret Agent Tour Feel like a real hero as you travel the streets in a classic, luxury agent automobile!\",\"Your driver will show you the exact urban squares and bridges where the exciting chases were filmed.\",\"You will also get access to an exclusive room showing the hidden cameras and clever tools from the cinema hits.\"],\"vi\":[\"C Secret Agent Tour Cảm thấy như một anh hùng thực sự khi bạn đi du lịch trên đường phố trong một chiếc ô tô đặc vụ sang trọng, cổ điển!\",\"Tài xế sẽ chỉ cho bạn những quảng trường và cây cầu đô thị chính xác nơi quay những cuộc rượt đuổi thú vị.\",\"Bạn cũng sẽ có quyền truy cập vào một căn phòng độc quyền trưng bày các camera ẩn và các công cụ thông minh từ các bộ phim đình đám.\"]},{\"en\":[\"D Comic Book Heroes Get ready for an amazing adventure!\",\"You will have the unique chance to sit on the famous two-wheeled, custom motorbike driven by the masked hero.\",\"You can also admire the colourful capes and tight suits worn on screen.\",\"However, this is entirely a studio experience, so we do not visit any outside city areas.\"],\"vi\":[\"D Comic Book Heroes Hãy sẵn sàng cho một cuộc phiêu lưu kỳ thú!\",\"Bạn sẽ có cơ hội duy nhất được ngồi trên chiếc xe máy hai bánh nổi tiếng được điều khiển bởi người anh hùng đeo mặt nạ.\",\"Bạn cũng có thể chiêm ngưỡng những chiếc áo choàng đầy màu sắc và những bộ đồ bó sát mặc trên màn ảnh.\",\"Tuy nhiên, đây hoàn toàn là trải nghiệm tại studio nên chúng tôi không ghé thăm bất kỳ khu vực bên ngoài thành phố nào.\"]},{\"en\":[\"E Galactic Adventures Board our specially designed rocket-craft rover and blast off!\",\"We drive you deep into the dry, sandy environment where the famous alien world battles were caught on camera.\",\"At the visitor centre, you can get close to the incredible plastic armour, laser guns, and pilot uniforms worn during the production.\"],\"vi\":[\"E Galactic Adventures Lên chiếc xe tự hành tên lửa được thiết kế đặc biệt của chúng tôi và phóng đi!\",\"Chúng tôi đưa bạn vào sâu trong môi trường cát khô, nơi các trận chiến nổi tiếng của thế giới ngoài hành tinh được ghi lại trên máy ảnh.\",\"Tại trung tâm du khách, bạn có thể đến gần bộ giáp nhựa, súng laze và đồng phục phi công đáng kinh ngạc được mặc trong quá trình sản xuất.\"]},{\"en\":[\"F Royal History Cinema Travel back in time by riding in our traditional, animal-pulled cart.\",\"We will guide you to the magnificent country estates and gardens where your favourite nineteenth-century characters were filmed.\",\"Later, wander through our indoor display to see the incredibly detailed silk gowns and sparkling crowns worn by the famous actresses.\"],\"vi\":[\"F Rạp chiếu phim Lịch sử Hoàng gia Du hành ngược thời gian bằng cách cưỡi trên chiếc xe kéo truyền thống do động vật kéo của chúng tôi.\",\"Chúng tôi sẽ hướng dẫn bạn đến những khu vườn và điền trang tráng lệ ở vùng nông thôn, nơi các nhân vật thế kỷ 19 bạn yêu thích đã được quay phim.\",\"Sau đó, hãy dạo quanh khu trưng bày trong nhà của chúng tôi để chiêm ngưỡng những chiếc váy lụa cực kỳ chi tiết và những chiếc vương miện lấp lánh được các nữ diễn viên nổi tiếng đội.\"]},{\"en\":[\"G Classic Times Travel Discover the magnificent ancient properties and beautiful gardens where the famous historical television show was made.\",\"Inside the main hall, visitors can admire a wonderful collection of handmade silk gowns and original necklaces from the production.\",\"To keep costs low, all travel between sights is done on a standard, modern public bus.\"],\"vi\":[\"G Classic Times Travel Khám phá những di sản cổ kính tráng lệ và những khu vườn xinh đẹp, nơi thực hiện chương trình truyền hình lịch sử nổi tiếng.\",\"Bên trong sảnh chính, du khách có thể chiêm ngưỡng bộ sưu tập tuyệt vời gồm áo choàng lụa thủ công và dây chuyền nguyên bản từ quá trình sản xuất.\",\"Để giữ chi phí ở mức thấp, tất cả việc di chuyển giữa các điểm tham quan đều được thực hiện trên xe buýt công cộng tiêu chuẩn, hiện đại.\"]},{\"en\":[\"H Defender of the City Experience the thrill of riding the dark, custom-built motorbike used by the famous comic-book star!\",\"We will drive you past the incredible skyscrapers and banks where the massive action scenes were recorded.\",\"Finally, step inside our gallery to view the original plastic masks and heavy boots worn by the actors.\"],\"vi\":[\"H Defender of the City Trải nghiệm cảm giác hồi hộp khi lái chiếc mô tô tối màu được chế tạo theo yêu cầu của ngôi sao truyện tranh nổi tiếng!\",\"Chúng tôi sẽ đưa bạn đi qua những tòa nhà chọc trời và ngân hàng đáng kinh ngạc, nơi đã ghi lại những cảnh hành động hoành tráng.\",\"Cuối cùng, hãy bước vào phòng trưng bày của chúng tôi để xem những chiếc mặt nạ nhựa nguyên bản và đôi ủng nặng nề mà các diễn viên đã đeo.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"qTypes\":\"Matching Information: 5\",\"qCount\":5,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"A The Wizard’s Journey\\nStep onto our painted, spell-casting coach for a wonderful ride! We will take you directly to the ancient stone fortresses and hidden alleys where the fantasy scenes were actually shot. Afterwards, you can explore our gallery, which is filled with original flying brooms, dark cloaks, and wooden sticks used by the actors.\\n\\nB Fantasy World Experience\\nClimb aboard our specially painted, flying-style coach! This fantastic trip takes you straight to the historic town squares and bridges where the famous wizard movie was created. Unfortunately, our collection of original actor cloaks and wands is currently travelling to another country, so the museum area is completely empty today.\\n\\nC Secret Agent Tour\\nFeel like a real hero as you travel the streets in a classic, luxury agent automobile! Your driver will show you the exact urban squares and bridges where the exciting chases were filmed. You will also get access to an exclusive room showing the hidden cameras and clever tools from the cinema hits.\\n\\nD Comic Book Heroes\\nGet ready for an amazing adventure! You will have the unique chance to sit on the famous two-wheeled, custom motorbike driven by the masked hero. You can also admire the colourful capes and tight suits worn on screen. However, this is entirely a studio experience, so we do not visit any outside city areas.\\n\\nE Galactic Adventures\\nBoard our specially designed rocket-craft rover and blast off! We drive you deep into the dry, sandy environment where the famous alien world battles were caught on camera. At the visitor centre, you can get close to the incredible plastic armour, laser guns, and pilot uniforms worn during the production.\\n\\nF Royal History Cinema\\nTravel back in time by riding in our traditional, animal-pulled cart. We will guide you to the magnificent country estates and gardens where your favourite nineteenth-century characters were filmed. Later, wander through our indoor display to see the incredibly detailed silk gowns and sparkling crowns worn by the famous actresses.\\n\\nG Classic Times Travel\\nDiscover the magnificent ancient properties and beautiful gardens where the famous historical television show was made. Inside the main hall, visitors can admire a wonderful collection of handmade silk gowns and original necklaces from the production. To keep costs low, all travel between sights is done on a standard, modern public bus.\\n\\nH Defender of the City\\nExperience the thrill of riding the dark, custom-built motorbike used by the famous comic-book star! We will drive you past the incredible skyscrapers and banks where the massive action scenes were recorded. Finally, step inside our gallery to view the original plastic masks and heavy boots worn by the actors.\",\"transText\":\"Hành trình của phù thủy Hãy bước lên chiếc xe dùng phép thuật được sơn màu của chúng tôi để có một chuyến đi tuyệt vời!\\nChúng tôi sẽ đưa bạn thẳng đến những pháo đài bằng đá cổ kính và những con hẻm khuất, nơi thực sự đã quay những cảnh giả tưởng.\\nSau đó, bạn có thể khám phá phòng trưng bày của chúng tôi, nơi chứa đầy những cây chổi bay nguyên bản, áo choàng đen và gậy gỗ được các diễn viên sử dụng.\\n\\nB Fantasy World Experience Leo lên chiếc huấn luyện viên kiểu bay được sơn đặc biệt của chúng tôi!\\nChuyến đi tuyệt vời này sẽ đưa bạn thẳng đến các quảng trường và cây cầu lịch sử của thị trấn, nơi bộ phim phù thủy nổi tiếng được tạo ra.\\nThật không may, bộ sưu tập áo choàng và đũa phép diễn viên gốc của chúng tôi hiện đang du lịch đến một quốc gia khác, vì vậy khu vực bảo tàng hôm nay hoàn toàn trống rỗng.\\n\\nC Secret Agent Tour Cảm thấy như một anh hùng thực sự khi bạn đi du lịch trên đường phố trong một chiếc ô tô đặc vụ sang trọng, cổ điển!\\nTài xế sẽ chỉ cho bạn những quảng trường và cây cầu đô thị chính xác nơi quay những cuộc rượt đuổi thú vị.\\nBạn cũng sẽ có quyền truy cập vào một căn phòng độc quyền trưng bày các camera ẩn và các công cụ thông minh từ các bộ phim đình đám.\\n\\nD Comic Book Heroes Hãy sẵn sàng cho một cuộc phiêu lưu kỳ thú!\\nBạn sẽ có cơ hội duy nhất được ngồi trên chiếc xe máy hai bánh nổi tiếng được điều khiển bởi người anh hùng đeo mặt nạ.\\nBạn cũng có thể chiêm ngưỡng những chiếc áo choàng đầy màu sắc và những bộ đồ bó sát mặc trên màn ảnh.\\nTuy nhiên, đây hoàn toàn là trải nghiệm tại studio nên chúng tôi không ghé thăm bất kỳ khu vực bên ngoài thành phố nào.\\n\\nE Galactic Adventures Lên chiếc xe tự hành tên lửa được thiết kế đặc biệt của chúng tôi và phóng đi!\\nChúng tôi đưa bạn vào sâu trong môi trường cát khô, nơi các trận chiến nổi tiếng của thế giới ngoài hành tinh được ghi lại trên máy ảnh.\\nTại trung tâm du khách, bạn có thể đến gần bộ giáp nhựa, súng laze và đồng phục phi công đáng kinh ngạc được mặc trong quá trình sản xuất.\\n\\nF Rạp chiếu phim Lịch sử Hoàng gia Du hành ngược thời gian bằng cách cưỡi trên chiếc xe kéo truyền thống do động vật kéo của chúng tôi.\\nChúng tôi sẽ hướng dẫn bạn đến những khu vườn và điền trang tráng lệ ở vùng nông thôn, nơi các nhân vật thế kỷ 19 bạn yêu thích đã được quay phim.\\nSau đó, hãy dạo quanh khu trưng bày trong nhà của chúng tôi để chiêm ngưỡng những chiếc váy lụa cực kỳ chi tiết và những chiếc vương miện lấp lánh được các nữ diễn viên nổi tiếng đội.\\n\\nG Classic Times Travel Khám phá những di sản cổ kính tráng lệ và những khu vườn xinh đẹp, nơi thực hiện chương trình truyền hình lịch sử nổi tiếng.\\nBên trong sảnh chính, du khách có thể chiêm ngưỡng bộ sưu tập tuyệt vời gồm áo choàng lụa thủ công và dây chuyền nguyên bản từ quá trình sản xuất.\\nĐể giữ chi phí ở mức thấp, tất cả việc di chuyển giữa các điểm tham quan đều được thực hiện trên xe buýt công cộng tiêu chuẩn, hiện đại.\\n\\nH Defender of the City Trải nghiệm cảm giác hồi hộp khi lái chiếc mô tô tối màu được chế tạo theo yêu cầu của ngôi sao truyện tranh nổi tiếng!\\nChúng tôi sẽ đưa bạn đi qua những tòa nhà chọc trời và ngân hàng đáng kinh ngạc, nơi đã ghi lại những cảnh hành động hoành tráng.\\nCuối cùng, hãy bước vào phòng trưng bày của chúng tôi để xem những chiếc mặt nạ nhựa nguyên bản và đôi ủng nặng nề mà các diễn viên đã đeo.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-H\",\"txtTfngMifList\":\"1. Anna loves movies about magic. She wants to see the actual streets and castles used in her favourite films. She also hopes to look at the real wands and costumes, and she wants to travel around in a magical-looking bus.\\n2. Leo is a huge fan of spy movies. He wants to explore the exact city areas where the action was recorded. He is eager to examine the secret gadgets on display, and he insists on riding in a famous secret agent’s car.\\n3. The Smith family enjoys science fiction. They want to walk through the desert where the alien planet scenes were recorded. They also want to view original astronaut suits on display, and they hope to travel in a vehicle shaped like a spaceship.\\n4. Maria loves historical films. She wants to visit the ancient houses where the actors worked. She also hopes to admire the beautiful old dresses and jewellery saved from the movie, and she wants to ride in an old-fashioned horse-drawn carriage.\\n5. David is crazy about superhero films. He wants to see the tall buildings where the hero fought the bad guys. He also wants to look at the original hero masks, and he wants to ride the hero’s special custom motorcycle.\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 C   3 E   4 F   5 H\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Literature-Themed Holidays\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">A The Author’s Haven Come and tour the beautiful 19th-century cottage where a legendary storyteller spent his life. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">Relax in the gardens while local artists perform beautiful verses every morning. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">Before heading home, visit our partner shops in the village, where our guests receive excellent price reductions on all types of literature. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">A The Author's Haven Hãy đến và tham quan ngôi nhà nhỏ xinh đẹp có từ thế kỷ 19, nơi một người kể chuyện huyền thoại đã sống cả đời. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Thư giãn trong khu vườn trong khi các nghệ sĩ địa phương biểu diễn những bài thơ hay vào mỗi buổi sáng. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Trước khi về nhà, hãy ghé thăm các cửa hàng đối tác của chúng tôi trong làng, nơi khách của chúng tôi được giảm giá tuyệt vời cho tất cả các loại tài liệu. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">B Verse & Village This fantastic Saturday tour is perfect for travelers looking for a quick end-of-week getaway. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">Walk through the historic streets and stop to enjoy our popular outdoor sessions of spoken poetry. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">You’ll also receive a special voucher, allowing you to pay much less for novels and textbooks at any local book seller. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">B Verse & Village Chuyến tham quan thứ bảy tuyệt vời này là nơi hoàn hảo cho những du khách đang tìm kiếm một nơi nghỉ ngơi cuối tuần nhanh chóng. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Đi bộ qua những con phố lịch sử và dừng lại để thưởng thức những buổi đọc thơ ngoài trời nổi tiếng của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Bạn cũng sẽ nhận được một phiếu giảm giá đặc biệt, cho phép bạn trả ít hơn nhiều cho sách và tiểu thuyết tại bất kỳ người bán sách địa phương nào. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">C The Quiet Page Escape the noisy city crowds at this deeply calm and isolated rural retreat. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">Guests can explore the historic house where a famous writer grew up centuries ago. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">Our package also includes a brilliant discount card, which gives you amazing price cuts on any items you buy at the charming independent bookstalls nearby. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">C The Quiet Page Thoát khỏi đám đông ồn ào của thành phố tại nơi ẩn náu ở vùng nông thôn yên tĩnh và biệt lập sâu sắc này. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Du khách có thể khám phá ngôi nhà lịch sử nơi một nhà văn nổi tiếng đã lớn lên từ nhiều thế kỷ trước. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Gói của chúng tôi cũng bao gồm một thẻ giảm giá tuyệt vời, giúp bạn giảm giá đáng kinh ngạc cho bất kỳ mặt hàng nào bạn mua tại các hiệu sách độc lập quyến rũ gần đó. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">D Poet’s Corner Studio Bring your camera along to capture magnificent images of the ancient wooden desk where a famous author created her masterpieces. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">Later, sit back and listen to dramatic readings of classical rhymes by professional performers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">Photography is fully permitted everywhere on this historic property, making it an ideal destination for creative minds. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">D Poet's Corner Studio Hãy mang theo máy ảnh của bạn để ghi lại những hình ảnh tuyệt đẹp về chiếc bàn gỗ cổ kính, nơi một tác giả nổi tiếng đã tạo ra những kiệt tác của mình. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Sau đó, hãy ngồi lại và lắng nghe những bài đồng dao cổ điển đầy kịch tính của những nghệ sĩ biểu diễn chuyên nghiệp. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Việc chụp ảnh được cho phép hoàn toàn ở mọi nơi trên khu đất lịch sử này, khiến nơi đây trở thành điểm đến lý tưởng cho những bộ óc sáng tạo. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">E The Creative Budget This highly affordable trip is wonderful for anybody looking to save money. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">Experience the excitement of our live evening verse recitals, where top authors perform on stage. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">Guests can also participate in a practical, hands-on seminar led by an expert teacher to help develop their own skills in fiction writing. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">E Ngân sách sáng tạo Chuyến đi có giá cả phải chăng này thật tuyệt vời cho bất kỳ ai muốn tiết kiệm tiền. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Trải nghiệm cảm giác phấn khích khi đọc thơ trực tiếp vào buổi tối, nơi các tác giả hàng đầu biểu diễn trên sân khấu. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Du khách cũng có thể tham gia vào một buổi hội thảo thực hành, thực tế do một giáo viên chuyên nghiệp chủ trì để giúp phát triển kỹ năng viết tiểu thuyết của chính họ. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">F Classic Tales Step inside the spectacular historic home of our region’s most celebrated playwright. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">Visitors can enjoy live outdoor readings of romantic poetry throughout the day. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Please note that there are no book sellers or shops in this isolated village, so all items must be purchased online at standard prices before arrival. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">F Những câu chuyện cổ điển Bước vào bên trong ngôi nhà lịch sử ngoạn mục của nhà viết kịch nổi tiếng nhất khu vực của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Du khách có thể thưởng thức các bài thơ lãng mạn ngoài trời trực tiếp suốt cả ngày. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Xin lưu ý rằng không có người bán sách hay cửa hàng nào ở ngôi làng biệt lập này nên tất cả các mặt hàng phải được mua trực tuyến với giá tiêu chuẩn trước khi đến. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">G The Book Bazaar This lively destination is a dream for modern readers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">Enjoy magnificent outdoor verse performances every afternoon. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">You’ll get a special card for massive discounts at every bookshop in the center. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s3\\\">Please note these events only take place from Monday to Wednesday, and the area is closed completely at weekends. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">G The Book Bazaar Điểm đến sôi động này là niềm mơ ước của những độc giả hiện đại. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Thưởng thức các buổi biểu diễn thơ ngoài trời hoành tráng vào mỗi buổi chiều. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Bạn sẽ nhận được một thẻ đặc biệt với mức giảm giá lớn tại mọi hiệu sách trong trung tâm. \\u003c/span>\\u003cspan id=\\\"p6s3\\\" class=\\\"vi-sent\\\">Xin lưu ý những sự kiện này chỉ diễn ra từ thứ Hai đến thứ Tư và khu vực này đóng cửa hoàn toàn vào cuối tuần. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph H\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s0\\\">H Childhood Memories Explore the brilliant childhood home of a famous novelist and enjoy our wonderful afternoon poetry recitals. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s1\\\">This historic destination is perfect for literature lovers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s2\\\">However, to protect the ancient artwork and furniture, all cameras and mobile phones are strictly banned, and taking pictures is completely forbidden inside the building. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t7')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t7\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p7s0\\\" class=\\\"vi-sent\\\">H Ký ức tuổi thơ Khám phá ngôi nhà tuổi thơ rực rỡ của một tiểu thuyết gia nổi tiếng và thưởng thức những buổi ngâm thơ tuyệt vời vào buổi chiều. \\u003c/span>\\u003cspan id=\\\"p7s1\\\" class=\\\"vi-sent\\\">Điểm đến lịch sử này là nơi hoàn hảo cho những người yêu thích văn học. \\u003c/span>\\u003cspan id=\\\"p7s2\\\" class=\\\"vi-sent\\\">Tuy nhiên, để bảo vệ các tác phẩm nghệ thuật và đồ nội thất cổ, tất cả máy ảnh và điện thoại di động đều bị nghiêm cấm và việc chụp ảnh bị cấm hoàn toàn trong tòa nhà. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Alice wants a trip where she can look inside the house of a famous novelist. She also loves listening to live poetry performances and hopes to get a cheaper price when buying novels at local stores.\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"George wants to visit a town known for literature during his weekend break on Saturday. He enjoys listening to people read poems aloud and wants to spend less money on new books during his trip.\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"Emma loves peaceful locations without large crowds. She wants to explore the birthplace of a classic author and is looking for a holiday that offers special price reductions at nearby bookshops to save money.\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Harry wants a literature holiday where he can take photographs of historic settings. He wants to visit the cottage where a writer worked and listen to actors read poems in the afternoon.\",\"options\":[],\"correctAnswer\":\"D\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Mia is looking for a low-cost holiday that is not too expensive. She wants to watch poets perform their work live and would also love to join an interactive lesson to practice writing her own short stories.\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFGH\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"A The Author’s Haven Come and tour the beautiful 19th-century cottage where a legendary storyteller spent his life.\",\"Relax in the gardens while local artists perform beautiful verses every morning.\",\"Before heading home, visit our partner shops in the village, where our guests receive excellent price reductions on all types of literature.\"],\"vi\":[\"A The Author's Haven Hãy đến và tham quan ngôi nhà nhỏ xinh đẹp có từ thế kỷ 19, nơi một người kể chuyện huyền thoại đã sống cả đời.\",\"Thư giãn trong khu vườn trong khi các nghệ sĩ địa phương biểu diễn những bài thơ hay vào mỗi buổi sáng.\",\"Trước khi về nhà, hãy ghé thăm các cửa hàng đối tác của chúng tôi trong làng, nơi khách của chúng tôi được giảm giá tuyệt vời cho tất cả các loại tài liệu.\"]},{\"en\":[\"B Verse & Village This fantastic Saturday tour is perfect for travelers looking for a quick end-of-week getaway.\",\"Walk through the historic streets and stop to enjoy our popular outdoor sessions of spoken poetry.\",\"You’ll also receive a special voucher, allowing you to pay much less for novels and textbooks at any local book seller.\"],\"vi\":[\"B Verse & Village Chuyến tham quan thứ bảy tuyệt vời này là nơi hoàn hảo cho những du khách đang tìm kiếm một nơi nghỉ ngơi cuối tuần nhanh chóng.\",\"Đi bộ qua những con phố lịch sử và dừng lại để thưởng thức những buổi đọc thơ ngoài trời nổi tiếng của chúng tôi.\",\"Bạn cũng sẽ nhận được một phiếu giảm giá đặc biệt, cho phép bạn trả ít hơn nhiều cho sách và tiểu thuyết tại bất kỳ người bán sách địa phương nào.\"]},{\"en\":[\"C The Quiet Page Escape the noisy city crowds at this deeply calm and isolated rural retreat.\",\"Guests can explore the historic house where a famous writer grew up centuries ago.\",\"Our package also includes a brilliant discount card, which gives you amazing price cuts on any items you buy at the charming independent bookstalls nearby.\"],\"vi\":[\"C The Quiet Page Thoát khỏi đám đông ồn ào của thành phố tại nơi ẩn náu ở vùng nông thôn yên tĩnh và biệt lập sâu sắc này.\",\"Du khách có thể khám phá ngôi nhà lịch sử nơi một nhà văn nổi tiếng đã lớn lên từ nhiều thế kỷ trước.\",\"Gói của chúng tôi cũng bao gồm một thẻ giảm giá tuyệt vời, giúp bạn giảm giá đáng kinh ngạc cho bất kỳ mặt hàng nào bạn mua tại các hiệu sách độc lập quyến rũ gần đó.\"]},{\"en\":[\"D Poet’s Corner Studio Bring your camera along to capture magnificent images of the ancient wooden desk where a famous author created her masterpieces.\",\"Later, sit back and listen to dramatic readings of classical rhymes by professional performers.\",\"Photography is fully permitted everywhere on this historic property, making it an ideal destination for creative minds.\"],\"vi\":[\"D Poet's Corner Studio Hãy mang theo máy ảnh của bạn để ghi lại những hình ảnh tuyệt đẹp về chiếc bàn gỗ cổ kính, nơi một tác giả nổi tiếng đã tạo ra những kiệt tác của mình.\",\"Sau đó, hãy ngồi lại và lắng nghe những bài đồng dao cổ điển đầy kịch tính của những nghệ sĩ biểu diễn chuyên nghiệp.\",\"Việc chụp ảnh được cho phép hoàn toàn ở mọi nơi trên khu đất lịch sử này, khiến nơi đây trở thành điểm đến lý tưởng cho những bộ óc sáng tạo.\"]},{\"en\":[\"E The Creative Budget This highly affordable trip is wonderful for anybody looking to save money.\",\"Experience the excitement of our live evening verse recitals, where top authors perform on stage.\",\"Guests can also participate in a practical, hands-on seminar led by an expert teacher to help develop their own skills in fiction writing.\"],\"vi\":[\"E Ngân sách sáng tạo Chuyến đi có giá cả phải chăng này thật tuyệt vời cho bất kỳ ai muốn tiết kiệm tiền.\",\"Trải nghiệm cảm giác phấn khích khi đọc thơ trực tiếp vào buổi tối, nơi các tác giả hàng đầu biểu diễn trên sân khấu.\",\"Du khách cũng có thể tham gia vào một buổi hội thảo thực hành, thực tế do một giáo viên chuyên nghiệp chủ trì để giúp phát triển kỹ năng viết tiểu thuyết của chính họ.\"]},{\"en\":[\"F Classic Tales Step inside the spectacular historic home of our region’s most celebrated playwright.\",\"Visitors can enjoy live outdoor readings of romantic poetry throughout the day.\",\"Please note that there are no book sellers or shops in this isolated village, so all items must be purchased online at standard prices before arrival.\"],\"vi\":[\"F Những câu chuyện cổ điển Bước vào bên trong ngôi nhà lịch sử ngoạn mục của nhà viết kịch nổi tiếng nhất khu vực của chúng tôi.\",\"Du khách có thể thưởng thức các bài thơ lãng mạn ngoài trời trực tiếp suốt cả ngày.\",\"Xin lưu ý rằng không có người bán sách hay cửa hàng nào ở ngôi làng biệt lập này nên tất cả các mặt hàng phải được mua trực tuyến với giá tiêu chuẩn trước khi đến.\"]},{\"en\":[\"G The Book Bazaar This lively destination is a dream for modern readers.\",\"Enjoy magnificent outdoor verse performances every afternoon.\",\"You’ll get a special card for massive discounts at every bookshop in the center.\",\"Please note these events only take place from Monday to Wednesday, and the area is closed completely at weekends.\"],\"vi\":[\"G The Book Bazaar Điểm đến sôi động này là niềm mơ ước của những độc giả hiện đại.\",\"Thưởng thức các buổi biểu diễn thơ ngoài trời hoành tráng vào mỗi buổi chiều.\",\"Bạn sẽ nhận được một thẻ đặc biệt với mức giảm giá lớn tại mọi hiệu sách trong trung tâm.\",\"Xin lưu ý những sự kiện này chỉ diễn ra từ thứ Hai đến thứ Tư và khu vực này đóng cửa hoàn toàn vào cuối tuần.\"]},{\"en\":[\"H Childhood Memories Explore the brilliant childhood home of a famous novelist and enjoy our wonderful afternoon poetry recitals.\",\"This historic destination is perfect for literature lovers.\",\"However, to protect the ancient artwork and furniture, all cameras and mobile phones are strictly banned, and taking pictures is completely forbidden inside the building.\"],\"vi\":[\"H Ký ức tuổi thơ Khám phá ngôi nhà tuổi thơ rực rỡ của một tiểu thuyết gia nổi tiếng và thưởng thức những buổi ngâm thơ tuyệt vời vào buổi chiều.\",\"Điểm đến lịch sử này là nơi hoàn hảo cho những người yêu thích văn học.\",\"Tuy nhiên, để bảo vệ các tác phẩm nghệ thuật và đồ nội thất cổ, tất cả máy ảnh và điện thoại di động đều bị nghiêm cấm và việc chụp ảnh bị cấm hoàn toàn trong tòa nhà.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"qTypes\":\"Matching Information: 5\",\"qCount\":5,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"A The Author’s Haven\\nCome and tour the beautiful 19th-century cottage where a legendary storyteller spent his life. Relax in the gardens while local artists perform beautiful verses every morning. Before heading home, visit our partner shops in the village, where our guests receive excellent price reductions on all types of literature.\\n\\nB Verse & Village\\nThis fantastic Saturday tour is perfect for travelers looking for a quick end-of-week getaway. Walk through the historic streets and stop to enjoy our popular outdoor sessions of spoken poetry. You’ll also receive a special voucher, allowing you to pay much less for novels and textbooks at any local book seller.\\n\\nC The Quiet Page\\nEscape the noisy city crowds at this deeply calm and isolated rural retreat. Guests can explore the historic house where a famous writer grew up centuries ago. Our package also includes a brilliant discount card, which gives you amazing price cuts on any items you buy at the charming independent bookstalls nearby.\\n\\nD Poet’s Corner Studio\\nBring your camera along to capture magnificent images of the ancient wooden desk where a famous author created her masterpieces. Later, sit back and listen to dramatic readings of classical rhymes by professional performers. Photography is fully permitted everywhere on this historic property, making it an ideal destination for creative minds.\\n\\nE The Creative Budget\\nThis highly affordable trip is wonderful for anybody looking to save money. Experience the excitement of our live evening verse recitals, where top authors perform on stage. Guests can also participate in a practical, hands-on seminar led by an expert teacher to help develop their own skills in fiction writing.\\n\\nF Classic Tales\\nStep inside the spectacular historic home of our region’s most celebrated playwright. Visitors can enjoy live outdoor readings of romantic poetry throughout the day. Please note that there are no book sellers or shops in this isolated village, so all items must be purchased online at standard prices before arrival.\\n\\nG The Book Bazaar\\nThis lively destination is a dream for modern readers. Enjoy magnificent outdoor verse performances every afternoon. You’ll get a special card for massive discounts at every bookshop in the center. Please note these events only take place from Monday to Wednesday, and the area is closed completely at weekends.\\n\\nH Childhood Memories\\nExplore the brilliant childhood home of a famous novelist and enjoy our wonderful afternoon poetry recitals. This historic destination is perfect for literature lovers. However, to protect the ancient artwork and furniture, all cameras and mobile phones are strictly banned, and taking pictures is completely forbidden inside the building.\",\"transText\":\"A The Author's Haven Hãy đến và tham quan ngôi nhà nhỏ xinh đẹp có từ thế kỷ 19, nơi một người kể chuyện huyền thoại đã sống cả đời.\\nThư giãn trong khu vườn trong khi các nghệ sĩ địa phương biểu diễn những bài thơ hay vào mỗi buổi sáng.\\nTrước khi về nhà, hãy ghé thăm các cửa hàng đối tác của chúng tôi trong làng, nơi khách của chúng tôi được giảm giá tuyệt vời cho tất cả các loại tài liệu.\\n\\nB Verse & Village Chuyến tham quan thứ bảy tuyệt vời này là nơi hoàn hảo cho những du khách đang tìm kiếm một nơi nghỉ ngơi cuối tuần nhanh chóng.\\nĐi bộ qua những con phố lịch sử và dừng lại để thưởng thức những buổi đọc thơ ngoài trời nổi tiếng của chúng tôi.\\nBạn cũng sẽ nhận được một phiếu giảm giá đặc biệt, cho phép bạn trả ít hơn nhiều cho sách và tiểu thuyết tại bất kỳ người bán sách địa phương nào.\\n\\nC The Quiet Page Thoát khỏi đám đông ồn ào của thành phố tại nơi ẩn náu ở vùng nông thôn yên tĩnh và biệt lập sâu sắc này.\\nDu khách có thể khám phá ngôi nhà lịch sử nơi một nhà văn nổi tiếng đã lớn lên từ nhiều thế kỷ trước.\\nGói của chúng tôi cũng bao gồm một thẻ giảm giá tuyệt vời, giúp bạn giảm giá đáng kinh ngạc cho bất kỳ mặt hàng nào bạn mua tại các hiệu sách độc lập quyến rũ gần đó.\\n\\nD Poet's Corner Studio Hãy mang theo máy ảnh của bạn để ghi lại những hình ảnh tuyệt đẹp về chiếc bàn gỗ cổ kính, nơi một tác giả nổi tiếng đã tạo ra những kiệt tác của mình.\\nSau đó, hãy ngồi lại và lắng nghe những bài đồng dao cổ điển đầy kịch tính của những nghệ sĩ biểu diễn chuyên nghiệp.\\nViệc chụp ảnh được cho phép hoàn toàn ở mọi nơi trên khu đất lịch sử này, khiến nơi đây trở thành điểm đến lý tưởng cho những bộ óc sáng tạo.\\n\\nE Ngân sách sáng tạo Chuyến đi có giá cả phải chăng này thật tuyệt vời cho bất kỳ ai muốn tiết kiệm tiền.\\nTrải nghiệm cảm giác phấn khích khi đọc thơ trực tiếp vào buổi tối, nơi các tác giả hàng đầu biểu diễn trên sân khấu.\\nDu khách cũng có thể tham gia vào một buổi hội thảo thực hành, thực tế do một giáo viên chuyên nghiệp chủ trì để giúp phát triển kỹ năng viết tiểu thuyết của chính họ.\\n\\nF Những câu chuyện cổ điển Bước vào bên trong ngôi nhà lịch sử ngoạn mục của nhà viết kịch nổi tiếng nhất khu vực của chúng tôi.\\nDu khách có thể thưởng thức các bài thơ lãng mạn ngoài trời trực tiếp suốt cả ngày.\\nXin lưu ý rằng không có người bán sách hay cửa hàng nào ở ngôi làng biệt lập này nên tất cả các mặt hàng phải được mua trực tuyến với giá tiêu chuẩn trước khi đến.\\n\\nG The Book Bazaar Điểm đến sôi động này là niềm mơ ước của những độc giả hiện đại.\\nThưởng thức các buổi biểu diễn thơ ngoài trời hoành tráng vào mỗi buổi chiều.\\nBạn sẽ nhận được một thẻ đặc biệt với mức giảm giá lớn tại mọi hiệu sách trong trung tâm.\\nXin lưu ý những sự kiện này chỉ diễn ra từ thứ Hai đến thứ Tư và khu vực này đóng cửa hoàn toàn vào cuối tuần.\\n\\nH Ký ức tuổi thơ Khám phá ngôi nhà tuổi thơ rực rỡ của một tiểu thuyết gia nổi tiếng và thưởng thức những buổi ngâm thơ tuyệt vời vào buổi chiều.\\nĐiểm đến lịch sử này là nơi hoàn hảo cho những người yêu thích văn học.\\nTuy nhiên, để bảo vệ các tác phẩm nghệ thuật và đồ nội thất cổ, tất cả máy ảnh và điện thoại di động đều bị nghiêm cấm và việc chụp ảnh bị cấm hoàn toàn trong tòa nhà.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-H\",\"txtTfngMifList\":\"1. Alice wants a trip where she can look inside the house of a famous novelist. She also loves listening to live poetry performances and hopes to get a cheaper price when buying novels at local stores.\\n2. George wants to visit a town known for literature during his weekend break on Saturday. He enjoys listening to people read poems aloud and wants to spend less money on new books during his trip.\\n3. Emma loves peaceful locations without large crowds. She wants to explore the birthplace of a classic author and is looking for a holiday that offers special price reductions at nearby bookshops to save money.\\n4. Harry wants a literature holiday where he can take photographs of historic settings. He wants to visit the cottage where a writer worked and listen to actors read poems in the afternoon.\\n5. Mia is looking for a low-cost holiday that is not too expensive. She wants to watch poets perform their work live and would also love to join an interactive lesson to practice writing her own short stories.\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 B   3 C   4 D   5 E\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Spooky Tours\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">A Dark Streets Walk Join our late evening stroll through the oldest parts of the city. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">Our guides tell terrifying accounts of dark events from the past that will shock you. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">This outdoor trip is very low cost, making it perfect for anyone looking for a cheap night out. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">We do not enter any castles or museums. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Đi bộ trên những con phố tối tăm Hãy tham gia chuyến đi dạo buổi tối muộn của chúng tôi qua những khu vực cổ nhất của thành phố. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Hướng dẫn viên của chúng tôi kể những câu chuyện đáng sợ về những sự kiện đen tối trong quá khứ sẽ khiến bạn sốc. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Chuyến đi ngoài trời này có chi phí rất thấp, khiến nó trở nên hoàn hảo cho những ai đang tìm kiếm một đêm vui chơi tiết kiệm. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Chúng tôi không vào bất kỳ lâu đài hoặc bảo tàng nào. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">B Fortress Ghost Legends Spend a wonderful Saturday or Sunday afternoon exploring our beautiful historic castle. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">Walk through the ancient stone rooms where spirits are said to live. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">The ticket price includes a traditional two-course lunch in our grand dining room. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">This daytime excursion is ideal for families who prefer to avoid the dark. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">B Fortress Ghost Legends Hãy dành một buổi chiều thứ bảy hoặc chủ nhật tuyệt vời để khám phá lâu đài lịch sử xinh đẹp của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Đi bộ qua những căn phòng bằng đá cổ xưa, nơi được cho là nơi các linh hồn sinh sống. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Giá vé bao gồm bữa trưa hai món truyền thống trong phòng ăn lớn của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Chuyến tham quan ban ngày này rất lý tưởng cho những gia đình muốn tránh bóng tối. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">C Mystery River Tour Discover the town’s secrets after dark on this unique evening walking tour. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">Instead of simple ghost stories, you will solve historic puzzles and strange crimes from centuries ago. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">The journey also features a wonderful thirty-minute ride on our comfortable passenger boat, allowing you to view the lit-up monuments from the water. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">C Mystery River Tour Khám phá bí mật của thị trấn sau khi trời tối trong chuyến đi bộ buổi tối độc đáo này. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Thay vì những câu chuyện ma quái đơn giản, bạn sẽ giải được những câu đố lịch sử và những tội ác kỳ lạ từ nhiều thế kỷ trước. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Hành trình còn có chuyến đi tuyệt vời kéo dài 30 phút trên chiếc thuyền chở khách thoải mái của chúng tôi, cho phép bạn ngắm nhìn các di tích được thắp sáng từ mặt nước. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">D Palace of Terror Prepare to be frightened inside this spectacular old stone palace! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">Live performers hide in the shadows to bring terrifying historical legends to life before your eyes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">Every room inside this haunted historic building has flat floors and modern ramps, ensuring visitors with wheelchairs can enjoy the full experience without trouble. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">D Cung điện khủng bố Hãy sẵn sàng để sợ hãi bên trong cung điện bằng đá cổ kính ngoạn mục này! \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Những người biểu diễn trực tiếp ẩn mình trong bóng tối để mang đến những truyền thuyết lịch sử đáng sợ cho cuộc sống trước mắt bạn. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Mỗi phòng bên trong tòa nhà lịch sử bị ma ám này đều có sàn phẳng và đường dốc hiện đại, đảm bảo du khách sử dụng xe lăn có thể tận hưởng trải nghiệm trọn vẹn mà không gặp rắc rối. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">E Silent Ruins Exploration Explore our spectacular ancient stone tower and ruins at midnight. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">There are no loud tour guides on this late trip. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">Instead, visitors receive a link to download an interactive smartphone app containing maps and historical details. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s3\\\">Walk at your own speed through the dark spaces while reading the digital text. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">E Khám phá tàn tích im lặng Khám phá tháp đá cổ ngoạn mục và tàn tích của chúng tôi vào lúc nửa đêm. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Không có hướng dẫn viên du lịch ồn ào trong chuyến đi muộn này. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Thay vào đó, khách truy cập nhận được liên kết để tải xuống ứng dụng điện thoại thông minh tương tác có chứa bản đồ và thông tin chi tiết về lịch sử. \\u003c/span>\\u003cspan id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Đi theo tốc độ của riêng bạn qua không gian tối trong khi đọc văn bản kỹ thuật số. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">F Midnight Castle Tales Our late-night walking tours offer incredibly frightening tales about the city’s ghosts that will make you scream. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">We finish the evening by entering a magnificent old stone fortress to see the dungeon. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Please note that our premium tickets are quite expensive, and we do not offer any student discounts. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">F Những câu chuyện về lâu đài lúc nửa đêm Các chuyến đi bộ đêm khuya của chúng tôi mang đến những câu chuyện cực kỳ đáng sợ về những bóng ma của thành phố khiến bạn phải hét lên. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Chúng tôi kết thúc buổi tối bằng cách bước vào một pháo đài cổ bằng đá tráng lệ để xem ngục tối. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Xin lưu ý rằng vé cao cấp của chúng tôi khá đắt và chúng tôi không cung cấp bất kỳ khoản giảm giá nào cho sinh viên. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">G Historic Palace Walk Tour this beautiful ancient palace during a quiet afternoon walk. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">The entire route is flat and fully accessible for wheelchair users. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">Learn about the peaceful kings who lived here centuries ago through our detailed information boards. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s3\\\">Please note that we do not offer any scary stories, food, or live actors here. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">G Historic Palace Walk Tham quan cung điện cổ kính xinh đẹp này trong chuyến đi dạo buổi chiều yên tĩnh. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Toàn bộ tuyến đường bằng phẳng và hoàn toàn có thể tiếp cận cho người sử dụng xe lăn. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Tìm hiểu về những vị vua hòa bình đã sống ở đây từ nhiều thế kỷ trước thông qua bảng thông tin chi tiết của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p6s3\\\" class=\\\"vi-sent\\\">Xin lưu ý rằng chúng tôi không cung cấp bất kỳ câu chuyện đáng sợ, đồ ăn hoặc diễn viên trực tiếp nào ở đây. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph H\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s0\\\">H Morning Secrets Cruise Wake up early for our popular 9 a.m. tour! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s1\\\">We begin with an entertaining cruise on a river boat to see the local wildlife. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s2\\\">Afterward, your guide will lead you on a walk to solve fascinating historical mysteries and puzzles around the old town square. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s3\\\">This non-scary trip is perfect for early risers. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t7')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t7\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p7s0\\\" class=\\\"vi-sent\\\">H Morning Secrets Cruise Thức dậy sớm cho chuyến tham quan nổi tiếng lúc 9 giờ sáng của chúng tôi! \\u003c/span>\\u003cspan id=\\\"p7s1\\\" class=\\\"vi-sent\\\">Chúng tôi bắt đầu bằng một chuyến du ngoạn thú vị trên thuyền sông để ngắm nhìn đời sống hoang dã địa phương. \\u003c/span>\\u003cspan id=\\\"p7s2\\\" class=\\\"vi-sent\\\">Sau đó, hướng dẫn viên sẽ dẫn bạn đi dạo để giải quyết những bí ẩn và câu đố lịch sử hấp dẫn xung quanh quảng trường phố cổ. \\u003c/span>\\u003cspan id=\\\"p7s3\\\" class=\\\"vi-sent\\\">Chuyến đi không đáng sợ này là hoàn hảo cho những người dậy sớm. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Sam wants an evening walking tour that features truly frightening tales about the city’s past. He is on a tight budget and needs a ticket that is cheap, but he does not want to visit any buildings.\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Lucy and her mum want to visit an ancient fortress famous for its ghosts. They prefer a daytime trip on Saturday or Sunday and would love to have a hot meal included as part of their experience.\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"George wants an exciting night walk that focuses on historical mysteries and puzzles rather than terrifying legends. He is also keen on a tour that includes a short trip along the river on a boat.\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"The adult Clark family wants to explore a spooky historic palace filled with terrifying tales and live actors. Since one family member uses a wheelchair, the entire route inside the old building must be fully accessible.\",\"options\":[],\"correctAnswer\":\"D\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Hannah wants a late-night tour to look at ancient stone ruins. She doesn’t want a guide talking the whole time and prefers using her smartphone to read a digital map and guidebook provided by the company.\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFGH\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"A Dark Streets Walk Join our late evening stroll through the oldest parts of the city.\",\"Our guides tell terrifying accounts of dark events from the past that will shock you.\",\"This outdoor trip is very low cost, making it perfect for anyone looking for a cheap night out.\",\"We do not enter any castles or museums.\"],\"vi\":[\"Đi bộ trên những con phố tối tăm Hãy tham gia chuyến đi dạo buổi tối muộn của chúng tôi qua những khu vực cổ nhất của thành phố.\",\"Hướng dẫn viên của chúng tôi kể những câu chuyện đáng sợ về những sự kiện đen tối trong quá khứ sẽ khiến bạn sốc.\",\"Chuyến đi ngoài trời này có chi phí rất thấp, khiến nó trở nên hoàn hảo cho những ai đang tìm kiếm một đêm vui chơi tiết kiệm.\",\"Chúng tôi không vào bất kỳ lâu đài hoặc bảo tàng nào.\"]},{\"en\":[\"B Fortress Ghost Legends Spend a wonderful Saturday or Sunday afternoon exploring our beautiful historic castle.\",\"Walk through the ancient stone rooms where spirits are said to live.\",\"The ticket price includes a traditional two-course lunch in our grand dining room.\",\"This daytime excursion is ideal for families who prefer to avoid the dark.\"],\"vi\":[\"B Fortress Ghost Legends Hãy dành một buổi chiều thứ bảy hoặc chủ nhật tuyệt vời để khám phá lâu đài lịch sử xinh đẹp của chúng tôi.\",\"Đi bộ qua những căn phòng bằng đá cổ xưa, nơi được cho là nơi các linh hồn sinh sống.\",\"Giá vé bao gồm bữa trưa hai món truyền thống trong phòng ăn lớn của chúng tôi.\",\"Chuyến tham quan ban ngày này rất lý tưởng cho những gia đình muốn tránh bóng tối.\"]},{\"en\":[\"C Mystery River Tour Discover the town’s secrets after dark on this unique evening walking tour.\",\"Instead of simple ghost stories, you will solve historic puzzles and strange crimes from centuries ago.\",\"The journey also features a wonderful thirty-minute ride on our comfortable passenger boat, allowing you to view the lit-up monuments from the water.\"],\"vi\":[\"C Mystery River Tour Khám phá bí mật của thị trấn sau khi trời tối trong chuyến đi bộ buổi tối độc đáo này.\",\"Thay vì những câu chuyện ma quái đơn giản, bạn sẽ giải được những câu đố lịch sử và những tội ác kỳ lạ từ nhiều thế kỷ trước.\",\"Hành trình còn có chuyến đi tuyệt vời kéo dài 30 phút trên chiếc thuyền chở khách thoải mái của chúng tôi, cho phép bạn ngắm nhìn các di tích được thắp sáng từ mặt nước.\"]},{\"en\":[\"D Palace of Terror Prepare to be frightened inside this spectacular old stone palace!\",\"Live performers hide in the shadows to bring terrifying historical legends to life before your eyes.\",\"Every room inside this haunted historic building has flat floors and modern ramps, ensuring visitors with wheelchairs can enjoy the full experience without trouble.\"],\"vi\":[\"D Cung điện khủng bố Hãy sẵn sàng để sợ hãi bên trong cung điện bằng đá cổ kính ngoạn mục này!\",\"Những người biểu diễn trực tiếp ẩn mình trong bóng tối để mang đến những truyền thuyết lịch sử đáng sợ cho cuộc sống trước mắt bạn.\",\"Mỗi phòng bên trong tòa nhà lịch sử bị ma ám này đều có sàn phẳng và đường dốc hiện đại, đảm bảo du khách sử dụng xe lăn có thể tận hưởng trải nghiệm trọn vẹn mà không gặp rắc rối.\"]},{\"en\":[\"E Silent Ruins Exploration Explore our spectacular ancient stone tower and ruins at midnight.\",\"There are no loud tour guides on this late trip.\",\"Instead, visitors receive a link to download an interactive smartphone app containing maps and historical details.\",\"Walk at your own speed through the dark spaces while reading the digital text.\"],\"vi\":[\"E Khám phá tàn tích im lặng Khám phá tháp đá cổ ngoạn mục và tàn tích của chúng tôi vào lúc nửa đêm.\",\"Không có hướng dẫn viên du lịch ồn ào trong chuyến đi muộn này.\",\"Thay vào đó, khách truy cập nhận được liên kết để tải xuống ứng dụng điện thoại thông minh tương tác có chứa bản đồ và thông tin chi tiết về lịch sử.\",\"Đi theo tốc độ của riêng bạn qua không gian tối trong khi đọc văn bản kỹ thuật số.\"]},{\"en\":[\"F Midnight Castle Tales Our late-night walking tours offer incredibly frightening tales about the city’s ghosts that will make you scream.\",\"We finish the evening by entering a magnificent old stone fortress to see the dungeon.\",\"Please note that our premium tickets are quite expensive, and we do not offer any student discounts.\"],\"vi\":[\"F Những câu chuyện về lâu đài lúc nửa đêm Các chuyến đi bộ đêm khuya của chúng tôi mang đến những câu chuyện cực kỳ đáng sợ về những bóng ma của thành phố khiến bạn phải hét lên.\",\"Chúng tôi kết thúc buổi tối bằng cách bước vào một pháo đài cổ bằng đá tráng lệ để xem ngục tối.\",\"Xin lưu ý rằng vé cao cấp của chúng tôi khá đắt và chúng tôi không cung cấp bất kỳ khoản giảm giá nào cho sinh viên.\"]},{\"en\":[\"G Historic Palace Walk Tour this beautiful ancient palace during a quiet afternoon walk.\",\"The entire route is flat and fully accessible for wheelchair users.\",\"Learn about the peaceful kings who lived here centuries ago through our detailed information boards.\",\"Please note that we do not offer any scary stories, food, or live actors here.\"],\"vi\":[\"G Historic Palace Walk Tham quan cung điện cổ kính xinh đẹp này trong chuyến đi dạo buổi chiều yên tĩnh.\",\"Toàn bộ tuyến đường bằng phẳng và hoàn toàn có thể tiếp cận cho người sử dụng xe lăn.\",\"Tìm hiểu về những vị vua hòa bình đã sống ở đây từ nhiều thế kỷ trước thông qua bảng thông tin chi tiết của chúng tôi.\",\"Xin lưu ý rằng chúng tôi không cung cấp bất kỳ câu chuyện đáng sợ, đồ ăn hoặc diễn viên trực tiếp nào ở đây.\"]},{\"en\":[\"H Morning Secrets Cruise Wake up early for our popular 9 a.m. tour!\",\"We begin with an entertaining cruise on a river boat to see the local wildlife.\",\"Afterward, your guide will lead you on a walk to solve fascinating historical mysteries and puzzles around the old town square.\",\"This non-scary trip is perfect for early risers.\"],\"vi\":[\"H Morning Secrets Cruise Thức dậy sớm cho chuyến tham quan nổi tiếng lúc 9 giờ sáng của chúng tôi!\",\"Chúng tôi bắt đầu bằng một chuyến du ngoạn thú vị trên thuyền sông để ngắm nhìn đời sống hoang dã địa phương.\",\"Sau đó, hướng dẫn viên sẽ dẫn bạn đi dạo để giải quyết những bí ẩn và câu đố lịch sử hấp dẫn xung quanh quảng trường phố cổ.\",\"Chuyến đi không đáng sợ này là hoàn hảo cho những người dậy sớm.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":5}],\"qTypes\":\"Matching Information: 5\",\"qCount\":5,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"A Dark Streets Walk\\nJoin our late evening stroll through the oldest parts of the city. Our guides tell terrifying accounts of dark events from the past that will shock you. This outdoor trip is very low cost, making it perfect for anyone looking for a cheap night out. We do not enter any castles
