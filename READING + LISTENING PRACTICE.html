 big park in the centre of town.\",\"There are so many beautiful flowers and tall green spaces to see!\",\"Usually, I meet my neighbours there and we stop to say a quick hello.\",\"It is much friendlier than walking alone.\",\"After the park, I walk down the high street.\",\"I always visit the little store on the corner to pick up a new comic or magazine before I finally go inside my house.\"],\"vi\":[\"Mia My đi bộ về mất khá nhiều thời gian nhưng tôi thực sự thích thú.\",\"Tôi đi qua công viên lớn ở trung tâm thị trấn.\",\"Có rất nhiều bông hoa đẹp và không gian xanh cao để xem!\",\"Thông thường, tôi gặp hàng xóm ở đó và chúng tôi dừng lại để chào nhanh.\",\"Nó thân thiện hơn nhiều so với việc đi bộ một mình.\",\"Sau công viên, tôi đi bộ xuống đường cao tốc.\",\"Tôi luôn ghé qua cửa hàng nhỏ ở góc phố để mua một cuốn truyện tranh hoặc tạp chí mới trước khi vào nhà.\"]},{\"en\":[\"Noah When I finish my classes, I immediately put on my headphones.\",\"I love hearing funny podcasts or audio shows on my mobile while I walk.\",\"Because of this, I rarely pause to chat with anyone on my journey.\",\"I usually carry a heavy reading book in my bag, so I don’t go to any shops to get more things.\",\"The best part of my afternoon is walking next to the long city canal.\",\"Seeing the boats go up and down is very relaxing, even though the main road next to it is quite loud.\"],\"vi\":[\"Noah Khi kết thúc buổi học, tôi lập tức đeo tai nghe vào.\",\"Tôi thích nghe những podcast hoặc chương trình âm thanh vui nhộn trên điện thoại di động khi đang đi bộ.\",\"Vì vậy, tôi hiếm khi dừng lại để trò chuyện với bất kỳ ai trên hành trình của mình.\",\"Tôi thường mang theo một cuốn sách đọc nặng trong túi nên tôi không đến bất kỳ cửa hàng nào để mua thêm đồ.\",\"Điều tuyệt vời nhất trong buổi chiều của tôi là đi dạo cạnh con kênh dài của thành phố.\",\"Nhìn những chiếc thuyền lên xuống rất thư giãn, mặc dù con đường chính bên cạnh khá ồn ào.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"Leo\\nI always take the same streets after school. It isn’t the most beautiful way to go, but it takes the least amount of time to get to my front door. I don’t go by the river because that makes the journey much longer. My path goes behind the city library and through some small streets. I love it because there is almost no traffic, so it is really peaceful. I prefer not to wear headphones or play any music because I just like to hear the birds singing.\\n\\nMia\\nMy walk back takes quite a long time, but I really enjoy it. I go through the big park in the centre of town. There are so many beautiful flowers and tall green spaces to see! Usually, I meet my neighbours there and we stop to say a quick hello. It is much friendlier than walking alone. After the park, I walk down the high street. I always visit the little store on the corner to pick up a new comic or magazine before I finally go inside my house.\\n\\nNoah\\nWhen I finish my classes, I immediately put on my headphones. I love hearing funny podcasts or audio shows on my mobile while I walk. Because of this, I rarely pause to chat with anyone on my journey. I usually carry a heavy reading book in my bag, so I don’t go to any shops to get more things. The best part of my afternoon is walking next to the long city canal. Seeing the boats go up and down is very relaxing, even though the main road next to it is quite loud.\",\"transText\":\"Leo Tôi luôn đi trên những con phố giống nhau sau giờ học.\\nĐó không phải là con đường đẹp nhất để đi nhưng lại mất ít thời gian nhất để đến được cửa trước của tôi.\\nTôi không đi bằng đường sông vì điều đó khiến cuộc hành trình dài hơn nhiều.\\nCon đường của tôi đi phía sau thư viện thành phố và xuyên qua một số con phố nhỏ.\\nTôi thích nó vì hầu như không có xe cộ qua lại nên rất yên bình.\\nTôi không thích đeo tai nghe hay bật bất kỳ bản nhạc nào vì tôi chỉ thích nghe tiếng chim hót.\\n\\nMia My đi bộ về mất khá nhiều thời gian nhưng tôi thực sự thích thú.\\nTôi đi qua công viên lớn ở trung tâm thị trấn.\\nCó rất nhiều bông hoa đẹp và không gian xanh cao để xem!\\nThông thường, tôi gặp hàng xóm ở đó và chúng tôi dừng lại để chào nhanh.\\nNó thân thiện hơn nhiều so với việc đi bộ một mình.\\nSau công viên, tôi đi bộ xuống đường cao tốc.\\nTôi luôn ghé qua cửa hàng nhỏ ở góc phố để mua một cuốn truyện tranh hoặc tạp chí mới trước khi vào nhà.\\n\\nNoah Khi kết thúc buổi học, tôi lập tức đeo tai nghe vào.\\nTôi thích nghe những podcast hoặc chương trình âm thanh vui nhộn trên điện thoại di động khi đang đi bộ.\\nVì vậy, tôi hiếm khi dừng lại để trò chuyện với bất kỳ ai trên hành trình của mình.\\nTôi thường mang theo một cuốn sách đọc nặng trong túi nên tôi không đến bất kỳ cửa hàng nào để mua thêm đồ.\\nĐiều tuyệt vời nhất trong buổi chiều của tôi là đi dạo cạnh con kênh dài của thành phố.\\nNhìn những chiếc thuyền lên xuống rất thư giãn, mặc dù con đường chính bên cạnh khá ồn ào.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Which person walks past a place to buy something to read?\\n2. Who says their route is the fastest way back?\\n3. Which person walks near some water on their journey?\\n4. Who stops to talk to people on their walk?\\n5. Which person thinks their route is very quiet?\\n6. Who listens to something while they are walking?\\n7. Which person enjoys looking at plants and trees?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 B   2 A   3 C   4 B   5 A   6 C   7 B\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Saturday Morning Markets\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">David I always wake up at six o’clock on Saturdays. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">I like to reach the market square by seven because it is nice and quiet. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">Later in the morning, there are just too many noisy shoppers! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">I never take the bus or drive my car; stepping out of my front door and using my legs is a great way to start the weekend. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">The first thing I always do is find my favourite café stall. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s5\\\">They make delicious tea, and holding the cup stops my hands from getting cold. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s6\\\">I sometimes see people with guitars playing, but I don’t stop to watch them. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">David Tôi luôn thức dậy lúc sáu giờ vào ngày thứ bảy. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Tôi thích đến quảng trường chợ lúc bảy giờ vì nó đẹp và yên tĩnh. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Vào buổi sáng muộn, có quá nhiều người mua sắm ồn ào! \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Tôi không bao giờ đi xe buýt hay lái ô tô; bước ra khỏi cửa trước và sử dụng đôi chân của mình là một cách tuyệt vời để bắt đầu ngày cuối tuần. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Việc đầu tiên tôi luôn làm là tìm quán cà phê yêu thích của mình. \\u003c/span>\\u003cspan id=\\\"p0s5\\\" class=\\\"vi-sent\\\">Họ pha trà thơm ngon, cầm cốc lên tay tôi không bị lạnh. \\u003c/span>\\u003cspan id=\\\"p0s6\\\" class=\\\"vi-sent\\\">Đôi khi tôi thấy mọi người chơi guitar nhưng tôi không dừng lại để xem họ. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Elena Saturday mornings are perfect for sleeping late, so I usually drive to the market at around eleven o’clock. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">It is very crowded, but I don’t mind! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">I don’t usually shop for myself. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">Instead, I spend my pocket money on nice things for my mother or a small toy for my little brother. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s4\\\">While I look around, there are usually bands singing wonderful songs, and I always stand and enjoy their tunes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s5\\\">I often get a glass of cold orange juice while I listen. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s6\\\">I’d love to bring my cat, but she doesn’t like noisy places. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Elena sáng thứ bảy là thời điểm hoàn hảo để ngủ muộn nên tôi thường lái xe tới chợ vào khoảng 11 giờ. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Nó rất đông đúc, nhưng tôi không bận tâm! \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Tôi thường không mua sắm cho chính mình. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Thay vào đó, tôi tiêu tiền tiêu vặt của mình vào những món đồ xinh xắn cho mẹ hoặc một món đồ chơi nhỏ cho em trai. \\u003c/span>\\u003cspan id=\\\"p1s4\\\" class=\\\"vi-sent\\\">Khi tôi nhìn xung quanh, thường có những ban nhạc hát những bài hát tuyệt vời, và tôi luôn đứng và thưởng thức giai điệu của họ. \\u003c/span>\\u003cspan id=\\\"p1s5\\\" class=\\\"vi-sent\\\">Tôi thường uống một ly nước cam lạnh trong khi lắng nghe. \\u003c/span>\\u003cspan id=\\\"p1s6\\\" class=\\\"vi-sent\\\">Tôi muốn mang theo con mèo của mình nhưng nó không thích những nơi ồn ào. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Finn My house is a bit far from the market, so I usually catch the train there on Saturday mornings. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">I can’t go alone because my dog, Buster, always wants to come with me. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">He loves smelling the fresh vegetables! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">I never look for fresh food, though. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">My favourite stalls are the ones selling books from many years ago or clothes that someone else wore before. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">I love finding these treasures! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s6\\\">I never buy hot tea or coffee for myself while I am there, only cold water. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Finn Nhà tôi hơi xa chợ nên tôi thường bắt tàu ở đó vào sáng thứ bảy. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Tôi không thể đi một mình vì con chó Buster của tôi luôn muốn đi cùng tôi. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Anh ấy thích ngửi mùi rau tươi! \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Tuy nhiên, tôi không bao giờ tìm kiếm thực phẩm tươi sống. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Những gian hàng tôi yêu thích nhất là những quầy bán sách từ nhiều năm trước hoặc những bộ quần áo mà người khác đã mặc trước đó. \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Tôi thích tìm kiếm những kho báu này! \\u003c/span>\\u003cspan id=\\\"p2s6\\\" class=\\\"vi-sent\\\">Tôi không bao giờ mua trà hoặc cà phê nóng cho mình khi ở đó, chỉ có nước lạnh. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Who gets a warm drink at the market?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1,\"mifTargets\":[]},{\"id\":2,\"type\":\"mif\",\"text\":\"Who goes to the market with a pet?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2,\"mifTargets\":[]},{\"id\":3,\"type\":\"mif\",\"text\":\"Which person buys things that are not new?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3,\"mifTargets\":[]},{\"id\":4,\"type\":\"mif\",\"text\":\"Who enjoys listening to people playing music?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4,\"mifTargets\":[]},{\"id\":5,\"type\":\"mif\",\"text\":\"Which person buys presents for their family?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5,\"mifTargets\":[]},{\"id\":6,\"type\":\"mif\",\"text\":\"Who arrives at the market before there are a lot of people?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6,\"mifTargets\":[]},{\"id\":7,\"type\":\"mif\",\"text\":\"Which person walks to the market?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7,\"mifTargets\":[]}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"David I always wake up at six o’clock on Saturdays.\",\"I like to reach the market square by seven because it is nice and quiet.\",\"Later in the morning, there are just too many noisy shoppers!\",\"I never take the bus or drive my car; stepping out of my front door and using my legs is a great way to start the weekend.\",\"The first thing I always do is find my favourite café stall.\",\"They make delicious tea, and holding the cup stops my hands from getting cold.\",\"I sometimes see people with guitars playing, but I don’t stop to watch them.\"],\"vi\":[\"David Tôi luôn thức dậy lúc sáu giờ vào ngày thứ bảy.\",\"Tôi thích đến quảng trường chợ lúc bảy giờ vì nó đẹp và yên tĩnh.\",\"Vào buổi sáng muộn, có quá nhiều người mua sắm ồn ào!\",\"Tôi không bao giờ đi xe buýt hay lái ô tô; bước ra khỏi cửa trước và sử dụng đôi chân của mình là một cách tuyệt vời để bắt đầu ngày cuối tuần.\",\"Việc đầu tiên tôi luôn làm là tìm quán cà phê yêu thích của mình.\",\"Họ pha trà thơm ngon, cầm cốc lên tay tôi không bị lạnh.\",\"Đôi khi tôi thấy mọi người chơi guitar nhưng tôi không dừng lại để xem họ.\"]},{\"en\":[\"Elena Saturday mornings are perfect for sleeping late, so I usually drive to the market at around eleven o’clock.\",\"It is very crowded, but I don’t mind!\",\"I don’t usually shop for myself.\",\"Instead, I spend my pocket money on nice things for my mother or a small toy for my little brother.\",\"While I look around, there are usually bands singing wonderful songs, and I always stand and enjoy their tunes.\",\"I often get a glass of cold orange juice while I listen.\",\"I’d love to bring my cat, but she doesn’t like noisy places.\"],\"vi\":[\"Elena sáng thứ bảy là thời điểm hoàn hảo để ngủ muộn nên tôi thường lái xe tới chợ vào khoảng 11 giờ.\",\"Nó rất đông đúc, nhưng tôi không bận tâm!\",\"Tôi thường không mua sắm cho chính mình.\",\"Thay vào đó, tôi tiêu tiền tiêu vặt của mình vào những món đồ xinh xắn cho mẹ hoặc một món đồ chơi nhỏ cho em trai.\",\"Khi tôi nhìn xung quanh, thường có những ban nhạc hát những bài hát tuyệt vời, và tôi luôn đứng và thưởng thức giai điệu của họ.\",\"Tôi thường uống một ly nước cam lạnh trong khi lắng nghe.\",\"Tôi muốn mang theo con mèo của mình nhưng nó không thích những nơi ồn ào.\"]},{\"en\":[\"Finn My house is a bit far from the market, so I usually catch the train there on Saturday mornings.\",\"I can’t go alone because my dog, Buster, always wants to come with me.\",\"He loves smelling the fresh vegetables!\",\"I never look for fresh food, though.\",\"My favourite stalls are the ones selling books from many years ago or clothes that someone else wore before.\",\"I love finding these treasures!\",\"I never buy hot tea or coffee for myself while I am there, only cold water.\"],\"vi\":[\"Finn Nhà tôi hơi xa chợ nên tôi thường bắt tàu ở đó vào sáng thứ bảy.\",\"Tôi không thể đi một mình vì con chó Buster của tôi luôn muốn đi cùng tôi.\",\"Anh ấy thích ngửi mùi rau tươi!\",\"Tuy nhiên, tôi không bao giờ tìm kiếm thực phẩm tươi sống.\",\"Những gian hàng tôi yêu thích nhất là những quầy bán sách từ nhiều năm trước hoặc những bộ quần áo mà người khác đã mặc trước đó.\",\"Tôi thích tìm kiếm những kho báu này!\",\"Tôi không bao giờ mua trà hoặc cà phê nóng cho mình khi ở đó, chỉ có nước lạnh.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"David\\nI always wake up at six o’clock on Saturdays. I like to reach the market square by seven because it is nice and quiet. Later in the morning, there are just too many noisy shoppers! I never take the bus or drive my car; stepping out of my front door and using my legs is a great way to start the weekend. The first thing I always do is find my favourite café stall. They make delicious tea, and holding the cup stops my hands from getting cold. I sometimes see people with guitars playing, but I don’t stop to watch them.\\n\\nElena\\nSaturday mornings are perfect for sleeping late, so I usually drive to the market at around eleven o’clock. It is very crowded, but I don’t mind! I don’t usually shop for myself. Instead, I spend my pocket money on nice things for my mother or a small toy for my little brother. While I look around, there are usually bands singing wonderful songs, and I always stand and enjoy their tunes. I often get a glass of cold orange juice while I listen. I’d love to bring my cat, but she doesn’t like noisy places.\\n\\nFinn\\nMy house is a bit far from the market, so I usually catch the train there on Saturday mornings. I can’t go alone because my dog, Buster, always wants to come with me. He loves smelling the fresh vegetables! I never look for fresh food, though. My favourite stalls are the ones selling books from many years ago or clothes that someone else wore before. I love finding these treasures! I never buy hot tea or coffee for myself while I am there, only cold water.\",\"transText\":\"David Tôi luôn thức dậy lúc sáu giờ vào ngày thứ bảy.\\nTôi thích đến quảng trường chợ lúc bảy giờ vì nó đẹp và yên tĩnh.\\nVào buổi sáng muộn, có quá nhiều người mua sắm ồn ào!\\nTôi không bao giờ đi xe buýt hay lái ô tô; bước ra khỏi cửa trước và sử dụng đôi chân của mình là một cách tuyệt vời để bắt đầu ngày cuối tuần.\\nViệc đầu tiên tôi luôn làm là tìm quán cà phê yêu thích của mình.\\nHọ pha trà thơm ngon, cầm cốc lên tay tôi không bị lạnh.\\nĐôi khi tôi thấy mọi người chơi guitar nhưng tôi không dừng lại để xem họ.\\n\\nElena sáng thứ bảy là thời điểm hoàn hảo để ngủ muộn nên tôi thường lái xe tới chợ vào khoảng 11 giờ.\\nNó rất đông đúc, nhưng tôi không bận tâm!\\nTôi thường không mua sắm cho chính mình.\\nThay vào đó, tôi tiêu tiền tiêu vặt của mình vào những món đồ xinh xắn cho mẹ hoặc một món đồ chơi nhỏ cho em trai.\\nKhi tôi nhìn xung quanh, thường có những ban nhạc hát những bài hát tuyệt vời, và tôi luôn đứng và thưởng thức giai điệu của họ.\\nTôi thường uống một ly nước cam lạnh trong khi lắng nghe.\\nTôi muốn mang theo con mèo của mình nhưng nó không thích những nơi ồn ào.\\n\\nFinn Nhà tôi hơi xa chợ nên tôi thường bắt tàu ở đó vào sáng thứ bảy.\\nTôi không thể đi một mình vì con chó Buster của tôi luôn muốn đi cùng tôi.\\nAnh ấy thích ngửi mùi rau tươi!\\nTuy nhiên, tôi không bao giờ tìm kiếm thực phẩm tươi sống.\\nNhững gian hàng tôi yêu thích nhất là những quầy bán sách từ nhiều năm trước hoặc những bộ quần áo mà người khác đã mặc trước đó.\\nTôi thích tìm kiếm những kho báu này!\\nTôi không bao giờ mua trà hoặc cà phê nóng cho mình khi ở đó, chỉ có nước lạnh.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Who gets a warm drink at the market?\\n2. Who goes to the market with a pet?\\n3. Which person buys things that are not new?\\n4. Who enjoys listening to people playing music?\\n5. Which person buys presents for their family?\\n6. Who arrives at the market before there are a lot of people?\\n7. Which person walks to the market?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 C   3 C   4 B   5 B   6 A   7 A\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Saving Up for Something Special\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Leo I am collecting my pocket money for some amazing Bose Ultra Open Earbuds. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">My mum and dad pay me when I clean the bathroom or wash the dishes at the weekend. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">I rarely go to the cinema or cafes with my classmates now because I want to keep every coin I get. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">My older brother wants to get the same audio equipment, but he hasn’t got a job, and my parents won’t just give him the cash! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">I always knew exactly what I wanted to buy, so I check the internet every day to see if the price is lower. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Leo Tôi đang quyên góp tiền tiêu vặt của mình để mua một số chiếc Tai nghe Bose Ultra Open tuyệt vời. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Bố mẹ tôi trả tiền cho tôi khi tôi dọn dẹp phòng tắm hoặc rửa bát vào cuối tuần. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Bây giờ tôi hiếm khi đi xem phim hoặc quán cà phê với các bạn cùng lớp vì tôi muốn giữ từng đồng xu mình kiếm được. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Anh trai tôi muốn mua những thiết bị âm thanh tương tự, nhưng anh ấy chưa có việc làm và bố mẹ tôi không cho anh ấy tiền mặt! \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Tôi luôn biết chính xác mình muốn mua gì nên tôi kiểm tra trên mạng hàng ngày để xem giá có thấp hơn không. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Mia I love fashion, especially clothes from places like Uniqlo. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">My parents give me a little pocket money every Friday, but it usually takes many months to get enough cash for a nice outfit. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">Because waiting is hard, I often visit markets that sell second-hand jackets and dresses. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">They are much cheaper and look great! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s4\\\">I don’t tidy the living room for money like some teenagers do. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s5\\\">At first, I wanted a warm H&M winter coat, but then I chose some bright summer t-shirts instead. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s6\\\">I love going to the shopping centre with my friends on Saturdays. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Mia Tôi yêu thời trang, đặc biệt là quần áo của những nơi như Uniqlo. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Cha mẹ tôi cho tôi một ít tiền tiêu vặt vào mỗi thứ sáu hàng tuần, nhưng thường phải mất nhiều tháng mới có đủ tiền để mua một bộ quần áo đẹp. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Vì việc chờ đợi rất vất vả nên tôi thường ghé vào những khu chợ bán áo khoác và váy cũ. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Chúng rẻ hơn nhiều và trông tuyệt vời! \\u003c/span>\\u003cspan id=\\\"p1s4\\\" class=\\\"vi-sent\\\">Tôi không dọn dẹp phòng khách để kiếm tiền như một số thanh thiếu niên vẫn làm. \\u003c/span>\\u003cspan id=\\\"p1s5\\\" class=\\\"vi-sent\\\">Lúc đầu, tôi muốn một chiếc áo khoác mùa đông ấm áp của H&M, nhưng sau đó tôi lại chọn một vài chiếc áo phông mùa hè rực rỡ. \\u003c/span>\\u003cspan id=\\\"p1s6\\\" class=\\\"vi-sent\\\">Tôi thích đi đến trung tâm mua sắm với bạn bè vào thứ Bảy. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Sam Right now, I am saving up for a DJI Osmo Pocket 3 camera to make videos, and a fresh pair of Nike running shoes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">I drop all my cash into a large glass jar on my desk so I can see it grow. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">My grandmother sometimes hands me a few extra notes when she visits, which really helps! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">I only buy things that are completely new and in the box, never anything old. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">Collecting enough money is quite a fast process for me because I never buy snacks after school. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">Once my jar is full, I will go straight to the shops! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Sam Hiện tại, tôi đang dành dụm để mua một chiếc máy ảnh DJI Osmo Pocket 3 để quay video và một đôi giày chạy bộ Nike mới. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Tôi thả tất cả tiền mặt của mình vào một chiếc lọ thủy tinh lớn trên bàn để có thể nhìn thấy nó lớn lên. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Bà tôi thỉnh thoảng đưa cho tôi thêm vài tờ ghi chú khi bà đến thăm, điều này thực sự hữu ích! \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Tôi chỉ mua những thứ hoàn toàn mới và còn nguyên hộp, không bao giờ mua đồ cũ. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Việc thu thập đủ tiền là một quá trình khá nhanh đối với tôi vì tôi không bao giờ mua đồ ăn nhẹ sau giờ học. \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Khi lọ của tôi đầy, tôi sẽ đi thẳng đến cửa hàng! \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Which person stays at home to keep their money?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1,\"mifTargets\":[]},{\"id\":2,\"type\":\"mif\",\"text\":\"Which person gets clothes that someone else wore before?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2,\"mifTargets\":[]},{\"id\":3,\"type\":\"mif\",\"text\":\"Which person is given more cash by a relative?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3,\"mifTargets\":[]},{\"id\":4,\"type\":\"mif\",\"text\":\"Which person thinks collecting the money they need is a slow process?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4,\"mifTargets\":[]},{\"id\":5,\"type\":\"mif\",\"text\":\"Which person puts their coins in a container in their room?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5,\"mifTargets\":[]},{\"id\":6,\"type\":\"mif\",\"text\":\"Which person does jobs around the house to earn cash?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6,\"mifTargets\":[]},{\"id\":7,\"type\":\"mif\",\"text\":\"Which person decided to get something different instead of their first idea?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7,\"mifTargets\":[]}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Leo I am collecting my pocket money for some amazing Bose Ultra Open Earbuds.\",\"My mum and dad pay me when I clean the bathroom or wash the dishes at the weekend.\",\"I rarely go to the cinema or cafes with my classmates now because I want to keep every coin I get.\",\"My older brother wants to get the same audio equipment, but he hasn’t got a job, and my parents won’t just give him the cash!\",\"I always knew exactly what I wanted to buy, so I check the internet every day to see if the price is lower.\"],\"vi\":[\"Leo Tôi đang quyên góp tiền tiêu vặt của mình để mua một số chiếc Tai nghe Bose Ultra Open tuyệt vời.\",\"Bố mẹ tôi trả tiền cho tôi khi tôi dọn dẹp phòng tắm hoặc rửa bát vào cuối tuần.\",\"Bây giờ tôi hiếm khi đi xem phim hoặc quán cà phê với các bạn cùng lớp vì tôi muốn giữ từng đồng xu mình kiếm được.\",\"Anh trai tôi muốn mua những thiết bị âm thanh tương tự, nhưng anh ấy chưa có việc làm và bố mẹ tôi không cho anh ấy tiền mặt!\",\"Tôi luôn biết chính xác mình muốn mua gì nên tôi kiểm tra trên mạng hàng ngày để xem giá có thấp hơn không.\"]},{\"en\":[\"Mia I love fashion, especially clothes from places like Uniqlo.\",\"My parents give me a little pocket money every Friday, but it usually takes many months to get enough cash for a nice outfit.\",\"Because waiting is hard, I often visit markets that sell second-hand jackets and dresses.\",\"They are much cheaper and look great!\",\"I don’t tidy the living room for money like some teenagers do.\",\"At first, I wanted a warm H&M winter coat, but then I chose some bright summer t-shirts instead.\",\"I love going to the shopping centre with my friends on Saturdays.\"],\"vi\":[\"Mia Tôi yêu thời trang, đặc biệt là quần áo của những nơi như Uniqlo.\",\"Cha mẹ tôi cho tôi một ít tiền tiêu vặt vào mỗi thứ sáu hàng tuần, nhưng thường phải mất nhiều tháng mới có đủ tiền để mua một bộ quần áo đẹp.\",\"Vì việc chờ đợi rất vất vả nên tôi thường ghé vào những khu chợ bán áo khoác và váy cũ.\",\"Chúng rẻ hơn nhiều và trông tuyệt vời!\",\"Tôi không dọn dẹp phòng khách để kiếm tiền như một số thanh thiếu niên vẫn làm.\",\"Lúc đầu, tôi muốn một chiếc áo khoác mùa đông ấm áp của H&M, nhưng sau đó tôi lại chọn một vài chiếc áo phông mùa hè rực rỡ.\",\"Tôi thích đi đến trung tâm mua sắm với bạn bè vào thứ Bảy.\"]},{\"en\":[\"Sam Right now, I am saving up for a DJI Osmo Pocket 3 camera to make videos, and a fresh pair of Nike running shoes.\",\"I drop all my cash into a large glass jar on my desk so I can see it grow.\",\"My grandmother sometimes hands me a few extra notes when she visits, which really helps!\",\"I only buy things that are completely new and in the box, never anything old.\",\"Collecting enough money is quite a fast process for me because I never buy snacks after school.\",\"Once my jar is full, I will go straight to the shops!\"],\"vi\":[\"Sam Hiện tại, tôi đang dành dụm để mua một chiếc máy ảnh DJI Osmo Pocket 3 để quay video và một đôi giày chạy bộ Nike mới.\",\"Tôi thả tất cả tiền mặt của mình vào một chiếc lọ thủy tinh lớn trên bàn để có thể nhìn thấy nó lớn lên.\",\"Bà tôi thỉnh thoảng đưa cho tôi thêm vài tờ ghi chú khi bà đến thăm, điều này thực sự hữu ích!\",\"Tôi chỉ mua những thứ hoàn toàn mới và còn nguyên hộp, không bao giờ mua đồ cũ.\",\"Việc thu thập đủ tiền là một quá trình khá nhanh đối với tôi vì tôi không bao giờ mua đồ ăn nhẹ sau giờ học.\",\"Khi lọ của tôi đầy, tôi sẽ đi thẳng đến cửa hàng!\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"Leo\\nI am collecting my pocket money for some amazing Bose Ultra Open Earbuds. My mum and dad pay me when I clean the bathroom or wash the dishes at the weekend. I rarely go to the cinema or cafes with my classmates now because I want to keep every coin I get. My older brother wants to get the same audio equipment, but he hasn’t got a job, and my parents won’t just give him the cash! I always knew exactly what I wanted to buy, so I check the internet every day to see if the price is lower.\\n\\nMia\\nI love fashion, especially clothes from places like Uniqlo. My parents give me a little pocket money every Friday, but it usually takes many months to get enough cash for a nice outfit. Because waiting is hard, I often visit markets that sell second-hand jackets and dresses. They are much cheaper and look great! I don’t tidy the living room for money like some teenagers do. At first, I wanted a warm H&M winter coat, but then I chose some bright summer t-shirts instead. I love going to the shopping centre with my friends on Saturdays.\\n\\nSam\\nRight now, I am saving up for a DJI Osmo Pocket 3 camera to make videos, and a fresh pair of Nike running shoes. I drop all my cash into a large glass jar on my desk so I can see it grow. My grandmother sometimes hands me a few extra notes when she visits, which really helps! I only buy things that are completely new and in the box, never anything old. Collecting enough money is quite a fast process for me because I never buy snacks after school. Once my jar is full, I will go straight to the shops!\",\"transText\":\"Leo Tôi đang quyên góp tiền tiêu vặt của mình để mua một số chiếc Tai nghe Bose Ultra Open tuyệt vời.\\nBố mẹ tôi trả tiền cho tôi khi tôi dọn dẹp phòng tắm hoặc rửa bát vào cuối tuần.\\nBây giờ tôi hiếm khi đi xem phim hoặc quán cà phê với các bạn cùng lớp vì tôi muốn giữ từng đồng xu mình kiếm được.\\nAnh trai tôi muốn mua những thiết bị âm thanh tương tự, nhưng anh ấy chưa có việc làm và bố mẹ tôi không cho anh ấy tiền mặt!\\nTôi luôn biết chính xác mình muốn mua gì nên tôi kiểm tra trên mạng hàng ngày để xem giá có thấp hơn không.\\n\\nMia Tôi yêu thời trang, đặc biệt là quần áo của những nơi như Uniqlo.\\nCha mẹ tôi cho tôi một ít tiền tiêu vặt vào mỗi thứ sáu hàng tuần, nhưng thường phải mất nhiều tháng mới có đủ tiền để mua một bộ quần áo đẹp.\\nVì việc chờ đợi rất vất vả nên tôi thường ghé vào những khu chợ bán áo khoác và váy cũ.\\nChúng rẻ hơn nhiều và trông tuyệt vời!\\nTôi không dọn dẹp phòng khách để kiếm tiền như một số thanh thiếu niên vẫn làm.\\nLúc đầu, tôi muốn một chiếc áo khoác mùa đông ấm áp của H&M, nhưng sau đó tôi lại chọn một vài chiếc áo phông mùa hè rực rỡ.\\nTôi thích đi đến trung tâm mua sắm với bạn bè vào thứ Bảy.\\n\\nSam Hiện tại, tôi đang dành dụm để mua một chiếc máy ảnh DJI Osmo Pocket 3 để quay video và một đôi giày chạy bộ Nike mới.\\nTôi thả tất cả tiền mặt của mình vào một chiếc lọ thủy tinh lớn trên bàn để có thể nhìn thấy nó lớn lên.\\nBà tôi thỉnh thoảng đưa cho tôi thêm vài tờ ghi chú khi bà đến thăm, điều này thực sự hữu ích!\\nTôi chỉ mua những thứ hoàn toàn mới và còn nguyên hộp, không bao giờ mua đồ cũ.\\nViệc thu thập đủ tiền là một quá trình khá nhanh đối với tôi vì tôi không bao giờ mua đồ ăn nhẹ sau giờ học.\\nKhi lọ của tôi đầy, tôi sẽ đi thẳng đến cửa hàng!\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Which person stays at home to keep their money?\\n2. Which person gets clothes that someone else wore before?\\n3. Which person is given more cash by a relative?\\n4. Which person thinks collecting the money they need is a slow process?\\n5. Which person puts their coins in a container in their room?\\n6. Which person does jobs around the house to earn cash?\\n7. Which person decided to get something different instead of their first idea?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 B   3 C   4 B   5 C   6 A   7 B\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Travelling to School\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Lucas I catch the 7:15 train to school every morning. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">My friend Tom usually gets on at the next stop, so we talk. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">I never close my eyes on the train because I love watching the fields and buildings pass by. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">It’s a very fast journey and the train is never delayed. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">However, when I finally arrive at the railway station, I have to go on foot for twenty minutes to reach my classroom. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s5\\\">It’s good exercise, but it’s quite tiring when it rains! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Lucas Tôi bắt chuyến tàu lúc 7:15 đến trường mỗi sáng. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Bạn Tom của tôi thường lên xe ở điểm dừng tiếp theo nên chúng tôi nói chuyện. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Tôi không bao giờ nhắm mắt trên tàu vì tôi thích ngắm nhìn những cánh đồng và những tòa nhà đi ngang qua. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Đó là một hành trình rất nhanh và tàu không bao giờ bị trì hoãn. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Tuy nhiên, cuối cùng khi tôi đến ga xe lửa, tôi phải đi bộ mất hai mươi phút mới đến được lớp học của mình. \\u003c/span>\\u003cspan id=\\\"p0s5\\\" class=\\\"vi-sent\\\">Tập thể dục rất tốt nhưng trời mưa thì khá mệt! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Maya I take the bus to school. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">I always go with my older sister because we study at the same place. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">The bus stop is very close to our house, so we don’t use our legs much! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">The only problem is that the traffic is often bad, so we sometimes arrive behind schedule. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s4\\\">I don’t look outside much because I usually read my homework. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s5\\\">One good thing is that we only pay half the money for our trip because we are under eighteen. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Maya tôi đi xe buýt đến trường. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Tôi luôn đi cùng chị gái vì chúng tôi học cùng một nơi. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Trạm xe buýt rất gần nhà nên chúng tôi không sử dụng chân nhiều! \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Vấn đề duy nhất là giao thông thường xuyên tắc nghẽn nên đôi khi chúng tôi đến muộn so với lịch trình. \\u003c/span>\\u003cspan id=\\\"p1s4\\\" class=\\\"vi-sent\\\">Tôi không nhìn ra ngoài nhiều vì tôi thường đọc bài tập về nhà. \\u003c/span>\\u003cspan id=\\\"p1s5\\\" class=\\\"vi-sent\\\">Một điều tốt là chúng tôi chỉ phải trả một nửa số tiền cho chuyến đi vì chúng tôi chưa đủ mười tám tuổi. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Chloe I use the underground to get to my classes in the city centre. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">It is quite expensive, even for teenagers, but it is very fast. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">The trains come every three minutes, so I never wait long. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">Because everyone goes to work at the same time, the carriages are always full of passengers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">I usually have to stand! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">If I am lucky and find an empty place, I usually shut my eyes and dream for a quarter of an hour before I have to get off. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Chloe Tôi sử dụng tàu điện ngầm để đến lớp ở trung tâm thành phố. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Nó khá đắt, ngay cả đối với thanh thiếu niên, nhưng nó rất nhanh. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Các chuyến tàu cứ ba phút lại có một chuyến nên tôi không bao giờ phải đợi lâu. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Vì mọi người đều đi làm cùng một lúc nên các toa tàu luôn chật kín hành khách. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Tôi thường phải đứng! \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Nếu may mắn tìm được một chỗ trống, tôi thường nhắm mắt và mơ khoảng mười lăm phút trước khi phải xuống xe. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Which person says their transport is not always on time?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Which person rests while they are travelling?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"Which person has a long walk at the end of their journey?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Which person goes to school with a relative?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Which person says it is difficult to get a seat?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5},{\"id\":6,\"type\":\"mif\",\"text\":\"Which person enjoys the view during their trip?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6},{\"id\":7,\"type\":\"mif\",\"text\":\"Which person gets a cheaper ticket for their journey?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Lucas I catch the 7:15 train to school every morning.\",\"My friend Tom usually gets on at the next stop, so we talk.\",\"I never close my eyes on the train because I love watching the fields and buildings pass by.\",\"It’s a very fast journey and the train is never delayed.\",\"However, when I finally arrive at the railway station, I have to go on foot for twenty minutes to reach my classroom.\",\"It’s good exercise, but it’s quite tiring when it rains!\"],\"vi\":[\"Lucas Tôi bắt chuyến tàu lúc 7:15 đến trường mỗi sáng.\",\"Bạn Tom của tôi thường lên xe ở điểm dừng tiếp theo nên chúng tôi nói chuyện.\",\"Tôi không bao giờ nhắm mắt trên tàu vì tôi thích ngắm nhìn những cánh đồng và những tòa nhà đi ngang qua.\",\"Đó là một hành trình rất nhanh và tàu không bao giờ bị trì hoãn.\",\"Tuy nhiên, cuối cùng khi tôi đến ga xe lửa, tôi phải đi bộ mất hai mươi phút mới đến được lớp học của mình.\",\"Tập thể dục rất tốt nhưng trời mưa thì khá mệt!\"]},{\"en\":[\"Maya I take the bus to school.\",\"I always go with my older sister because we study at the same place.\",\"The bus stop is very close to our house, so we don’t use our legs much!\",\"The only problem is that the traffic is often bad, so we sometimes arrive behind schedule.\",\"I don’t look outside much because I usually read my homework.\",\"One good thing is that we only pay half the money for our trip because we are under eighteen.\"],\"vi\":[\"Maya tôi đi xe buýt đến trường.\",\"Tôi luôn đi cùng chị gái vì chúng tôi học cùng một nơi.\",\"Trạm xe buýt rất gần nhà nên chúng tôi không sử dụng chân nhiều!\",\"Vấn đề duy nhất là giao thông thường xuyên tắc nghẽn nên đôi khi chúng tôi đến muộn so với lịch trình.\",\"Tôi không nhìn ra ngoài nhiều vì tôi thường đọc bài tập về nhà.\",\"Một điều tốt là chúng tôi chỉ phải trả một nửa số tiền cho chuyến đi vì chúng tôi chưa đủ mười tám tuổi.\"]},{\"en\":[\"Chloe I use the underground to get to my classes in the city centre.\",\"It is quite expensive, even for teenagers, but it is very fast.\",\"The trains come every three minutes, so I never wait long.\",\"Because everyone goes to work at the same time, the carriages are always full of passengers.\",\"I usually have to stand!\",\"If I am lucky and find an empty place, I usually shut my eyes and dream for a quarter of an hour before I have to get off.\"],\"vi\":[\"Chloe Tôi sử dụng tàu điện ngầm để đến lớp ở trung tâm thành phố.\",\"Nó khá đắt, ngay cả đối với thanh thiếu niên, nhưng nó rất nhanh.\",\"Các chuyến tàu cứ ba phút lại có một chuyến nên tôi không bao giờ phải đợi lâu.\",\"Vì mọi người đều đi làm cùng một lúc nên các toa tàu luôn chật kín hành khách.\",\"Tôi thường phải đứng!\",\"Nếu may mắn tìm được một chỗ trống, tôi thường nhắm mắt và mơ khoảng mười lăm phút trước khi phải xuống xe.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":true,\"rawInputs\":{\"rawText\":\"Lucas\\nI catch the 7:15 train to school every morning. My friend Tom usually gets on at the next stop, so we talk. I never close my eyes on the train because I love watching the fields and buildings pass by. It’s a very fast journey and the train is never delayed. However, when I finally arrive at the railway station, I have to go on foot for twenty minutes to reach my classroom. It’s good exercise, but it’s quite tiring when it rains!\\n\\nMaya\\nI take the bus to school. I always go with my older sister because we study at the same place. The bus stop is very close to our house, so we don’t use our legs much! The only problem is that the traffic is often bad, so we sometimes arrive behind schedule. I don’t look outside much because I usually read my homework. One good thing is that we only pay half the money for our trip because we are under eighteen.\\n\\nChloe\\nI use the underground to get to my classes in the city centre. It is quite expensive, even for teenagers, but it is very fast. The trains come every three minutes, so I never wait long. Because everyone goes to work at the same time, the carriages are always full of passengers. I usually have to stand! If I am lucky and find an empty place, I usually shut my eyes and dream for a quarter of an hour before I have to get off.\",\"transText\":\"Lucas Tôi bắt chuyến tàu lúc 7:15 đến trường mỗi sáng.\\nBạn Tom của tôi thường lên xe ở điểm dừng tiếp theo nên chúng tôi nói chuyện.\\nTôi không bao giờ nhắm mắt trên tàu vì tôi thích ngắm nhìn những cánh đồng và những tòa nhà đi ngang qua.\\nĐó là một hành trình rất nhanh và tàu không bao giờ bị trì hoãn.\\nTuy nhiên, cuối cùng khi tôi đến ga xe lửa, tôi phải đi bộ mất hai mươi phút mới đến được lớp học của mình.\\nTập thể dục rất tốt nhưng trời mưa thì khá mệt!\\n\\nMaya tôi đi xe buýt đến trường.\\nTôi luôn đi cùng chị gái vì chúng tôi học cùng một nơi.\\nTrạm xe buýt rất gần nhà nên chúng tôi không sử dụng chân nhiều!\\nVấn đề duy nhất là giao thông thường xuyên tắc nghẽn nên đôi khi chúng tôi đến muộn so với lịch trình.\\nTôi không nhìn ra ngoài nhiều vì tôi thường đọc bài tập về nhà.\\nMột điều tốt là chúng tôi chỉ phải trả một nửa số tiền cho chuyến đi vì chúng tôi chưa đủ mười tám tuổi.\\n\\nChloe Tôi sử dụng tàu điện ngầm để đến lớp ở trung tâm thành phố.\\nNó khá đắt, ngay cả đối với thanh thiếu niên, nhưng nó rất nhanh.\\nCác chuyến tàu cứ ba phút lại có một chuyến nên tôi không bao giờ phải đợi lâu.\\nVì mọi người đều đi làm cùng một lúc nên các toa tàu luôn chật kín hành khách.\\nTôi thường phải đứng!\\nNếu may mắn tìm được một chỗ trống, tôi thường nhắm mắt và mơ khoảng mười lăm phút trước khi phải xuống xe.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Which person says their transport is not always on time?\\n2. Which person rests while they are travelling?\\n3. Which person has a long walk at the end of their journey?\\n4. Which person goes to school with a relative?\\n5. Which person says it is difficult to get a seat?\\n6. Which person enjoys the view during their trip?\\n7. Which person gets a cheaper ticket for their journey?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 B   2 C   3 A   4 B   5 C   6 A   7 B\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":true,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nwindow.saveCurrentStateToMemory = () => {\n    if (currentLessonIndex === undefined || currentLessonIndex === null || !lessonsData[currentLessonIndex]) return;\n    \n    // Đồng bộ các giá trị đã nhập vào thuộc tính HTML để khi lấy innerHTML không bị rỗng\n    document.querySelectorAll('#reading-view input[type=\"text\"], .gap-input').forEach(el => el.setAttribute('value', el.value || ''));\n    document.querySelectorAll('#reading-view input[type=\"checkbox\"], #reading-view input[type=\"radio\"]').forEach(el => {\n        if(el.checked) el.setAttribute('checked', 'checked');\n        else el.removeAttribute('checked');\n    });\n    \n    // Lưu lại toàn bộ cục HTML hiện tại vào bộ nhớ tạm\n    lessonsData[currentLessonIndex].savedDOM = {\n        articleArea: document.getElementById('articleArea').innerHTML,\n        headingsArea: document.getElementById('headingsArea').innerHTML,\n        qs: document.getElementById('qs').innerHTML,\n        progressBar: document.getElementById('progressBar').innerHTML,\n        timer: timeLeft,\n        isSavedResult: document.getElementById('saveBtn').style.display !== 'none'\n    };\n};\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            \n            // 1. Đánh dấu riêng bài này đã hết giờ\n            lessonsData[currentLessonIndex].isTimedOut = true; \n            \n            // 2. Khóa bài hiện tại (nếu có bật tính năng khóa)\n            if (lessonsData[currentLessonIndex].lockOnTimeout) {\n                window.lockAllInputs();\n            }\n            \n            // 3. Hỏi học sinh có muốn sang bài tiếp theo không (nếu còn bài)\n            if (currentLessonIndex < lessonsData.length - 1) {\n                const nextTab = confirm(\"Đã hết giờ làm bài này! Bạn có muốn chuyển sang bài tiếp theo không?\");\n                if (nextTab) {\n                    const nextIndex = currentLessonIndex + 1;\n                    document.getElementById('lesson-selector').value = nextIndex;\n                    switchLesson(nextIndex);\n                }\n            } else {\n                alert(\"Đã hết giờ làm bài! Đây là bài cuối cùng.\");\n            }\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nwindow.isTimeUp = false;\n\nwindow.lockAllInputs = () => {\n    // Khóa ô input chữ và radio/checkbox\n    document.querySelectorAll('#reading-view input').forEach(el => el.disabled = true);\n    \n    // Khóa khu vực kéo thả Matching Headings/Feature\n    document.querySelectorAll('.drop-zone').forEach(el => {\n        el.removeAttribute('ondragover');\n        el.removeAttribute('ondrop');\n        el.style.pointerEvents = 'none';\n        el.style.opacity = '0.7';\n    });\n    \n    // Khóa item có thể kéo đi\n    document.querySelectorAll('.heading-item').forEach(el => {\n        el.removeAttribute('draggable');\n        el.style.pointerEvents = 'none';\n    });\n    \n    // Khóa nút Mif inline\n    document.querySelectorAll('.mif-circle, .mif-inline-btn').forEach(el => {\n        el.style.pointerEvents = 'none';\n    });\n};\n\n\tfunction switchLesson(idx) {\n\tif(window.isFocusMode) window.toggleFocusMode(); // THÊM DÒNG NÀY ĐỂ TẮT FOCUS KHI CHUYỂN BÀI\n    // 1. SỬA LỖI TẠI ĐÂY: Chỉ lưu trạng thái bài cũ nếu màn hình hiện tại đang CÓ DỮ LIỆU\n    // Việc này ngăn hệ thống chụp nhầm \"mảng rỗng\" lúc vừa từ sảnh chờ chui vào\n    const qsDOM = document.getElementById('qs');\n    if (typeof saveCurrentStateToMemory === 'function' && qsDOM && qsDOM.innerHTML.trim() !== '') {\n        saveCurrentStateToMemory();\n    }\n\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n\t// --- Ẩn/Hiện nút Luyện Từng Câu theo cấu hình ---\n        const focusBtn = document.getElementById('focusModeBtn');\n        if (focusBtn) {\n            // Chủ động gọi cấu hình của bài học theo idx để tránh lỗi undefined biến\n            const lessonConfig = lessonsData[idx]; \n            focusBtn.style.display = (lessonConfig && lessonConfig.chkFocusMode === false) ? 'none' : 'block';\n        }\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // 2. KIỂM TRA: Nếu đã có dữ liệu lưu tạm -> Khôi phục lại\n    if (l.savedDOM) {\n        document.getElementById('articleArea').innerHTML = l.savedDOM.articleArea;\n        document.getElementById('headingsArea').innerHTML = l.savedDOM.headingsArea;\n        document.getElementById('qs').innerHTML = l.savedDOM.qs;\n        document.getElementById('progressBar').innerHTML = l.savedDOM.progressBar;\n        \n        clearInterval(timerInterval);\n        timeLeft = l.savedDOM.timer;\n        startTimer();\n\n        document.getElementById('saveBtn').style.display = l.savedDOM.isSavedResult ? 'inline-block' : 'none';\n        \n        attachEvents(); // Gắn lại các sự kiện click, hover\n    } else {\n        // KIỂM TRA: Chưa có dữ liệu -> Tạo mới từ đầu như cũ\n        document.getElementById('articleArea').innerHTML = l.articleHtml;\n        document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n        document.getElementById('qs').innerHTML = '';\n        document.getElementById('progressBar').innerHTML = '';\n        document.getElementById('saveBtn').style.display = 'none';\n        \n        clearInterval(timerInterval);\n        timeLeft = l.timeLimit * 60;\n        timerEl.innerText = \"--:--\";\n        startTimer();\n\n        renderStudentQuestions();\n        attachEvents();\n\t\tif (typeof updateMifVisibility === 'function') updateMifVisibility();\n    }\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n\t// Kiểm tra xem bài học sinh VỪA CHUYỂN TỚI đã từng bị hết giờ chưa\n    // Nếu đã hết giờ từ trước đó -> Ép đồng hồ về 00:00 và khóa lại (nếu có bật khóa)\n    if (lessonsData[currentLessonIndex].isTimedOut) {\n        clearInterval(timerInterval);\n        timerEl.innerText = \"00:00\";\n        if (lessonsData[currentLessonIndex].lockOnTimeout) {\n            setTimeout(window.lockAllInputs, 100);\n        }\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only') { \n          // Tự động nhận diện cụm \"Questions X-Y\" để in đậm, viết hoa và làm to lên\n          let styledTxt = q.text.replace(/(Questions?s*d+s*(?:-|to|–|&)s*d+)/gi, '<strong style=\"color: #1e293b; font-size: 15.5px; text-transform: uppercase; display: block; margin-bottom: 6px; letter-spacing: 0.5px; font-style: normal;\">$1</strong>');\n          styledTxt = styledTxt.replace(/\\n/g, '<br>');\n          \n          // Bọc toàn bộ vào một khung màu xanh nhạt sang trọng, text in nghiêng nhẹ\n          qDiv.innerHTML += `<div class=\"text-only instruction-box\" style=\"margin: 24px 0 16px 0; padding: 16px 20px; background: #f0f9ff; border: 1px solid #bae6fd; border-left: 5px solid #0ea5e9; border-radius: 8px; font-size: 14.5px; line-height: 1.6; color: #334155; font-style: italic; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);\">${styledTxt}</div>`; \n      }\n      else if(q.type==='summary') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              \n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              \n              // Đã gỡ bỏ thẻ <span class=\"q-num\"> nhỏ xíu ra khỏi dropzone\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span>${locBtn}&nbsp;`;\n              \n              // 1. Số câu sát dropzone -> Bọc style màu xanh cho số ở đầu\n              let replaced = txt.replace(new RegExp('\\\\b(' + gid + ')\\\\s*([._…-]{2,}|_{2,}|…+)'), '<span class=\"q-num\">$1</span> ' + dz);\n\n              // 2. Số câu ở đầu, dropzone ở giữa/cuối -> Tách số ra để bọc style, giữ nguyên text ở giữa ($2)\n              if(replaced === txt) {\n                  let pattern = new RegExp('(\\\\b' + gid + '\\\\b)((?:(?!<br>\\\\s*\\\\d+\\\\b)[\\\\s\\\\S])*?)((?:[_….\\\\-]){2,})');\n                  replaced = txt.replace(pattern, '<span class=\"q-num\">$1</span>$2' + dz);\n              }\n\n              // 3. Fallback (Chỉ có số câu)\n              if(replaced === txt) replaced = txt.replace(new RegExp('\\\\b(' + gid + ')[.]?\\\\s+'), '<span class=\"q-num\">$1</span> ');\n              \n              txt = replaced;\n              \n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n
