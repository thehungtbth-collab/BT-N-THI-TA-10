TML += h;\n\t\t}\n      else if(q.type==='gap-fill-block') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.includes('<table') ? `<div class=\"ielts-table-wrapper\">${q.text}</div>` : q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              \n              // Đã gỡ bỏ thẻ <span class=\"q-num\"> nhỏ xíu ra khỏi ô input\n              const inp = `<input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\" onpaste=\"return false;\" ondrop=\"return false;\">${locBtn}&nbsp;`;\t\n              \n              // 1. Số câu sát ô trống -> Bọc style màu xanh cho số\n              let replaced = txt.replace(new RegExp('\\\\b(' + gid + ')[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}'), '<span class=\"q-num\">$1</span> ' + inp);\n\n              // 2. Số câu ở đầu, ô trống ở vị trí bất kỳ phía sau\n              if(replaced === txt) {\n                  let pattern = new RegExp('(\\\\b' + gid + '\\\\b)((?:(?!<br>\\\\s*\\\\d+\\\\b)[\\\\s\\\\S])*?)((?:[_….\\\\-]){2,})');\n                  replaced = txt.replace(pattern, '<span class=\"q-num\">$1</span>$2' + inp);\n              }\n\n              txt = replaced;\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq-multi') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              const optMatch = o.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              let optLetter = \"\", optText = o;\n              if(optMatch) { optLetter = optMatch[1].toUpperCase(); optText = optMatch[2]; }\n              else { optLetter = o.trim()[0].toUpperCase(); optText = o.replace(/^([A-Z])\\s*[.)]?\\s*/i, ''); }\n              \n              h += `<label class=\"mcq-option\">\n                      <input type=\"checkbox\" name=\"mcq_${q.id}\" value=\"${optLetter}\" onchange=\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\">\n                      <span class=\"opt-letter\">${optLetter}</span>\n                      <span>${optText}</span>\n                      <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n      }\n      else { \n        let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n        const loc = q.location || \"\";\n        const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n        \n        if(q.type==='gap-fill'){\n           let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_�.\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\" onpaste=\"return false;\" ondrop=\"return false;\">'+locBtn+'&nbsp;');\n           h+=`<div>${t}</div>`;\n        } else {\n           h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n           if(q.type==='mcq') q.options.forEach((o, i) => { \n              const optMatch = o.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              let optLetter = \"\", optText = o;\n              if(optMatch) { optLetter = optMatch[1].toUpperCase(); optText = optMatch[2]; }\n              else { optLetter = o.trim()[0].toUpperCase(); optText = o.replace(/^([A-Z])\\s*[.)]?\\s*/i, ''); }\n              h += `<label class=\"mcq-option\"><input type=\"radio\" name=\"q${q.id}\" value=\"${optLetter}\" onchange=\"upd(${q.id})\"><span class=\"opt-letter\">${optLetter}</span><span>${optText}</span><span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; \n           });\n           if(q.type==='tfng') {\n               h+='<div class=\"tfng-container\">';\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='ynng') {\n               h+='<div class=\"tfng-container\">';\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"ynng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='mif') {\n               h+='<div class=\"mif-container\">';\n               mifRange.split('').forEach(char => {\n                   // Thêm updateMifVisibility() vào onchange\n                   h+=`<label class=\"mif-label\"><input type=\"radio\" name=\"mif${q.id}\" value=\"${char}\" onchange=\"upd(${q.id}); updateMifVisibility();\"><span class=\"mif-circle\">${char}</span></label>`;\n               });\n               h+='</div>';\n           }\n        }\n        h+=`<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n        qDiv.innerHTML+=h;\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n        document.getElementById('progressBar').appendChild(d);\n      }\n    });\n\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n\t\n\t// --- THÊM NÚT SANG BÀI MỚI Ở CUỐI TRANG HỌC SINH ---\n    if (currentLessonIndex < lessonsData.length - 1) {\n        const nextLesson = lessonsData[currentLessonIndex + 1];\n        qDiv.innerHTML += `\n        <div class=\"next-lesson-wrap\" style=\"margin-top: 40px; margin-bottom: 60px; text-align: center; width: 100%;\">\n            <button onclick=\"switchLesson(${currentLessonIndex + 1})\" style=\"background: linear-gradient(90deg, #0f766e, #115e59); color: white; border: none; padding: 14px 32px; border-radius: 30px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(17, 94, 89, 0.2); transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;\" onmouseover=\"this.style.transform='scale(1.03)'; this.style.boxShadow='0 6px 16px rgba(17, 94, 89, 0.3)';\" onmouseout=\"this.style.transform='scale(1)'; this.style.boxShadow='0 4px 12px rgba(17, 94, 89, 0.2)';\">\n                Sang bài tiếp theo: ${nextLesson.name} ❯❯\n            </button>\n        </div>`;\n    }\n}\n\nfunction attachEvents() {\n    const pp = document.getElementById('popup');\n    document.querySelectorAll('.vocab').forEach(s => {\n      s.onclick = e => {\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\n        pp.innerHTML = `<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><div><span>${v.word}</span> <span style=\"font-weight:normal;font-size:12px;color:#94a3b8;margin-left:8px\">${v.phonetic||''}</span></div><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\n        e.stopPropagation();\n      }\n    });\n\n    document.querySelectorAll('.sent').forEach(el => {\n        el.addEventListener('mouseenter', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = '#fef08a'; \n        });\n        el.addEventListener('mouseleave', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = 'transparent';\n        });\n    });\n}\n\nfunction allowDrop(ev) { ev.preventDefault(); }\nfunction drag(ev) { \n    const el = ev.target.closest('[draggable=\"true\"]') || ev.target;\n    const val = el.dataset.val || el.innerText.split('.')[0].trim();\n    ev.dataTransfer.setData(\"text\", val); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction dragHeading(ev) { \n    const el = ev.target.closest('.heading-item');\n    ev.dataTransfer.setData(\"hid\", el.dataset.hid); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction drop(ev) {\n    ev.preventDefault();\n    const zone = ev.target.closest('.drop-zone');\n    if(!zone) return;\n    \n    const type = zone.dataset.type;\n    if (type === 'heading') {\n        const hid = ev.dataTransfer.getData(\"hid\");\n        if(!hid) return; \n        zone.innerHTML = hid.toUpperCase(); \n        zone.dataset.val = hid; \n        zone.classList.add('filled');\n        \n        const srcId = ev.dataTransfer.getData(\"srcId\");\n        document.getElementById(srcId).classList.add('used');\n        if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) document.getElementById(zone.dataset.prevSrc).classList.remove('used');\n        zone.dataset.prevSrc = srcId;\n        return;\n    }\n    const val = ev.dataTransfer.getData(\"text\");\n    if(val) {\n        zone.innerText = val; \n        zone.classList.add('filled');\n        const gid = zone.dataset.gid;\n        document.getElementById('prog-'+gid).classList.add('filled');\n        \n        const isFeat = zone.dataset.isfeat === 'true';\n        const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n        \n        if(doRemove) {\n            const srcId = ev.dataTransfer.getData(\"srcId\");\n            if(srcId) {\n                const srcEl = document.getElementById(srcId);\n                if(srcEl) srcEl.classList.add('used');\n                if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) {\n                    const prevEl = document.getElementById(zone.dataset.prevSrc);\n                    if(prevEl) prevEl.classList.remove('used');\n                }\n                zone.dataset.prevSrc = srcId;\n            }\n        }\n    }\n}\n\nfunction clearHeading(idx) {\n    const el = document.querySelector(`.heading-drop[data-para=\"${idx}\"]`);\n    if(el.dataset.prevSrc) document.getElementById(el.dataset.prevSrc).classList.remove('used');\n    el.innerHTML = '<span class=\"placeholder\">Drop Heading Here</span>'; el.classList.remove('filled'); delete el.dataset.val;\n}\nfunction clearDrop(gid) {\n    const el = document.getElementById('dz-'+gid);\n    const isFeat = el.dataset.isfeat === 'true';\n    const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n    \n    if(doRemove && el.dataset.prevSrc) {\n        const prevEl = document.getElementById(el.dataset.prevSrc);\n        if(prevEl) prevEl.classList.remove('used');\n        delete el.dataset.prevSrc;\n    }\n    \n    el.innerText=''; el.classList.remove('filled'); document.getElementById('prog-'+gid).classList.remove('filled');\n}\n\nconst hlToolbar = document.getElementById('hl-toolbar');\nlet currentRange = null;\ndocument.addEventListener('mouseup', (e) => {\n    if(e.target.closest('#hl-toolbar')) return;\n    if(e.target.closest('#game-view')) return;\n    setTimeout(() => {\n        const sel = window.getSelection();\n        if(sel.toString().trim().length > 0) {\n            const range = sel.getRangeAt(0);\n            const parent = range.commonAncestorContainer.parentElement;\n            if(parent.closest('.en-text') || parent.closest('.q-block') || parent.closest('.text-only')) {\n                currentRange = range;\n                const rect = range.getBoundingClientRect();\n                hlToolbar.style.display = 'flex'; \n                hlToolbar.style.top = (rect.top + window.scrollY - 40) + 'px'; \n                hlToolbar.style.left = (rect.left + (rect.width/2)) + 'px';\n                return;\n            }\n        }\n        hlToolbar.style.display = 'none';\n    }, 10);\n});\n\nwindow.applyHighlight = (e) => {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const span = document.createElement('span'); span.className = 'user-highlight'; span.setAttribute('onclick', 'removeHighlight(this, event)');\n        try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection quá phức tạp, vui lòng bôi đen gọn hơn.'); }\n        hlToolbar.style.display = 'none';\n    }\n};\n\nwindow.applyNote = (e) => {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const noteText = prompt('Nhập ghi chú của bạn:');\n        if(noteText) {\n            const span = document.createElement('span'); \n            span.className = 'user-highlight has-note'; \n            span.setAttribute('onclick', 'removeHighlight(this, event)');\n            span.title = noteText;\n            try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection quá phức tạp, vui lòng bôi đen gọn hơn.'); }\n        }\n        hlToolbar.style.display = 'none';\n    }\n};\n\n// --- BẮT ĐẦU: MENU TIỆN ÍCH ---\nwindow.toggleMainMenu = () => {\n    const drop = document.getElementById('mainMenuDropdown');\n    if (drop.style.display === 'none' || drop.style.display === '') {\n        drop.style.display = 'flex';\n    } else {\n        drop.style.display = 'none';\n    }\n};\n\n// Đóng menu khi học sinh click chuột ra ngoài vùng menu\ndocument.addEventListener('mousedown', (e) => {\n    const container = document.querySelector('.menu-container');\n    const drop = document.getElementById('mainMenuDropdown');\n    if (container && !container.contains(e.target) && drop) {\n        drop.style.display = 'none';\n    }\n});\n// --- KẾT THÚC: MENU TIỆN ÍCH ---\n\n// --- BẮT ĐẦU: TÍNH NĂNG GOOGLE TRANSLATE POPUP DÀNH CHO HỌC SINH ---\nwindow.googleTranslate = async (text, fromLang = 'en', toLang = 'vi') => {\n    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${fromLang}&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`;\n    try {\n        const response = await fetch(url);\n        const data = await response.json();\n        let translatedText = '';\n        data[0].forEach(item => { if (item[0]) translatedText += item[0]; });\n        return translatedText;\n    } catch (error) {\n        console.error(\"Lỗi dịch thuật:\", error);\n        return \"Đã xảy ra lỗi kết nối mạng. Không thể kết nối với Google Translate.\";\n    }\n};\n\nwindow.applyTranslate = async (e) => {\n    e.preventDefault(); \n    e.stopPropagation();\n    if (currentRange) {\n        const text = currentRange.toString().trim();\n        if (text) {\n            // 1. Tạo một khung Popup dịch thuật\n            let tPopup = document.getElementById('translate-popup');\n            if (!tPopup) {\n                tPopup = document.createElement('div');\n                tPopup.id = 'translate-popup';\n                tPopup.style.position = 'absolute';\n                tPopup.style.zIndex = '99999';\n                tPopup.style.background = '#fff';\n                tPopup.style.borderRadius = '8px';\n                tPopup.style.boxShadow = '0 10px 25px rgba(0,0,0,0.2)';\n                tPopup.style.border = '1px solid #e2e8f0';\n                tPopup.style.width = '320px';\n                tPopup.style.overflow = 'hidden';\n                \n                // Ngăn chặn việc click vào bên trong popup làm kích hoạt sự kiện ẩn\n                tPopup.addEventListener('mousedown', (ev) => ev.stopPropagation());\n                document.body.appendChild(tPopup);\n\n                // --- ĐOẠN MỚI THÊM: Bấm ra ngoài (lên document) sẽ tự động ẩn popup ---\n                document.addEventListener('mousedown', () => {\n                    tPopup.style.display = 'none';\n                });\n                // ---------------------------------------------------------------------\n            }\n\n            // 2. Định vị trí xuất hiện ban đầu ngay dưới con trỏ chuột\n            tPopup.style.display = 'block';\n            tPopup.style.top = (e.pageY + 15) + 'px'; \n            tPopup.style.left = Math.min(e.pageX, window.innerWidth - 330) + 'px';\n            \n            // Ẩn thanh công cụ bôi đen đen xì đi\n            const hlToolbar = document.getElementById('hl-toolbar');\n            if(hlToolbar) hlToolbar.style.display = 'none';\n\n            // 3. Hiện trạng thái Loading\n            tPopup.innerHTML = `<div style=\"padding:15px; text-align:center; font-size: 13px; font-weight: bold; color: #64748b;\">Đang dịch... ⏳</div>`;\n\n            // 4. Gọi API Dịch thuật\n            const translated = await window.googleTranslate(text, 'en', 'vi');\n            \n            // 5. Render kết quả & Kích hoạt tính năng kéo thả (Drag)\n            tPopup.innerHTML = `\n                <div id=\"tPopupHeader\" style=\"background:#0ea5e9;color:#fff;padding:10px 12px;font-weight:bold;font-size:13px;display:flex;justify-content:space-between;align-items:center; cursor:move;\" title=\"Nhấn giữ để kéo đi nơi khác\">\n                    <span>🌐 Google Translate</span>\n                    <span onclick=\"document.getElementById('translate-popup').style.display='none'\" style=\"cursor:pointer; padding:0 5px; font-size: 16px;\" title=\"Đóng\">✕</span>\n                </div>\n                <div style=\"padding:15px;font-size:14.5px;color:#334155;line-height:1.6; max-height: 300px; overflow-y: auto;\">\n                    <div style=\"margin-bottom:10px; font-weight:600; color:#0f172a; padding-bottom: 10px; border-bottom: 1px dashed #cbd5e1;\">${text}</div>\n                    <div style=\"color:#0284c7; font-style:italic;\">${translated}</div>\n                </div>`;\n                \n            // Logic Kéo Thả (Drag & Drop)\n            const header = document.getElementById('tPopupHeader');\n            let isDragging = false, startX, startY, initialX, initialY;\n            \n            header.onmousedown = (dragE) => {\n                isDragging = true;\n                startX = dragE.clientX;\n                startY = dragE.clientY;\n                initialX = tPopup.offsetLeft;\n                initialY = tPopup.offsetTop;\n                \n                document.onmousemove = (moveE) => {\n                    if (isDragging) {\n                        tPopup.style.left = (initialX + moveE.clientX - startX) + 'px';\n                        tPopup.style.top = (initialY + moveE.clientY - startY) + 'px';\n                    }\n                };\n                document.onmouseup = () => {\n                    isDragging = false;\n                    document.onmousemove = null;\n                    document.onmouseup = null;\n                };\n            };\n        }\n    }\n};\n\nwindow.removeHighlight = (el, e) => { \n    e.stopPropagation(); \n    if(el.classList.contains('has-note') && !confirm('Xóa ghi chú này?')) return;\n    const txt = document.createTextNode(el.innerText); \n    el.parentNode.replaceChild(txt, el); \n    hlToolbar.style.display = 'none'; \n};\n\nwindow.showLoc = (qId, subId) => {\n    document.querySelectorAll('.loc-highlight').forEach(el => el.classList.remove('loc-highlight'));\n    const q = qs.find(x => x.id === qId); if(!q) return;\n    \n    let fullText = \"\";\n    if(subId && q.locations && q.locations[subId]) fullText = q.locations[subId]; \n    else if(q.location) fullText = q.location;\n    \n    if(!fullText) return alert(\"No location data found.\");\n    \n    // Tách các cụm văn bản bằng dấu /\n    const parts = fullText.split('/').map(p => p.trim().toLowerCase().replace(/\\s+/g, ' ')).filter(p => p.length > 0);\n    const sents = document.querySelectorAll('.sent'); \n    let firstFoundEl = null;\n\n    sents.forEach(s => {\n        // Đã sửa thành \\s+ và chỉ giữ 1 dòng sText duy nhất NẰM TRONG vòng lặp\n        const sText = s.innerText.trim().replace(/\\s+/g, ' ').toLowerCase();\n        \n        // Kiểm tra xem câu hiện tại có chứa bất kỳ phần nào trong danh sách parts không\n        const isMatch = parts.some(part => sText.includes(part) || (part.length > 20 && part.includes(sText)));\n        \n        if(isMatch) {\n            s.classList.remove('loc-highlight');\n            void s.offsetWidth; // Trigger reflow\n            s.classList.add('loc-highlight');\n            \n            if(!firstFoundEl) firstFoundEl = s;\n            \n            // Tự động gỡ highlight sau 4 giây\n            setTimeout(() => s.classList.remove('loc-highlight'), 4000);\n        }\n    });\n\n    if(firstFoundEl) {\n        firstFoundEl.scrollIntoView({behavior: 'smooth', block: 'center'});\n    } else {\n        alert(\"Could not find exact text match in passage.\");\n    }\n};\n\nwindow.upd = (id) => document.getElementById('prog-'+id).classList.add('filled');\nwindow.updMcqMulti = (qId, gapIdsStr, ev) => {\n    const gapIds = gapIdsStr.split(',');\n    const checkboxes = document.querySelectorAll(`input[name=\"mcq_${qId}\"]`);\n    const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;\n    const maxAllowed = gapIds.length;\n    if (checkedCount > maxAllowed) { ev.target.checked = false; alert(\"Bạn chỉ được chọn tối đa \" + maxAllowed + \" đáp án!\"); return; }\n    gapIds.forEach((gid, index) => {\n        const p = document.getElementById('prog-'+gid);\n        if(p) { if(index < checkedCount) p.classList.add('filled'); else p.classList.remove('filled'); }\n    });\n};\n\nwindow.updateMifVisibility = () => {\n    if(!mifRange) return;\n    \n    const currentLesson = lessonsData[currentLessonIndex];\n    const shouldHide = currentLesson ? (currentLesson.hideMifOptions ?? currentLesson.chkHideMifOptions ?? true) : true;\n    \n    const mifQs = qs.filter(q => q.type === 'mif');\n    \n    // 1. TỰ ĐỘNG ĐỒNG BỘ UI CỦA CÁC NÚT INLINE THEO RADIO GỐC\n    mifQs.forEach(q => {\n        const checkedRadio = document.querySelector(`input[name=\"mif${q.id}\"]:checked`);\n        const checkedVal = checkedRadio ? checkedRadio.value : null;\n        \n        document.querySelectorAll(`.mif-inline-btn[data-qid=\"${q.id}\"]`).forEach(btn => {\n            const btnPara = btn.closest('.mif-inline-box').dataset.para;\n            if (checkedVal) {\n                if (btnPara === checkedVal) {\n                    btn.classList.add('selected');\n                    btn.classList.remove('hidden-by-other');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            } else {\n                btn.classList.remove('selected', 'hidden-by-other');\n            }\n        });\n    });\n\n    if (!shouldHide) {\n        mifQs.forEach(q => {\n            mifRange.split('').forEach(char => {\n                const input = document.querySelector(`input[name=\"mif${q.id}\"][value=\"${char}\"]`);\n                if(input) {\n                    input.closest('label').style.display = 'inline-block';\n                }\n            });\n        });\n        return; \n    }\n\n    // 2. TÍNH TOÁN VÀ ẨN HIỆN CÁC ĐÁP ÁN\n    const capacities = {};\n    mifRange.split('').forEach(c => capacities[c] = 1); \n    \n    const keyCounts = {};\n    mifQs.forEach(q => {\n        const k = (q.correctAnswer || '').trim().toUpperCase();\n        if(k) keyCounts[k] = (keyCounts[k] || 0) + 1;\n    });\n    for(let k in keyCounts) {\n        if(keyCounts[k] > 1) capacities[k] = keyCounts[k]; \n    }\n\n    const currentCounts = {};\n    mifRange.split('').forEach(c => currentCounts[c] = 0);\n    mifQs.forEach(q => {\n        const checked = document.querySelector(`input[name=\"mif${q.id}\"]:checked`);\n        if(checked) currentCounts[checked.value] = (currentCounts[checked.value] || 0) + 1;\n    });\n\n    mifQs.forEach(q => {\n        mifRange.split('').forEach(char => {\n            const input = document.querySelector(`input[name=\"mif${q.id}\"][value=\"${char}\"]`);\n            if(input) {\n                const label = input.closest('label');\n                if (!input.checked && currentCounts[char] >= capacities[char]) {\n                    label.style.display = 'none';\n                } else {\n                    label.style.display = 'inline-block';\n                }\n            }\n        });\n    });\n};\n\nwindow.check = (forceShowKey = false) => {\n    // 1. Kiểm tra trạng thái làm lại của bài hiện tại\n    if (lessonsData[currentLessonIndex].hasRetried === undefined) {\n        lessonsData[currentLessonIndex].hasRetried = false;\n    }\n    let showKey = forceShowKey || lessonsData[currentLessonIndex].hasRetried;\n\n    const checkGap = (user, key) => {\n        if (!user || !key) return false;\n        const u = user.trim().toLowerCase();\n        const keys = key.split('/').map(k => k.trim().toLowerCase());\n        return keys.some(k => {\n            const base = k.replace(/(s)/g, '').trim();\n            const plural = k.replace(/(s)/g, 's').trim();\n            return u === base || u === plural || u === k;\n        });\n    };\n    document.querySelectorAll('.ans-key, .inline-exp').forEach(e=>e.remove());\n    document.querySelectorAll('.input-correct, .input-wrong, .correct-zone, .wrong-zone, .correct-opt, .wrong-opt').forEach(e=> al = el?el.innerText.trim():\"\";\n                    if(el) {\n                        if(checkGap(userVal, keyVal)) { el.classList.add('correct-zone'); isCorrect = true; }\n                        else { el.classList.add('wrong-zone'); }\n                    }\n                }\n                if(q.type==='gap-fill-block' || q.type==='diagram') {\n\t\t\t\t\tel=document.querySelector(`input[data-gid=\"${gid}\"]`); userVal = el?el.value.trim():\"\";\n\t\t\t\t\tif(el) {\n\t\t\t\t\t\tif(checkGap(userVal, keyVal)) { el.classList.add('input-correct'); isCorrect = true; }\n\t\t\t\t\t\telse { el.classList.add('input-wrong'); }\n\t\t\t\t\t}\n\t\t\t\t}\n\n                if(el) {\n                    let insertHtml = '';\n                    if(isCorrect) {\n                        score++;\n                        document.getElementById('prog-'+gid).classList.add('prog-correct');\n                    } else {\n                        if (showKey) insertHtml += `<span class=\"ans-key\">${keyVal}</span>`;\n                        document.getElementById('prog-'+gid).classList.add('prog-wrong');\n                    }\n                    if(q.explanations && q.explanations[gid] && showKey) {\n                        insertHtml += `<span class=\"inline-exp\" style=\"display:inline-block; margin-left:6px; position:relative; vertical-align:middle;\">\n                            <button class=\"exp-btn\" style=\"padding:2px 6px; font-size:10px; margin:0;\" onclick=\"event.stopPropagation(); document.querySelectorAll('.inline-exp .exp-box').forEach(b => { if(b !== this.nextElementSibling) b.classList.add('hidden'); }); this.nextElementSibling.classList.toggle('hidden')\">💡 Exp</button>\n                            <span class=\"exp-box hidden\" style=\"position:absolute; top:100%; left:50%; transform:translateX(-50%); z-index:50; width:max-content; max-width:250px; margin-top:4px; padding:8px; background:#f5f3ff; box-shadow:0 4px 6px rgba(0,0,0,0.1); border:1px solid #c4b5fd n        const checked = document.querySelector(`input[name=\"mif${q.id}\"]:checked`);\n        if (checked && checked.value === (q.correctAnswer || '').toUpperCase()) return false; \n        return true;\n    });\n\n    // 3. Trộn ngẫu nhiên và lấy đủ số lượng để tổng = 3\n    const distractorsNeeded = Math.max(0, 3 - correctQs.length);\n    const selectedDistractors = availableDistractors.sort(() => 0.5 - Math.random()).slice(0, distractorsNeeded);\n\n    // 4. Gộp lại và sắp xếp theo thứ tự câu hỏi\n    const qsToShow = [...correctQs, ...selectedDistractors].sort((a, b) => a.id - b.id);\n\n    \n    qsToShow.forEach(q => {\n        const mainRadio = document.querySelector(`input[name=\"mif${q.id}\"]:checked`);\n        const isChecked = mainRadio && mainRadio.value === pChar ? 'checked' : '';\n        qsHtml += `\n        <div class=\"q-block\" style=\"background:#fff\">\n            <div style=\"font-weight:bold;margin-bottom:8px;font-size:15px\"><span class=\"q-num\">${q.id}.</span> ${q.text}</div>\n            <label class=\"mif-label\" style=\"display:inline-block\">\n                <input type=\"checkbox\" ${isChecked} onchange=\"syncMif(${q.id}, '${pChar}', this.checked)\">\n                <span class=\"mif-circle\" style=\"width:auto;padding:0 20px;border-radius:20px;height:40px;cursor:pointer\">Chọn đoạn ${pChar}</span>\n            </label>\n        </div>`;\n    });\n    document.getElementById('mif-qs-container').innerHTML = qsHtml;\n    // --- KẾT THÚC ĐOẠN SỬA ---\n    \n    document.getElementById('mif-prev').disabled = currentMifIndex === 0;\n    document.getElementById('mif-next').innerText = currentMifIndex === mifParaChars.length - 1 ? \"Hoàn thành\" : \"Next ➡\";\n};\n\nwindow.hlMifVi = (i, isEnter) => { const el = document.getElementById('mif-vi-'+i); if(el) el.style.background = isEnter ? '#fef08a' : 'transparent'; };\n\nwindow.syncMif = (qId, pChar, isChecked) => {\n    const mainRadio = document.querySelector(`input[name=\"mif${qId}\"][value=\"${pChar}\"]`);\n    if(mainRadio) {\n        mainRadio.checked = isChecked;\n        if(isChecked) {\n            window.upd(qId);\n        } else {\n            const prog = document.getElementById('prog-' + qId);\n            if (prog) prog.classList.remove('filled');\n        }\n    }\n    if (typeof updateMifVisibility === 'function') updateMifVisibility();\n};\n\nwindow.toggleInlineMif = (qId, pChar) => {\n    const mainRadio = document.querySelector(`input[name=\"mif${qId}\"][value=\"${pChar}\"]`);\n    if (!mainRadio) return;\n\n    if (mainRadio.checked) {\n        mainRadio.checked = false;\n        const prog = document.getElementById('prog-' + qId);\n        if (prog) prog.classList.remove('filled');\n    } else {\n        mainRadio.checked = true;\n        window.upd(qId);\n    }\n    if (typeof updateMifVisibility === 'function') updateMifVisibility();\n};\n\n\n\nwindow.navMif = (dir) => { if(dir === 1 && currentMifIndex === mifParaChars.length - 1) { toggleMifMode(); return; } currentMifIndex += dir; renderMifFocus(); };\n\nlet state = { engOrder: [], shuffledVie: [], matches: {}, score: 0 };\nlet currentPicked = null;\n\nfunction toggleGame() {\n    const g = document.getElementById('game-view'); const r = document.getElementById('reading-view');\n    if(g.style.display === 'block') { g.style.display = 'none'; r.style.display = 'flex'; } \n    else { g.style.display = 'block'; r.style.display = 'none'; if(pairs.length > 0) initGame(); }\n}\n\nfunction shuffleArray(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }\n\nfunction initGame(){\n  const engListEl = document.getElementById('engList');\n  state.matches = {}; state.score = 0;\n  if(pairs.length === 0) { engListEl.innerHTML = '<div style=\"color:white;padding:20px\">No vocab data selected in the Generator!</div>'; return; }\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i));\n  state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\n  renderEng(); renderVie(); attachSlotEvents(); updateScore(); initFlashcards(); renderFillList();\n}\n\nfunction renderEng(){\n  const engListEl = document.getElementById('engList'); engListEl.innerHTML = '';\n  state.engOrder.forEach((origIndex, pos) => {\n    const p = pairs[origIndex]; const item = document.createElement('div'); item.className = 'g-eng-item'; item.dataset.origIndex = origIndex;\n    item.innerHTML = `<div class=\"g-eng-left\"><div class=\"g-index\">${pos+1}</div><div><div style=\"font-weight:700;display:flex;align-items:center;gap:6px;\">${p.eng} <span onclick=\"speak('${p.eng}')\" style=\"cursor:pointer;font-size:14px;\" title=\"Nghe phát âm\">🔊</span></div><div style=\"font-size:13px; color:var(--muted)\">${p.phonetic ? p.phonetic : 'English'}</div></div></div><div class=\"g-slot\" data-index=\"${origIndex}\" aria-label=\"drop slot\" tabindex=\"0\"><div class=\"inner\"></div></div>`;\n    engListEl.appendChild(item);\n  });\n}\n\nfunction renderVie(){\n  const vieListEl = document.getElementById('vieList'); vieListEl.innerHTML = '';\n  state.shuffledVie.forEach((text, idx) => {\n    const d = document.createElement('div'); d.className = 'g-vie-item'; d.draggable = true; d.dataset.text = text; d.id = 'vie-'+idx; d.innerHTML = `<span style=\"font-weight:600\">${text}</span>`; vieListEl.appendChild(d);\n    d.addEventListener('dragstart', e => { d.classList.add('dragging'); e.dataTransfer.setData('text/plain', text); currentPicked = {text, el:d}; });\n    d.addEventListener('dragend', ()=> d.classList.remove('dragging'));\n    d.addEventListener('click', () => { if(currentPicked && currentPicked.el === d){ currentPicked = null; d.style.outline = ''; } else { clearPicked(); currentPicked = {text, el:d}; d.style.outline = '2px solid rgba(6,182,212,0.18)'; } });\n  });\n}\n\nfunction attachSlotEvents(){\n  const slots = document.querySelectorAll('.g-slot');\n  slots.forEach(slot => {\n    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('active'); });\n    slot.addEventListener('dragleave', () => slot.classList.remove('active'));\n    slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('active'); const text = e.dataTransfer.getData('text/plain'); handleDrop(slot, text); });\n    slot.addEventListener('click', () => { if(currentPicked) handleDrop(slot, currentPicked.text); });\n    slot.addEventListener('focus', () => slot.classList.add('highlight'));\n    slot.addEventListener('blur', () => slot.classList.remove('highlight'));\n    slot.addEventListener('keydown', e => { if(e.key === 'Enter' && currentPicked) handleDrop(slot, currentPicked.text); });\n  });\n}\n\nfunction handleDrop(slot, vieText){\n  const engIndex = Number(slot.dataset.index); const correctVie = pairs[engIndex].vie; if(state.matches[engIndex]) return;\n  if(vieText === correctVie){\n    slot.classList.add('correct'); slot.innerHTML = `<div class=\"inner\"><span style=\"color:#10b981;margin-right:5px\">✓</span> <span style=\"font-weight:700;color:var(--success)\">${vieText}</span></div>`;\n    slot.style.borderColor = 'rgba(16,185,129,0.9)'; slot.style.boxShadow = '0 10px 30px rgba(16,185,129,0.06)';\n    state.matches[engIndex] = vieText; state.score++; updateScore(); celebrate(); speak(pairs[engIndex].eng); removeVieItem(vieText);\n    if(state.score === pairs.length){ setTimeout(()=> alert('Chúc mừng! Bạn đã ghép đúng tất cả.'), 300); }\n  } else {\n    slot.classList.add('g-wrong'); setTimeout(()=> slot.classList.remove('g-wrong'), 420);\n    const vieEl = findVieElement(vieText);\n    if(vieEl){ vieEl.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}], {duration:300}); }\n  }\n}\n\nfunction removeVieItem(text){ const el = findVieElement(text); if(el){ el.remove(); currentPicked = null; } }\nfunction findVieElement(text){ return Array.from(document.querySelectorAll('.g-vie-item')).find(x => x.dataset.text === text); }\nfunction updateScore(){ document.getElementById('score').innerHTML = `Đúng: <strong>${state.score}</strong> / ${pairs.length}`; }\n\nfunction celebrate(){\n  const colors = ['#06b6d4','#f97316','#f43f5e','#10b981','#60a5fa']; const confettiEl = document.getElementById('confetti');\n  for(let i=0;i<18;i++){\n    const p = document.createElement('div'); p.className = 'piece'; p.style.left = Math.random()*100 + '%'; p.style.background = colors[Math.floor(Math.random()*colors.length)];\n    p.style.width = (8 + Math.random()*10) + 'px'; p.style.height = (10 + Math.random()*14) + 'px'; p.style.animationDuration = (900 + Math.random()*700) + 'ms'; confettiEl.appendChild(p); setTimeout(()=> p.remove(), 2000);\n  }\n}\n\ndocument.getElementById('shuffleBtn').addEventListener('click', () => { state.engOrder = shuffleArray(pairs.map((_,i)=>i)); state.shuffledVie = shuffleArray(pairs.map(p => p.vie)); renderEng(); renderVie(); attachSlotEvents(); state.matches = {}; state.score = 0; updateScore(); });\ndocument.getElementById('resetBtn').addEventListener('click', () => initGame());\n\nfunction clearPicked(){ if(currentPicked && currentPicked.el) currentPicked.el.style.outline = ''; currentPicked = null; }\ndocument.addEventListener('click', (e) => { if(!e.target.closest('.g-vie-item') && !e.target.closest('.g-slot')) clearPicked(); });\n\nlet flashIndex = 0; let flashAuto = null;\nfunction initFlashcards(){ flashIndex = 0; renderFlash(); }\nfunction renderFlash(){\n  const flashFront = document.getElementById('flashFront'); const flashBack = document.getElementById('flashBack'); const flashcardEl = document.getElementById('flashcard');\n  if(pairs.length === 0){ flashFront.textContent = 'Không có từ nào'; flashBack.textContent = ''; return; }\n  const p = pairs[flashIndex]; flashFront.innerHTML = `<div>${p.eng} <span onclick=\"event.stopPropagation(); speak('${p.eng}')\" style=\"cursor:pointer;font-size:18px;\" title=\"Nghe phát âm\">🔊</span></div><div style=\"font-size:14px;color:rgba(255,255,255,0.7);margin-top:5px;\">${p.phonetic || ''}</div>`; flashBack.textContent = p.vie; flashcardEl.classList.remove('flipped'); flashcardEl.setAttribute('aria-pressed','false');\n}\ndocument.getElementById('nextCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex + 1) % pairs.length; renderFlash(); } });\ndocument.getElementById('prevCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex - 1 + pairs.length) % pairs.length; renderFlash(); } });\ndocument.getElementById('flipCard').addEventListener('click', () => { const f = document.getElementById('flashcard'); f.classList.toggle('flipped'); f.setAttribute('aria-pressed', f.classList.contains('flipped')); });\ndocument.getElementById('flashcard').addEventListener('click', function() { this.classList.toggle('flipped'); this.setAttribute('aria-pressed', this.classList.contains('flipped')); });\ndocument.getElementById('autoPlay').addEventListener('click', (e) => {\n  if(flashAuto){ clearInterval(flashAuto); flashAuto = null; e.target.textContent = 'Auto'; }\n  else { flashAuto = setInterval(()=>{ flashIndex = (flashIndex+1)%pairs.length; renderFlash(); }, 2000); e.target.textContent = 'Stop'; }\n});\ndocument.getElementById('showBoth').addEventListener('click', () => { const f = document.getElementById('flashcard'); f.classList.add('flipped'); setTimeout(()=> f.classList.remove('flipped'), 1600); });\n\nfunction renderFillList(){\n  const fillListEl = document.getElementById('fillList'); const fillScoreEl = document.getElementById('fillScore');\n  fillListEl.innerHTML = '';\n  pairs.forEach((p, idx) => {\n    const row = document.createElement('div'); row.className = 'fill-row';\n    row.innerHTML = `<div class=\"vie\">${p.vie}</div><input type=\"text\" data-index=\"${idx}\" placeholder=\"Nhập tiếng Anh...\" /><div class=\"small\" style=\"min-width:120px\" id=\"hint-${idx}\"></div>`;\n    fillListEl.appendChild(row);\n    const input = row.querySelector('input'); input.addEventListener('focus', () => input.classList.remove('wrong')); input.addEventListener('blur', () => {});\n  });\n  fillScoreEl.textContent = `Điểm: 0 / ${pairs.length}`;\n}\n\ndocument.getElementById('checkFill').addEventListener('click', () => {\n  const fillListEl = document.getElementById('fillList'); let correct = 0;\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`); const hint = document.getElementById(`hint-${idx}`);\n    const val = (input.value || '').trim().toLowerCase(); const target = p.eng.trim().toLowerCase();\n    if(val === target){\n      correct++; input.classList.add('correct'); input.classList.remove('wrong'); input.style.borderColor = 'rgba(16,185,129,0.9)'; hint.innerHTML = `<span class=\"correct-answer\">Đúng</span>`;\n    } else {\n      input.classList.remove('correct'); input.classList.add('wrong'); input.style.borderColor = 'rgba(244,63,94,0.9)'; hint.innerHTML = `<span class=\"wrong-answer\">Sai</span>`;\n    }\n  });\n  document.getElementById('fillScore').textContent = `Điểm: ${correct} / ${pairs.length}`;\n});\n\ndocument.getElementById('showAnswers').addEventListener('click', () => {\n  const fillListEl = document.getElementById('fillList');\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\n    input.value = p.eng; input.classList.add('correct'); input.style.borderColor = 'rgba(6,182,212,0.6)';\n    const hint = document.getElementById(`hint-${idx}`); hint.innerHTML = `<span class=\"correct-answer\">Đáp án</span>`;\n  });\n  document.getElementById('fillScore').textContent = `Điểm: ${pairs.length} / ${pairs.length}`;\n});\n\ndocument.getElementById('resetFill').addEventListener('click', () => renderFillList());\n\n// --- BẮT ĐẦU: FOCUS MODE (LUYỆN TỪNG CÂU) ---\nwindow.isFocusMode = false;\nwindow.focusItems = [];\nwindow.currentFocusIdx = 0;\n\nwindow.toggleFocusMode = () => {\n    isFocusMode = !isFocusMode;\n    const btn = document.getElementById('focusModeBtn');\n    if(isFocusMode) {\n        btn.style.background = '#be185d'; \n        btn.innerText = 'Đóng Luyện Từng Câu';\n        initFocusMode();\n    } else {\n        btn.style.background = '#ec4899'; \n        btn.innerText = '🔍 Luyện Từng Câu';\n        exitFocusMode();\n    }\n};\n\nwindow.initFocusMode = () => {\n    focusItems = [];\n    let lastInst = null;\n    const qDiv = document.getElementById('qs');\n    \n    // Gom nhóm thông minh: Quét lần lượt từ trên xuống để map Instruction với Question\n    Array.from(qDiv.children).forEach(el => {\n        if (el.classList.contains('instruction-box')) {\n            lastInst = el;\n        } else if (el.classList.contains('q-block')) {\n            const match = el.id.match(/q-card-(.+)/);\n            if(match) {\n                const qId = parseInt(match[1]);\n                const qObj = qs.find(q => q.id === qId);\n                if(qObj) {\n                    focusItems.push({ qCard: el, instBox: lastInst, qObj: qObj });\n                }\n            }\n        }\n    });\n\n    if(focusItems.length === 0) {\n        alert(\"Không tìm thấy câu hỏi nào để luyện!\");\n        toggleFocusMode();\n        return;\n    }\n\n    // Tạo thanh điều hướng\n    let navBar = document.getElementById('focus-nav-bar');\n    if(!navBar) {\n        navBar = document.createElement('div');\n        navBar.id = 'focus-nav-bar';\n        qDiv.insertBefore(navBar, qDiv.firstChild);\n    }\n    navBar.style.display = 'flex';\n    \n    currentFocusIdx = 0;\n    renderFocusStep();\n};\n\nwindow.renderFocusStep = () => {\n    const item = focusItems[currentFocusIdx];\n    const qDiv = document.getElementById('qs');\n    \n    // 1. Ẩn toàn bộ con của qDiv, thiết lập order mặc định\n    Array.from(qDiv.children).forEach(el => {\n        el.style.display = 'none';\n        el.style.order = '10'; // Đẩy tất cả xuống dưới mặc định\n    });\n    \n    qDiv.style.display = 'flex';\n    qDiv.style.flexDirection = 'column';\n\n    // Đảm bảo nút Next Bài luôn hiện và bị ép nằm dưới cùng\n    const nextBtn = qDiv.querySelector('.next-lesson-wrap');\n    if (nextBtn && !window.isSkillMode) {\n        nextBtn.style.display = 'block';\n        nextBtn.style.order = '9999';\n    }\n\n    // Hiển thị instruction lên trên cùng\n    if(item.instBox) {\n        item.instBox.style.display = 'block';\n        item.instBox.style.order = '-1'; \n    }\n    \n    // 2. Xử lý trộn 3 câu cho dạng MIF\n    if (item.qObj && item.qObj.type === 'mif') {\n        const allMifQs = qs.filter(q => q.type === 'mif');\n        const distractors = allMifQs.filter(q => q.id !== item.qObj.id).sort(() => 0.5 - Math.random()).slice(0, 2);\n        \n        let displayQs = [item.qObj, ...distractors];\n        displayQs.sort(() => 0.5 - Math.random());\n        \n        displayQs.forEach((q, index) => {\n            const qCard = document.getElementById('q-card-' + q.id);\n            if (qCard) {\n                qCard.style.display = 'block';\n                qCard.style.order = index; // Gán thứ tự ngẫu nhiên 0, 1, 2\n            }\n        });\n    } else {\n        if (item.qCard) {\n            item.qCard.style.display = 'block';\n            item.qCard.style.order = '0';\n        }\n    }\n    \n    // 3. Render Nav Bar + Nút Ngẫu nhiên cố định\n    const navBar = document.getElementById('focus-nav-bar');\n    if (navBar) {\n        navBar.style.order = '-2';\n        if (window.isSkillMode) {\n            navBar.style.background = 'linear-gradient(to right, #eff6ff, #e0f2fe)';\n            navBar.style.border = '1px solid #bfdbfe';\n            navBar.style.padding = '12px 20px';\n            navBar.style.justifyContent = 'center';\n            \n            const skillItem = skillBank.find(x => x.qId == (item.qObj.id || (item.qObj.gapIds && item.qObj.gapIds[0])));\n            navBar.innerHTML = `\n                <div style=\"flex:1; display:flex; align-items:center; gap:10px;\">\n                    <div style=\"font-weight:800; color:#0ea5e9; font-size:14px; text-transform:uppercase;\">📖 Nguồn: ${skillItem ? skillItem.lessonName : \"Bài tập\"}</div>\n                </div>\n                <div style=\"flex:1; display:flex; justify-content:flex-end;\">\n                    <button onclick=\"generateRandomSkill()\" style=\"display:flex; align-items:center; gap:6px; padding: 8px 18px; border-radius: 20px; background: linear-gradient(90deg, #8b5cf6, #6366f1); color: white; border:none; cursor: pointer; box-shadow: 0 4px 10px rgba(139,92,246,0.3); font-weight:700; transition:0.2s; font-size: 13px; text-transform:uppercase;\">\n                        Câu ngẫu nhiên ➡\n                    </button>\n                </div>\n            `;\n        } else {\n            navBar.style.background = 'transparent';\n            navBar.style.border = 'none';\n            navBar.style.boxShadow = 'none';\n            navBar.style.padding = '0 0 15px 0';\n            navBar.style.justifyContent = 'flex-start';\n            navBar.style.gap = '8px';\n            \n            navBar.innerHTML = `\n                <button onclick=\"navFocus(-1)\" ${currentFocusIdx === 0 ? 'disabled' : ''} style=\"display: flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 20px; background: ${currentFocusIdx === 0 ? '#cbd5e1' : '#3b82f6'}; color: white; border: none; font-weight: 600; font-size: 13px; cursor: ${currentFocusIdx === 0 ? 'not-allowed' : 'pointer'}; transition: 0.2s;\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M12 19l-7-7 7-7\"/></svg>\n                    Câu trước\n                </button>\n                <div style=\"padding: 6px 16px; border-radius: 20px; border: 1px solid #bfdbfe; background: white; color: #2563eb; font-weight: 700; font-size: 13px;\">\n                    Câu ${currentFocusIdx + 1} <span style=\"color:#94a3b8; font-weight:500; margin: 0 6px;\">/</span> ${focusItems.length}\n                </div>\n                <button onclick=\"navFocus(1)\" ${currentFocusIdx === focusItems.length - 1 ? 'disabled' : ''} style=\"display: flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 20px; background: ${currentFocusIdx === focusItems.length - 1 ? '#cbd5e1' : '#3b82f6'}; color: white; border: none; font-weight: 600; font-size: 13px; cursor: ${currentFocusIdx === focusItems.length - 1 ? 'not-allowed' : 'pointer'}; transition: 0.2s;\">\n                    Câu tiếp\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M12 5l7 7-7 7\"/></svg>\n                </button>\n            `;\n        }\n        navBar.style.display = 'flex';\n    }\n\n    // 4. Lọc Đoạn Văn Đích / Gợi Ý bên trái\n    document.querySelectorAll('.para-box').forEach(box => box.style.display = 'none');\n    document.querySelectorAll('.sent').forEach(s => s.classList.remove('focus-highlight'));\n    \n    let foundAny = false;\n    const q = item.qObj;\n\n    if (q && q.type === 'mif' && q.correctAnswer) {\n        const pChar = q.correctAnswer.trim().toUpperCase();\n        const pIndex = pChar.charCodeAt(0) - 65;\n        const paraBoxes = document.querySelectorAll('.para-box');\n        if (pIndex >= 0 && pIndex < paraBoxes.length) {\n            paraBoxes[pIndex].style.display = 'block';\n            foundAny = true;\n        }\n    } else {\n        let locs = [];\n        if(q.location) locs.push(q.location);\n        if(q.locations) Object.values(q.locations).forEach(l => { if(l) locs.push(l); });\n        \n        let finalLocs = [];\n        locs.forEach(l => {\n            l.split('/').forEach(p => {\n                const clean = p.trim().toLowerCase().replace(/\\s+/g, ' ');\n                if(clean.length > 0) finalLocs.push(clean);\n            });\n        });\n        \n        if(finalLocs.length > 0) {\n            document.querySelectorAll('.sent').forEach(s => {\n                const sText = s.innerText.trim().toLowerCase().replace(/\\s+/g, ' ');\n                const isMatch = finalLocs.some(part => sText.includes(part) || (part.length > 15 && part.includes(sText)));\n                if(isMatch) {\n                    s.classList.add('focus-highlight');\n                    s.closest('.para-box').style.display = 'block';\n                    foundAny = true;\n                }\n            });\n        }\n    }\n    \n    if(!foundAny) {\n        document.querySelectorAll('.para-box').forEach(box => box.style.display = 'block');\n    }\n\n    document.querySelector('.right').scrollTop = 0;\n    document.querySelector('.left').scrollTop = 0;\n};\n\nwindow.navFocus = (dir) => {\n    currentFocusIdx += dir;\n    if(currentFocusIdx < 0) currentFocusIdx = 0;\n    if(currentFocusIdx >= focusItems.length) currentFocusIdx = focusItems.length - 1;\n    renderFocusStep();\n};\n\nwindow.exitFocusMode = () => {\n    const qDiv = document.getElementById('qs');\n    \n    // Khôi phục hiển thị và thứ tự của mọi phần tử con\n    Array.from(qDiv.children).forEach(el => {\n        el.style.display = 'block';\n        el.style.order = '0';\n    });\n    \n    // Trả container về định dạng mặc định (hủy tính năng flex/order)\n    qDiv.style.display = 'block'; \n\n    document.querySelectorAll('.para-box').forEach(box => box.style.display = 'block');\n    document.querySelectorAll('.sent').forEach(s => s.classList.remove('focus-highlight'));\n    \n    const navBar = document.getElementById('focus-nav-bar');\n    if(navBar) navBar.style.display = 'none';\n};\n// --- KẾT THÚC: FOCUS MODE ---\n\nwindow.renderDashboard = () => {\n    const sel = document.getElementById('lesson-selector');\n    sel.innerHTML = '';\n    \n    const cardArea = document.getElementById('card-render-area');\n    let cardsHtml = '';\n\n    lessonsData.forEach((l, i) => {\n        const opt = document.createElement('option');\n        opt.value = i; opt.innerText = l.name;\n        sel.appendChild(opt);\n\n        const iconSvg = `<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"></path><polyline points=\"14 2 14 8 20 8\"></polyline><line x1=\"16\" y1=\"13\" x2=\"8\" y2=\"13\"></line><line x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"></line><polyline points=\"10 9 9 9 8 9\"></polyline></svg>`;\n        \n        let tagsHtml = '';\n        if (l.qTypeRows && l.qTypeRows.length > 0) {\n            l.qTypeRows.forEach(r => { tagsHtml += `<div class=\"q-tag\">${r.type} <span class=\"q-tag-count\">${r.count}</span></div>`; });\n        } else {\n            tagsHtml = `<div class=\"q-tag\">IELTS Reading <span class=\"q-tag-count\">Practice</span></div>`;\n        }\n\n        if (l.lastResult) {\n            tagsHtml += `<div class=\"q-tag\" style=\"background:#f0fdf4; color:#16a34a; border-color:#bbf7d0;\">Kết quả: <span class=\"q-tag-count\" style=\"background:#16a34a; color:white;\">${l.lastResult}</span></div>`;\n        }\n\n        cardsHtml += `\n        <div class=\"test-card\">\n            <div class=\"card-header\">${iconSvg} ${l.name}</div>\n            <div class=\"q-types-box\">${tagsHtml}</div>\n            <div class=\"card-stats\">\n                <div class=\"stat-item\"><span>☑</span> ${l.qCount} câu</div>\n                <div class=\"stat-item\"><span>⏱</span> ${l.timeLimit} phút</div>\n                <div class=\"stat-item\"><span>👤</span> -- Lượt</div>\n            </div>\n            <div class=\"card-actions\">\n                <button class=\"btn-tag ${i === 0 ? '' : 'pro'}\">${i === 0 ? 'Miễn phí' : '👑 Pro'}</button>\n                <button class=\"btn-enter\" onclick=\"startTest(${i})\">Vào làm bài ❯</button>\n            </div>\n        </div>`;\n    });\n    \n    cardArea.innerHTML = cardsHtml;\n    \n    // MỚI: Mặc định ẩn toàn bộ các bài passage đi\n    cardArea.style.display = 'none';\n\n    // THÊM 2 NÚT NẰM CÙNG HÀNG VÀO SẢNH CHỜ\n    if(!document.getElementById('btn-skill-dash-wrap')) {\n        const wrap = document.createElement('div');\n        wrap.id = 'btn-skill-dash-wrap';\n        wrap.style.display = 'flex';\n        wrap.style.justifyContent = 'center';\n        wrap.style.gap = '20px';\n        wrap.style.width = '100%';\n        wrap.style.marginBottom = '30px';\n        wrap.style.flexWrap = 'wrap'; // Đề phòng trên mobile màn hình nhỏ bị tràn\n        \n        // Nút Luyện Kỹ Năng\n        const btnSkill = `<button onclick=\"startSkillMode()\" class=\"btn-skill-dash\" style=\"margin-bottom:0;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"></circle><circle cx=\"12\" cy=\"12\" r=\"6\"></circle><circle cx=\"12\" cy=\"12\" r=\"2\"></circle></svg> LUYỆN TẬP THEO DẠNG BÀI</button>`;\n        \n        // Nút Hiện Tất Cả Passage (Tái sử dụng class btn-skill-dash nhưng đổi màu xanh dương cho phân biệt)\n        const btnPassage = `<button onclick=\"togglePassages()\" class=\"btn-skill-dash\" style=\"margin-bottom:0; background: linear-gradient(90deg, #0ea5e9, #2563eb); box-shadow: 0 4px 10px rgba(14,165,233,0.3);\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20\"></path></svg> LUYỆN TẤT CẢ PASSAGE</button>`;\n\n        wrap.innerHTML = btnSkill + btnPassage;\n        cardArea.parentNode.insertBefore(wrap, cardArea);\n    }\n};\n\n// HÀM MỚI: Dùng để bật/tắt hiển thị danh sách các bài Passage\nwindow.togglePassages = () => {\n    const cardArea = document.getElementById('card-render-area');\n    if (cardArea.style.display === 'none' || cardArea.style.display === '') {\n        cardArea.style.display = 'flex'; // Trả lại display flex gốc của card-container để hiển thị dạng lưới\n    } else {\n        cardArea.style.display = 'none'; // Ẩn đi\n    }\n};\n\n\n\nwindow.isSkillMode = false;\nwindow.skillBank = [];\n\nwindow.initSkillBank = () => {\n    skillBank = [];\n    lessonsData.forEach((l, lIdx) => {\n        (l.qs || []).forEach(q => {\n            if(q.type === 'text-only') return;\n            let uiType = 'Other Types';\n            if(q.type === 'tfng') uiType = 'True - False - Not Given';\n            else if(q.type === 'ynng') uiType = 'Yes - No - Not Given';\n            else if(q.type === 'mcq' || q.type === 'mcq-multi') uiType = 'Multiple Choice';\n            else if(q.type === 'summary' || q.type === 'gap-fill-block' || q.type === 'gap-fill' || q.type === 'diagram') uiType = 'Gap Filling / Summary';\n            else if(q.type === 'mif') uiType = 'Matching Information';\n            \n            skillBank.push({ type: uiType, lIdx: lIdx, qId: q.id || (q.gapIds && q.gapIds[0]), qObj: q, lessonName: l.name });\n        });\n    });\n};\n\nwindow.toggleSkillSidebar = () => {\n    const sb = document.getElementById('skill-sidebar');\n    sb.style.display = (sb.style.display === 'none' || sb.style.display === '') ? 'flex' : 'none';\n};\n\nwindow.startSkillMode = () => {\n    window.isSkillMode = true;\n    document.body.classList.remove('in-dashboard');\n    document.getElementById('dashboard-view').style.display = 'none';\n    \n    // Tạm ẩn các tính năng của bài full test\n    document.getElementById('lesson-selector').style.display = 'none';\n    document.getElementById('timer').style.display = 'none';\n    document.querySelector('.menu-container').style.display = 'none';\n    \n    // MỚI: Ẩn Question Palette và Hiện nút bật tắt Menu Dạng bài\n    document.getElementById('progressBar').style.display = 'none';\n    document.getElementById('toggle-sidebar-btn').style.display = 'flex';\n    document.getElementById('skill-sidebar').style.display = 'flex';\n    \n    initSkillBank();\n    \n    const types = [...new Set(skillBank.map(x => x.type))].sort();\n    document.getElementById('skill-checkboxes').innerHTML = types.map(t => `\n        <label class=\"skill-type-label\">\n            <input type=\"checkbox\" value=\"${t}\" class=\"skill-chk\">\n            <span>${t}</span>\n        </label>\n    `).join('');\n    \n    document.getElementById('articleArea').innerHTML = '<div style=\"text-align:center; padding:50px; color:#94a3b8; font-style:italic;\">Bấm \"NGẪU NHIÊN 1 CÂU\" để bốc từ Ngân hàng đề...</div>';\n    document.getElementById('qs').innerHTML = '';\n};\n\nwindow.generateRandomSkill = () => {\n    const checked = Array.from(document.querySelectorAll('.skill-chk:checked')).map(cb => cb.value);\n    if(checked.length === 0) return alert(\"Vui lòng tick chọn ít nhất 1 dạng bài!\");\n    \n    const pool = skillBank.filter(x => checked.includes(x.type));\n    if(pool.length === 0) return alert(\"Hệ thống chưa có câu hỏi nào thuộc dạng này!\");\n    \n    // MỚI: Tự động Ẩn thanh Sidebar sau khi bốc để mở rộng không gian\n    document.getElementById('skill-sidebar').style.display = 'none';\n    \n    const item = pool[Math.floor(Math.random() * pool.length)];\n    currentLessonIndex = item.lIdx;\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n    \n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('progressBar').innerHTML = '';\n    \n    renderStudentQuestions();\n    attachEvents();\n    if (typeof updateMifVisibility === 'function') updateMifVisibility();\n\n    // Xóa nút \"Sang bài tiếp theo\" (Tránh nhảy bài lung tung)\n    Array.from(document.getElementById('qs').children).forEach(el => {\n        if (el.innerHTML && el.innerHTML.includes('switchLesson') && el.innerHTML.includes('Sang bài tiếp theo')) el.remove();\n    });\n\n    focusItems = [];\n    let lastInst = null;\n    Array.from(document.getElementById('qs').children).forEach(el => {\n        if (el.classList.contains('instruction-box')) lastInst = el;\n        else if (el.classList.contains('q-block')) {\n            const match = el.id.match(/q-card-(.+)/);\n            if(match) {\n                const qId = parseInt(match[1]);\n                const qObj = qs.find(q => q.id == qId || (q.gapIds && q.gapIds[0] == qId));\n                if(qObj) focusItems.push({ qCard: el, instBox: lastInst, qObj: qObj });\n            }\n        }\n    });\n    \n    const fIdx = focusItems.findIndex(x => x.qObj.id == item.qId || (x.qObj.gapIds && x.qObj.gapIds[0] == item.qId));\n    if(fIdx >= 0) {\n        currentFocusIdx = fIdx;\n        isFocusMode = true;\n        renderFocusStep(); \n\t\twindow.skillStartTime = Date.now(); // Bắt đầu tính giờ cho bài Skill\n    }\n};\n\nwindow.goBackToDashboard = () => {\n    if(window.isSkillMode) {\n        window.isSkillMode = false;\n        document.getElementById('skill-sidebar').style.display = 'none';\n        document.getElementById('lesson-selector').style.display = 'block';\n        document.querySelector('.menu-container').style.display = 'inline-block';\n        document.getElementById('timer').style.display = 'block';\n        \n        // MỚI: Trả lại Question Palette và ẩn nút Menu Dạng Bài\n        document.getElementById('progressBar').style.display = 'flex';\n        document.getElementById('toggle-sidebar-btn').style.display = 'none';\n        \n        window.isFocusMode = false;\n        document.getElementById('articleArea').innerHTML = '';\n        document.getElementById('qs').innerHTML = '';\n        document.getElementById('progressBar').innerHTML = '';\n    } else {\n        if(!confirm(\"Bạn có muốn quay lại danh sách bài tập? (Tiến độ và kết quả sẽ được lưu tạm)\")) return;\n        saveCurrentStateToMemory(); \n    }\n    \n    document.body.classList.add('in-dashboard');\n    document.getElementById('dashboard-view').style.display = 'flex';\n    clearInterval(timerInterval);\n    renderDashboard(); \n};\n\n// --- 1. PHÍM TẮT MŨI TÊN TRÁI/PHẢI ---\ndocument.addEventListener('keydown', (e) => {\n    if (!window.isFocusMode) return;\n    \n    if (e.key === 'ArrowLeft') {\n        if (currentFocusIdx > 0) navFocus(-1);\n    } else if (e.key === 'ArrowRight') {\n        if (window.isSkillMode) {\n            generateRandomSkill(); // Nếu luyện skill thì bấm phải là bốc câu ngẫu nhiên\n        } else if (currentFocusIdx < focusItems.length - 1) {\n            navFocus(1); // Nếu luyện từng câu thường thì là câu tiếp\n        }\n    }\n});\n\nwindow.onload = () => {\n    if (document.body.getAttribute('data-is-graded') === 'true') {\n        document.getElementById('lesson-selector').disabled = true;\n        const submitBtn = document.getElementById('submitBtn');\n        if(submitBtn) submitBtn.style.display = 'none';\n        const saveBtn = document.getElementById('saveBtn');\n        if(saveBtn) saveBtn.style.display = 'none';\n        clearInterval(timerInterval);\n        document.getElementById('timer').style.display = 'none';\n        document.getElementById('dashboard-view').style.display = 'none'; \n        return;\n    }\n\n    // Gọi hàm renderDashboard vừa tách để vẽ sảnh chờ lúc load trang\n    window.renderDashboard();\n    \n    // Hiển thị Dashboard\n    document.body.classList.add('in-dashboard');\n};\n\n// Hàm mới để bắt đầu thi từ nút \"Vào thi\"\nwindow.startTest = (idx) => {\n    document.body.classList.remove('in-dashboard');\n    document.getElementById('dashboard-view').style.display = 'none';\n    \n    // --- ĐẢM BẢO KHÔI PHỤC TOÀN BỘ GIAO DIỆN FULL TEST ---\n    window.isSkillMode = false;\n    document.getElementById('skill-sidebar').style.display = 'none';\n    \n    const lessonSel = document.getElementById('lesson-selector');\n    if (lessonSel) lessonSel.style.display = 'inline-block';\n    \n    const menuContainer = document.querySelector('.menu-container');\n    if (menuContainer) menuContainer.style.display = 'inline-block';\n    \n    const timer = document.getElementById('timer');\n    if (timer) timer.style.display = 'block';\n    \n    const progressBar = document.getElementById('progressBar');\n    if (progressBar) progressBar.style.display = 'flex';\n    \n    const toggleBtn = document.getElementById('toggle-sidebar-btn');\n    if (toggleBtn) toggleBtn.style.display = 'none';\n    \n    document.getElementById('lesson-selector').value = idx;\n    switchLesson(idx);\n};\n\n// Hàm xử lý khi nhấn nút QUAY LẠI\nwindow.goBackToDashboard = () => {\n    if(confirm(\"Bạn có muốn quay lại danh sách bài tập? (Tiến độ và kết quả sẽ được lưu tạm)\")) {\n        saveCurrentStateToMemory(); // Gọi lệnh chụp lại ảnh trạng thái\n        \n        document.body.classList.add('in-dashboard');\n        document.getElementById('dashboard-view').style.display = 'flex';\n        clearInterval(timerInterval);\n        \n        renderDashboard(); \n    }\n};\n\n// Patch các hàm có sẵn để đảm bảo nút SUBMIT luôn hiện lại khi thoát chế độ Xem lại\nconst oldGenSkill = window.generateRandomSkill;\nwindow.generateRandomSkill = () => {\n    document.getElementById('submitBtn').style.display = 'inline-block';\n    if(oldGenSkill) oldGenSkill();\n};\n\nconst oldStartTest = window.startTest;\nwindow.startTest = (idx) => {\n    document.getElementById('submitBtn').style.display = 'inline-block';\n    if(oldStartTest) oldStartTest(idx);\n};\n\nwindow.showReport = () => {\n    const history = window.skillHistory || []; \n    document.getElementById('report-view').style.display = 'block';\n    \n    // 1. Thống kê chung\n    const totalLessons = history.length;\n    document.getElementById('rep-total-lessons').innerText = totalLessons;\n    document.getElementById('rep-hist-count').innerText = totalLessons;\n    \n    let totalScore = 0, totalMax = 0, totalTime = 0;\n    history.forEach(h => {\n        totalScore += h.score;\n        totalMax += h.total;\n        totalTime += h.time;\n    });\n    \n    const avgScore = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : 0;\n    document.getElementById('rep-avg-score').innerText = avgScore + '%';\n    \n    const mins = Math.floor(totalTime / 60);\n    const secs = totalTime % 60;\n    \n    document.getElementById('rep-total-time').innerText = mins > 0 ? (mins + ' phút ' + secs + 's') : (secs + 's');\n    \n    // 2. Biểu đồ thanh ngang (Sắp xếp từ Yếu đến Mạnh)\n    const typeStats = {};\n    history.forEach(h => {\n        if(!typeStats[h.type]) typeStats[h.type] = { score: 0, total: 0 };\n        typeStats[h.type].score += h.score;\n        typeStats[h.type].total += h.total;\n    });\n    \n    const typeArr = Object.keys(typeStats).map(t => ({\n        type: t,\n        acc: typeStats[t].total > 0 ? (typeStats[t].score / typeStats[t].total) * 100 : 0\n    })).sort((a,b) => a.acc - b.acc); \n    \n    let chartHtml = '';\n    typeArr.forEach(t => {\n        chartHtml += '<div style=\"display:flex; align-items:center; gap:20px;\">' +\n            '<div style=\"width:200px; font-size:13px; color:#475569; text-align:right;\">' + t.type + '</div>' +\n            '<div style=\"flex:1; border-left:1px solid #e2e8f0; border-right:1px solid #e2e8f0; position:relative; height:32px; background:linear-gradient(90deg, transparent 20%, #f8fafc 20%, transparent 20%, transparent 40%, #f8fafc 40%, transparent 40%, transparent 60%, #f8fafc 60%, transparent 60%, transparent 80%, #f8fafc 80%, transparent 80%);\">' +\n                '<div style=\"position:absolute; left:0; top:0; height:100%; width:' + t.acc + '%; background:#c2410c; transition: 1s ease-out;\"></div>' +\n            '</div>' +\n        '</div>';\n    });\n    \n    if (typeArr.length > 0) {\n        chartHtml += '<div style=\"display:flex; align-items:center; gap:20px; border-top:1px solid #e2e8f0; padding-top:8px;\">' +\n            '<div style=\"width:200px;\"></div>' +\n            '<div style=\"flex:1; display:flex; justify-content:space-between; font-size:11px; color:#64748b;\">' +\n                '<span>0%</span><span>20%</span><span>40%</span><span>60%</span><span>80%</span><span>100%</span>' +\n            '</div>' +\n        '</div>';\n    }\n    document.getElementById('rep-chart').innerHTML = chartHtml || '<div style=\"color:#94a3b8; font-style:italic;\">Chưa có dữ liệu thống kê...</div>';\n    \n    // 3. Lịch sử bảng Table (Mới nhất lên đầu)\n    const sortedHistory = [...history].reverse();\n    let tbodyHtml = '';\n    sortedHistory.forEach(h => {\n        const acc = h.total > 0 ? Math.round((h.score/h.total)*100) : 0;\n        const shortName = h.lessonName.length > 25 ? h.lessonName.substring(0,25) + '...' : h.lessonName;\n        \n        // Đã thay thế dấu nháy đơn bằng mã &quot; siêu an toàn để không bao giờ bị đứt chuỗi lúc Export\n        tbodyHtml += '<tr style=\"border-bottom:1px solid #f1f5f9; transition:0.2s;\" onmouseover=\"this.style.background=&quot;#f8fafc&quot;\" onmouseout=\"this.style.background=&quot;transparent&quot;\">' +\n            '<td style=\"padding:14px 8px; color:#334155;\">' + shortName + '</td>' +\n            '<td style=\"padding:14px 8px; color:#475569;\">' + h.type + '</td>' +\n            '<td style=\"padding:14px 8px; color:#1e293b; font-weight:600;\">' + h.score + '/' + h.total + ' <span style=\"color:#94a3b8;font-size:12px;font-weight:normal;\">(' +
