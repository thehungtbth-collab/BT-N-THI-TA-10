hes before they go to sleep?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Who wears dark clothes so they don’t look dirty?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Who wears special things on their feet to stay comfortable?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5},{\"id\":6,\"type\":\"mif\",\"text\":\"Who has to walk a long way to get to their school?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6},{\"id\":7,\"type\":\"mif\",\"text\":\"Who changes into different clothes as soon as they arrive home?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Leo I always take the same streets after school.\",\"It isn’t the most beautiful way to go, but it takes the least amount of time to get to my front door.\",\"I don’t go by the river because that makes the journey much longer.\",\"My path goes behind the city library and through some small streets.\",\"I love it because there is almost no traffic, so it is really peaceful.\",\"I prefer not to wear headphones or play any music because I just like to hear the birds singing.\"],\"vi\":[\"Leo Tôi luôn đi trên những con phố giống nhau sau giờ học.\",\"Đó không phải là con đường đẹp nhất để đi nhưng lại mất ít thời gian nhất để đến được cửa trước của tôi.\",\"Tôi không đi bằng đường sông vì điều đó khiến cuộc hành trình dài hơn nhiều.\",\"Con đường của tôi đi phía sau thư viện thành phố và xuyên qua một số con phố nhỏ.\",\"Tôi thích nó vì hầu như không có xe cộ qua lại nên rất yên bình.\",\"Tôi không thích đeo tai nghe hay bật bất kỳ bản nhạc nào vì tôi chỉ thích nghe tiếng chim hót.\"]},{\"en\":[\"Mia My walk back takes quite a long time, but I really enjoy it.\",\"I go through the big park in the centre of town.\",\"There are so many beautiful flowers and tall green spaces to see!\",\"Usually, I meet my neighbours there and we stop to say a quick hello.\",\"It is much friendlier than walking alone.\",\"After the park, I walk down the high street.\",\"I always visit the little store on the corner to pick up a new comic or magazine before I finally go inside my house.\"],\"vi\":[\"Mia My đi bộ về mất khá nhiều thời gian nhưng tôi thực sự thích thú.\",\"Tôi đi qua công viên lớn ở trung tâm thị trấn.\",\"Có rất nhiều bông hoa đẹp và không gian xanh cao để xem!\",\"Thông thường, tôi gặp hàng xóm ở đó và chúng tôi dừng lại để chào nhanh.\",\"Nó thân thiện hơn nhiều so với việc đi bộ một mình.\",\"Sau công viên, tôi đi bộ xuống đường cao tốc.\",\"Tôi luôn ghé qua cửa hàng nhỏ ở góc phố để mua một cuốn truyện tranh hoặc tạp chí mới trước khi vào nhà.\"]},{\"en\":[\"Noah When I finish my classes, I immediately put on my headphones.\",\"I love hearing funny podcasts or audio shows on my mobile while I walk.\",\"Because of this, I rarely pause to chat with anyone on my journey.\",\"I usually carry a heavy reading book in my bag, so I don’t go to any shops to get more things.\",\"The best part of my afternoon is walking next to the long city canal.\",\"Seeing the boats go up and down is very relaxing, even though the main road next to it is quite loud.\"],\"vi\":[\"Noah Khi kết thúc buổi học, tôi lập tức đeo tai nghe vào.\",\"Tôi thích nghe những podcast hoặc chương trình âm thanh vui nhộn trên điện thoại di động khi đang đi bộ.\",\"Vì vậy, tôi hiếm khi dừng lại để trò chuyện với bất kỳ ai trên hành trình của mình.\",\"Tôi thường mang theo một cuốn sách đọc nặng trong túi nên tôi không đến bất kỳ cửa hàng nào để mua thêm đồ.\",\"Điều tuyệt vời nhất trong buổi chiều của tôi là đi dạo cạnh con kênh dài của thành phố.\",\"Nhìn những chiếc thuyền lên xuống rất thư giãn, mặc dù con đường chính bên cạnh khá ồn ào.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"Leo\\nI always take the same streets after school. It isn’t the most beautiful way to go, but it takes the least amount of time to get to my front door. I don’t go by the river because that makes the journey much longer. My path goes behind the city library and through some small streets. I love it because there is almost no traffic, so it is really peaceful. I prefer not to wear headphones or play any music because I just like to hear the birds singing.\\n\\nMia\\nMy walk back takes quite a long time, but I really enjoy it. I go through the big park in the centre of town. There are so many beautiful flowers and tall green spaces to see! Usually, I meet my neighbours there and we stop to say a quick hello. It is much friendlier than walking alone. After the park, I walk down the high street. I always visit the little store on the corner to pick up a new comic or magazine before I finally go inside my house.\\n\\nNoah\\nWhen I finish my classes, I immediately put on my headphones. I love hearing funny podcasts or audio shows on my mobile while I walk. Because of this, I rarely pause to chat with anyone on my journey. I usually carry a heavy reading book in my bag, so I don’t go to any shops to get more things. The best part of my afternoon is walking next to the long city canal. Seeing the boats go up and down is very relaxing, even though the main road next to it is quite loud.\",\"transText\":\"Leo Tôi luôn đi trên những con phố giống nhau sau giờ học.\\nĐó không phải là con đường đẹp nhất để đi nhưng lại mất ít thời gian nhất để đến được cửa trước của tôi.\\nTôi không đi bằng đường sông vì điều đó khiến cuộc hành trình dài hơn nhiều.\\nCon đường của tôi đi phía sau thư viện thành phố và xuyên qua một số con phố nhỏ.\\nTôi thích nó vì hầu như không có xe cộ qua lại nên rất yên bình.\\nTôi không thích đeo tai nghe hay bật bất kỳ bản nhạc nào vì tôi chỉ thích nghe tiếng chim hót.\\n\\nMia My đi bộ về mất khá nhiều thời gian nhưng tôi thực sự thích thú.\\nTôi đi qua công viên lớn ở trung tâm thị trấn.\\nCó rất nhiều bông hoa đẹp và không gian xanh cao để xem!\\nThông thường, tôi gặp hàng xóm ở đó và chúng tôi dừng lại để chào nhanh.\\nNó thân thiện hơn nhiều so với việc đi bộ một mình.\\nSau công viên, tôi đi bộ xuống đường cao tốc.\\nTôi luôn ghé qua cửa hàng nhỏ ở góc phố để mua một cuốn truyện tranh hoặc tạp chí mới trước khi vào nhà.\\n\\nNoah Khi kết thúc buổi học, tôi lập tức đeo tai nghe vào.\\nTôi thích nghe những podcast hoặc chương trình âm thanh vui nhộn trên điện thoại di động khi đang đi bộ.\\nVì vậy, tôi hiếm khi dừng lại để trò chuyện với bất kỳ ai trên hành trình của mình.\\nTôi thường mang theo một cuốn sách đọc nặng trong túi nên tôi không đến bất kỳ cửa hàng nào để mua thêm đồ.\\nĐiều tuyệt vời nhất trong buổi chiều của tôi là đi dạo cạnh con kênh dài của thành phố.\\nNhìn những chiếc thuyền lên xuống rất thư giãn, mặc dù con đường chính bên cạnh khá ồn ào.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Which person walks past a place to buy something to read?\\n2. Who says their route is the fastest way back?\\n3. Which person walks near some water on their journey?\\n4. Who stops to talk to people on their walk?\\n5. Which person thinks their route is very quiet?\\n6. Who listens to something while they are walking?\\n7. Which person enjoys looking at plants and trees?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 B   3 C   4 A   5 B   6 C   7 C\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Buying New Running Shoes\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Ben I run about twenty kilometres a week. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">Because I run so much, I always pick up a fresh pair of trainers in January. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">I like to start the new year with good equipment. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">I go to the sports centre by myself, and I never use my computer to shop for them. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">It is important to talk to the assistant to make sure they fit perfectly on my feet. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s5\\\">I usually choose black or grey ones because they don’t look dirty quickly. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s6\\\">Also, I don’t care about the name on the box. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s7\\\">I try different brands like Puma or Adidas to see which feels best. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Ben Tôi chạy khoảng hai mươi cây số một tuần. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Bởi vì tôi chạy rất nhiều nên tôi luôn mua một đôi giày thể thao mới vào tháng Giêng. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Tôi muốn bắt đầu năm mới với thiết bị tốt. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Tôi đến trung tâm thể thao một mình và không bao giờ sử dụng máy tính để mua sắm. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Điều quan trọng là phải nói chuyện với trợ lý để đảm bảo rằng chúng vừa vặn hoàn hảo với đôi chân của tôi. \\u003c/span>\\u003cspan id=\\\"p0s5\\\" class=\\\"vi-sent\\\">Tôi thường chọn màu đen hoặc xám vì chúng trông không nhanh bẩn. \\u003c/span>\\u003cspan id=\\\"p0s6\\\" class=\\\"vi-sent\\\">Ngoài ra, tôi không quan tâm đến tên trên hộp. \\u003c/span>\\u003cspan id=\\\"p0s7\\\" class=\\\"vi-sent\\\">Tôi thử các nhãn hiệu khác nhau như Puma hay Adidas để xem loại nào mang lại cảm giác tốt nhất. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Anna When my running shoes get too old, I prefer to visit a large sports store near my house. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">My brother usually drives me there and helps me choose. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">I try to find a pair on special offer because I am a student and can’t pay a high price. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">I know some people like simple designs, but I always want trainers that are yellow, orange, or green. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s4\\\">That way, cars can spot me quickly when I go for a run in the evening. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s5\\\">Nike makes some great styles, but I will buy any make if they feel comfortable for a long jog. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Anna Khi đôi giày chạy bộ của tôi quá cũ, tôi thích ghé thăm một cửa hàng thể thao lớn gần nhà hơn. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Anh tôi thường chở tôi đến đó và giúp tôi lựa chọn. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Tôi cố gắng tìm một đôi có ưu đãi đặc biệt vì tôi là sinh viên và không thể trả giá cao. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Tôi biết một số người thích những thiết kế đơn giản, nhưng tôi luôn muốn những đôi giày thể thao có màu vàng, cam hoặc xanh lá cây. \\u003c/span>\\u003cspan id=\\\"p1s4\\\" class=\\\"vi-sent\\\">Bằng cách đó, ô tô có thể nhanh chóng phát hiện ra tôi khi tôi chạy bộ vào buổi tối. \\u003c/span>\\u003cspan id=\\\"p1s5\\\" class=\\\"vi-sent\\\">Nike tạo ra một số kiểu dáng tuyệt vời, nhưng tôi sẽ mua bất kỳ kiểu dáng nào nếu chúng cảm thấy thoải mái khi chạy bộ đường dài. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Chris For my feet, there is only Nike. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">I refuse to put on anything else for my daily runs! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">I know my shoe size perfectly, so I don’t need to visit the mall or ask anyone in a store to tell me what to do. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">Instead, I just use my laptop to get them from a popular sports website, and they arrive at my door two days later. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">They cost a lot, but they are fantastic quality. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">I get new ones about twice a year, maybe in spring and then again in autumn. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s6\\\">I usually go for white ones, even though they get dirty fast. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Chris Đối với đôi chân của tôi, chỉ có Nike. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Tôi từ chối mặc bất cứ thứ gì khác để chạy hàng ngày! \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Tôi biết rõ cỡ giày của mình nên tôi không cần phải đến trung tâm mua sắm hoặc nhờ bất kỳ ai trong cửa hàng chỉ cho tôi phải làm gì. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Thay vào đó, tôi chỉ sử dụng máy tính xách tay của mình để lấy chúng từ một trang web thể thao nổi tiếng và chúng sẽ đến tận cửa nhà tôi hai ngày sau đó. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Chúng có giá rất cao, nhưng chúng có chất lượng tuyệt vời. \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Tôi nhận được những cái mới khoảng hai lần một năm, có thể vào mùa xuân và sau đó một lần nữa vào mùa thu. \\u003c/span>\\u003cspan id=\\\"p2s6\\\" class=\\\"vi-sent\\\">Tôi thường chọn những cái màu trắng, mặc dù chúng rất nhanh bẩn. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Which person buys their running shoes on the internet?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Who gets new trainers in the same month every year?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"Which person wants to spend less money on their shoes?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Who wears sports shoes from just one company?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Which person gets advice from a shop worker?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5},{\"id\":6,\"type\":\"mif\",\"text\":\"Who chooses shoes that are easy to see?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6},{\"id\":7,\"type\":\"mif\",\"text\":\"Which person goes shoe shopping with a relative?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Ben I run about twenty kilometres a week.\",\"Because I run so much, I always pick up a fresh pair of trainers in January.\",\"I like to start the new year with good equipment.\",\"I go to the sports centre by myself, and I never use my computer to shop for them.\",\"It is important to talk to the assistant to make sure they fit perfectly on my feet.\",\"I usually choose black or grey ones because they don’t look dirty quickly.\",\"Also, I don’t care about the name on the box.\",\"I try different brands like Puma or Adidas to see which feels best.\"],\"vi\":[\"Ben Tôi chạy khoảng hai mươi cây số một tuần.\",\"Bởi vì tôi chạy rất nhiều nên tôi luôn mua một đôi giày thể thao mới vào tháng Giêng.\",\"Tôi muốn bắt đầu năm mới với thiết bị tốt.\",\"Tôi đến trung tâm thể thao một mình và không bao giờ sử dụng máy tính để mua sắm.\",\"Điều quan trọng là phải nói chuyện với trợ lý để đảm bảo rằng chúng vừa vặn hoàn hảo với đôi chân của tôi.\",\"Tôi thường chọn màu đen hoặc xám vì chúng trông không nhanh bẩn.\",\"Ngoài ra, tôi không quan tâm đến tên trên hộp.\",\"Tôi thử các nhãn hiệu khác nhau như Puma hay Adidas để xem loại nào mang lại cảm giác tốt nhất.\"]},{\"en\":[\"Anna When my running shoes get too old, I prefer to visit a large sports store near my house.\",\"My brother usually drives me there and helps me choose.\",\"I try to find a pair on special offer because I am a student and can’t pay a high price.\",\"I know some people like simple designs, but I always want trainers that are yellow, orange, or green.\",\"That way, cars can spot me quickly when I go for a run in the evening.\",\"Nike makes some great styles, but I will buy any make if they feel comfortable for a long jog.\"],\"vi\":[\"Anna Khi đôi giày chạy bộ của tôi quá cũ, tôi thích ghé thăm một cửa hàng thể thao lớn gần nhà hơn.\",\"Anh tôi thường chở tôi đến đó và giúp tôi lựa chọn.\",\"Tôi cố gắng tìm một đôi có ưu đãi đặc biệt vì tôi là sinh viên và không thể trả giá cao.\",\"Tôi biết một số người thích những thiết kế đơn giản, nhưng tôi luôn muốn những đôi giày thể thao có màu vàng, cam hoặc xanh lá cây.\",\"Bằng cách đó, ô tô có thể nhanh chóng phát hiện ra tôi khi tôi chạy bộ vào buổi tối.\",\"Nike tạo ra một số kiểu dáng tuyệt vời, nhưng tôi sẽ mua bất kỳ kiểu dáng nào nếu chúng cảm thấy thoải mái khi chạy bộ đường dài.\"]},{\"en\":[\"Chris For my feet, there is only Nike.\",\"I refuse to put on anything else for my daily runs!\",\"I know my shoe size perfectly, so I don’t need to visit the mall or ask anyone in a store to tell me what to do.\",\"Instead, I just use my laptop to get them from a popular sports website, and they arrive at my door two days later.\",\"They cost a lot, but they are fantastic quality.\",\"I get new ones about twice a year, maybe in spring and then again in autumn.\",\"I usually go for white ones, even though they get dirty fast.\"],\"vi\":[\"Chris Đối với đôi chân của tôi, chỉ có Nike.\",\"Tôi từ chối mặc bất cứ thứ gì khác để chạy hàng ngày!\",\"Tôi biết rõ cỡ giày của mình nên tôi không cần phải đến trung tâm mua sắm hoặc nhờ bất kỳ ai trong cửa hàng chỉ cho tôi phải làm gì.\",\"Thay vào đó, tôi chỉ sử dụng máy tính xách tay của mình để lấy chúng từ một trang web thể thao nổi tiếng và chúng sẽ đến tận cửa nhà tôi hai ngày sau đó.\",\"Chúng có giá rất cao, nhưng chúng có chất lượng tuyệt vời.\",\"Tôi nhận được những cái mới khoảng hai lần một năm, có thể vào mùa xuân và sau đó một lần nữa vào mùa thu.\",\"Tôi thường chọn những cái màu trắng, mặc dù chúng rất nhanh bẩn.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"Ben\\nI run about twenty kilometres a week. Because I run so much, I always pick up a fresh pair of trainers in January. I like to start the new year with good equipment. I go to the sports centre by myself, and I never use my computer to shop for them. It is important to talk to the assistant to make sure they fit perfectly on my feet. I usually choose black or grey ones because they don’t look dirty quickly. Also, I don’t care about the name on the box. I try different brands like Puma or Adidas to see which feels best.\\n\\nAnna\\nWhen my running shoes get too old, I prefer to visit a large sports store near my house. My brother usually drives me there and helps me choose. I try to find a pair on special offer because I am a student and can’t pay a high price. I know some people like simple designs, but I always want trainers that are yellow, orange, or green. That way, cars can spot me quickly when I go for a run in the evening. Nike makes some great styles, but I will buy any make if they feel comfortable for a long jog.\\n\\nChris\\nFor my feet, there is only Nike. I refuse to put on anything else for my daily runs! I know my shoe size perfectly, so I don’t need to visit the mall or ask anyone in a store to tell me what to do. Instead, I just use my laptop to get them from a popular sports website, and they arrive at my door two days later. They cost a lot, but they are fantastic quality. I get new ones about twice a year, maybe in spring and then again in autumn. I usually go for white ones, even though they get dirty fast.\",\"transText\":\"Ben Tôi chạy khoảng hai mươi cây số một tuần.\\nBởi vì tôi chạy rất nhiều nên tôi luôn mua một đôi giày thể thao mới vào tháng Giêng.\\nTôi muốn bắt đầu năm mới với thiết bị tốt.\\nTôi đến trung tâm thể thao một mình và không bao giờ sử dụng máy tính để mua sắm.\\nĐiều quan trọng là phải nói chuyện với trợ lý để đảm bảo rằng chúng vừa vặn hoàn hảo với đôi chân của tôi.\\nTôi thường chọn màu đen hoặc xám vì chúng trông không nhanh bẩn.\\nNgoài ra, tôi không quan tâm đến tên trên hộp.\\nTôi thử các nhãn hiệu khác nhau như Puma hay Adidas để xem loại nào mang lại cảm giác tốt nhất.\\n\\nAnna Khi đôi giày chạy bộ của tôi quá cũ, tôi thích ghé thăm một cửa hàng thể thao lớn gần nhà hơn.\\nAnh tôi thường chở tôi đến đó và giúp tôi lựa chọn.\\nTôi cố gắng tìm một đôi có ưu đãi đặc biệt vì tôi là sinh viên và không thể trả giá cao.\\nTôi biết một số người thích những thiết kế đơn giản, nhưng tôi luôn muốn những đôi giày thể thao có màu vàng, cam hoặc xanh lá cây.\\nBằng cách đó, ô tô có thể nhanh chóng phát hiện ra tôi khi tôi chạy bộ vào buổi tối.\\nNike tạo ra một số kiểu dáng tuyệt vời, nhưng tôi sẽ mua bất kỳ kiểu dáng nào nếu chúng cảm thấy thoải mái khi chạy bộ đường dài.\\n\\nChris Đối với đôi chân của tôi, chỉ có Nike.\\nTôi từ chối mặc bất cứ thứ gì khác để chạy hàng ngày!\\nTôi biết rõ cỡ giày của mình nên tôi không cần phải đến trung tâm mua sắm hoặc nhờ bất kỳ ai trong cửa hàng chỉ cho tôi phải làm gì.\\nThay vào đó, tôi chỉ sử dụng máy tính xách tay của mình để lấy chúng từ một trang web thể thao nổi tiếng và chúng sẽ đến tận cửa nhà tôi hai ngày sau đó.\\nChúng có giá rất cao, nhưng chúng có chất lượng tuyệt vời.\\nTôi nhận được những cái mới khoảng hai lần một năm, có thể vào mùa xuân và sau đó một lần nữa vào mùa thu.\\nTôi thường chọn những cái màu trắng, mặc dù chúng rất nhanh bẩn.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Which person buys their running shoes on the internet?\\n2. Who gets new trainers in the same month every year?\\n3. Which person wants to spend less money on their shoes?\\n4. Who wears sports shoes from just one company?\\n5. Which person gets advice from a shop worker?\\n6. Who chooses shoes that are easy to see?\\n7. Which person goes shoe shopping with a relative?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 C   2 A   3 B   4 C   5 A   6 B   7 B\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Free Time Between Afternoon Classes\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Emma Between my afternoon lessons, I have about thirty minutes of free time. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">My friends often go out to the park, but I never want to get up from my chair. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">I like staying exactly where I am inside the classroom. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">It is the perfect time to complete the maths or history activities our teachers just gave us. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">By doing this, I don’t have to work in the evenings at home. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s5\\\">I sometimes have an apple, but I just eat it while I write. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Emma Giữa giờ học buổi chiều, tôi có khoảng ba mươi phút rảnh rỗi. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Bạn bè của tôi thường đi chơi công viên, nhưng tôi không bao giờ muốn đứng dậy khỏi ghế. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Tôi thích ở đúng vị trí của mình trong lớp học. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Đây là thời điểm hoàn hảo để hoàn thành các hoạt động toán hoặc lịch sử mà giáo viên vừa giao cho chúng ta. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Bằng cách này, tôi không phải làm việc vào buổi tối ở nhà. \\u003c/span>\\u003cspan id=\\\"p0s5\\\" class=\\\"vi-sent\\\">Đôi khi tôi ăn một quả táo, nhưng tôi chỉ ăn nó trong khi viết. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Lucas Sitting for a long time makes me feel tired, so I need to go for a quick walk to wake up. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">I don’t usually invite my classmates to come with me because I really enjoy being by myself for half an hour. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">I always leave the school grounds and walk to a small bakery down the street to get some warm bread. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">Some students try to read their textbooks during the break, but my brain needs a break from studying! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Lucas Ngồi lâu khiến tôi cảm thấy mệt mỏi nên tôi cần đi dạo nhanh để tỉnh táo. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Tôi thường không mời các bạn cùng lớp đi cùng vì tôi thực sự thích ở một mình trong nửa giờ. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Tôi luôn rời khỏi sân trường và đi bộ đến một tiệm bánh nhỏ dưới phố để mua một ít bánh mì ấm. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Một số học sinh cố gắng đọc sách giáo khoa trong giờ giải lao, nhưng đầu óc tôi cần được nghỉ ngơi để học tập! \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Sofia I love the break between our two afternoon classes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">I usually meet my best friends in the school hall. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">We never discuss our lessons or tests because we want to forget about studying for a while! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">Instead, we talk about our favourite bands or new clothes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">After chatting, I usually take out my smartphone. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">I really enjoy trying to get a high score on my favourite racing app before the bell rings. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s6\\\">It makes me feel much more relaxed before the next lesson begins. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Sofia Tôi thích giờ giải lao giữa hai lớp học buổi chiều của chúng tôi. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Tôi thường gặp những người bạn thân nhất của mình ở hội trường trường. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Chúng tôi không bao giờ thảo luận về bài học hoặc bài kiểm tra của mình vì chúng tôi muốn quên đi việc học trong một thời gian! \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Thay vào đó, chúng tôi nói về ban nhạc yêu thích hoặc quần áo mới. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Sau khi trò chuyện, tôi thường lấy điện thoại thông minh ra. \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Tôi thực sự thích cố gắng đạt điểm cao trên ứng dụng đua xe yêu thích của mình trước khi chuông reo. \\u003c/span>\\u003cspan id=\\\"p2s6\\\" class=\\\"vi-sent\\\">Nó làm cho tôi cảm thấy thoải mái hơn nhiều trước khi bài học tiếp theo bắt đầu. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Who likes to play games on a screen to rest?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Which person finishes their school tasks during the break?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"Who buys a snack away from the campus?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Which person rarely spends this time with other people?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Who prefers not to leave their desk?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5},{\"id\":6,\"type\":\"mif\",\"text\":\"Which person chats about things that are not related to studies?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6},{\"id\":7,\"type\":\"mif\",\"text\":\"Who wants to do some exercise before the next lesson starts?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Emma Between my afternoon lessons, I have about thirty minutes of free time.\",\"My friends often go out to the park, but I never want to get up from my chair.\",\"I like staying exactly where I am inside the classroom.\",\"It is the perfect time to complete the maths or history activities our teachers just gave us.\",\"By doing this, I don’t have to work in the evenings at home.\",\"I sometimes have an apple, but I just eat it while I write.\"],\"vi\":[\"Emma Giữa giờ học buổi chiều, tôi có khoảng ba mươi phút rảnh rỗi.\",\"Bạn bè của tôi thường đi chơi công viên, nhưng tôi không bao giờ muốn đứng dậy khỏi ghế.\",\"Tôi thích ở đúng vị trí của mình trong lớp học.\",\"Đây là thời điểm hoàn hảo để hoàn thành các hoạt động toán hoặc lịch sử mà giáo viên vừa giao cho chúng ta.\",\"Bằng cách này, tôi không phải làm việc vào buổi tối ở nhà.\",\"Đôi khi tôi ăn một quả táo, nhưng tôi chỉ ăn nó trong khi viết.\"]},{\"en\":[\"Lucas Sitting for a long time makes me feel tired, so I need to go for a quick walk to wake up.\",\"I don’t usually invite my classmates to come with me because I really enjoy being by myself for half an hour.\",\"I always leave the school grounds and walk to a small bakery down the street to get some warm bread.\",\"Some students try to read their textbooks during the break, but my brain needs a break from studying!\"],\"vi\":[\"Lucas Ngồi lâu khiến tôi cảm thấy mệt mỏi nên tôi cần đi dạo nhanh để tỉnh táo.\",\"Tôi thường không mời các bạn cùng lớp đi cùng vì tôi thực sự thích ở một mình trong nửa giờ.\",\"Tôi luôn rời khỏi sân trường và đi bộ đến một tiệm bánh nhỏ dưới phố để mua một ít bánh mì ấm.\",\"Một số học sinh cố gắng đọc sách giáo khoa trong giờ giải lao, nhưng đầu óc tôi cần được nghỉ ngơi để học tập!\"]},{\"en\":[\"Sofia I love the break between our two afternoon classes.\",\"I usually meet my best friends in the school hall.\",\"We never discuss our lessons or tests because we want to forget about studying for a while!\",\"Instead, we talk about our favourite bands or new clothes.\",\"After chatting, I usually take out my smartphone.\",\"I really enjoy trying to get a high score on my favourite racing app before the bell rings.\",\"It makes me feel much more relaxed before the next lesson begins.\"],\"vi\":[\"Sofia Tôi thích giờ giải lao giữa hai lớp học buổi chiều của chúng tôi.\",\"Tôi thường gặp những người bạn thân nhất của mình ở hội trường trường.\",\"Chúng tôi không bao giờ thảo luận về bài học hoặc bài kiểm tra của mình vì chúng tôi muốn quên đi việc học trong một thời gian!\",\"Thay vào đó, chúng tôi nói về ban nhạc yêu thích hoặc quần áo mới.\",\"Sau khi trò chuyện, tôi thường lấy điện thoại thông minh ra.\",\"Tôi thực sự thích cố gắng đạt điểm cao trên ứng dụng đua xe yêu thích của mình trước khi chuông reo.\",\"Nó làm cho tôi cảm thấy thoải mái hơn nhiều trước khi bài học tiếp theo bắt đầu.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"Emma\\nBetween my afternoon lessons, I have about thirty minutes of free time. My friends often go out to the park, but I never want to get up from my chair. I like staying exactly where I am inside the classroom. It is the perfect time to complete the maths or history activities our teachers just gave us. By doing this, I don’t have to work in the evenings at home. I sometimes have an apple, but I just eat it while I write.\\n\\nLucas\\nSitting for a long time makes me feel tired, so I need to go for a quick walk to wake up. I don’t usually invite my classmates to come with me because I really enjoy being by myself for half an hour. I always leave the school grounds and walk to a small bakery down the street to get some warm bread. Some students try to read their textbooks during the break, but my brain needs a break from studying!\\n\\nSofia\\nI love the break between our two afternoon classes. I usually meet my best friends in the school hall. We never discuss our lessons or tests because we want to forget about studying for a while! Instead, we talk about our favourite bands or new clothes. After chatting, I usually take out my smartphone. I really enjoy trying to get a high score on my favourite racing app before the bell rings. It makes me feel much more relaxed before the next lesson begins.\",\"transText\":\"Emma Giữa giờ học buổi chiều, tôi có khoảng ba mươi phút rảnh rỗi.\\nBạn bè của tôi thường đi chơi công viên, nhưng tôi không bao giờ muốn đứng dậy khỏi ghế.\\nTôi thích ở đúng vị trí của mình trong lớp học.\\nĐây là thời điểm hoàn hảo để hoàn thành các hoạt động toán hoặc lịch sử mà giáo viên vừa giao cho chúng ta.\\nBằng cách này, tôi không phải làm việc vào buổi tối ở nhà.\\nĐôi khi tôi ăn một quả táo, nhưng tôi chỉ ăn nó trong khi viết.\\n\\nLucas Ngồi lâu khiến tôi cảm thấy mệt mỏi nên tôi cần đi dạo nhanh để tỉnh táo.\\nTôi thường không mời các bạn cùng lớp đi cùng vì tôi thực sự thích ở một mình trong nửa giờ.\\nTôi luôn rời khỏi sân trường và đi bộ đến một tiệm bánh nhỏ dưới phố để mua một ít bánh mì ấm.\\nMột số học sinh cố gắng đọc sách giáo khoa trong giờ giải lao, nhưng đầu óc tôi cần được nghỉ ngơi để học tập!\\n\\nSofia Tôi thích giờ giải lao giữa hai lớp học buổi chiều của chúng tôi.\\nTôi thường gặp những người bạn thân nhất của mình ở hội trường trường.\\nChúng tôi không bao giờ thảo luận về bài học hoặc bài kiểm tra của mình vì chúng tôi muốn quên đi việc học trong một thời gian!\\nThay vào đó, chúng tôi nói về ban nhạc yêu thích hoặc quần áo mới.\\nSau khi trò chuyện, tôi thường lấy điện thoại thông minh ra.\\nTôi thực sự thích cố gắng đạt điểm cao trên ứng dụng đua xe yêu thích của mình trước khi chuông reo.\\nNó làm cho tôi cảm thấy thoải mái hơn nhiều trước khi bài học tiếp theo bắt đầu.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Who likes to play games on a screen to rest?\\n2. Which person finishes their school tasks during the break?\\n3. Who buys a snack away from the campus?\\n4. Which person rarely spends this time with other people?\\n5. Who prefers not to leave their desk?\\n6. Which person chats about things that are not related to studies?\\n7. Who wants to do some exercise before the next lesson starts?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 C   2 A   3 B   4 B   5 A   6 C   7 B\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Weekend Shopping Trips\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Jamie I love going to the huge department store near my house on Saturday mornings. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">My aunt always drives me there in her car, which is great because I hate taking the bus. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">We spend hours trying on different clothes together. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">I usually leave with three or four shopping bags! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">Walking around makes me really hungry, so before we go home, we always sit down in the restaurant on the top floor and enjoy a hot pizza. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s5\\\">The store is usually quite peaceful early in the day, so we don’t get a headache from too much sound. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Jamie Tôi thích đến cửa hàng bách hóa lớn gần nhà vào sáng thứ Bảy. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Dì tôi luôn chở tôi đến đó bằng ô tô của bà, điều này thật tuyệt vì tôi ghét đi xe buýt. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Chúng tôi cùng nhau dành hàng giờ để thử những bộ quần áo khác nhau. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Tôi thường rời đi với ba hoặc bốn túi mua sắm! \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Dạo quanh thấy đói quá nên trước khi về nhà, chúng tôi luôn ngồi xuống nhà hàng trên tầng cao nhất và thưởng thức một chiếc pizza nóng hổi. \\u003c/span>\\u003cspan id=\\\"p0s5\\\" class=\\\"vi-sent\\\">Cửa hàng thường khá yên tĩnh vào sáng sớm nên chúng tôi không bị đau đầu vì quá nhiều âm thanh. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Sarah Every Sunday, I catch the number 10 bus to the big shopping centre in the middle of the city. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">I prefer going alone because I can take my time. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">Last weekend, I had to find a nice gift for my sister’s birthday. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">I bought her a beautiful silver necklace. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s4\\\">I didn’t ask my parents to pay for it. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s5\\\">I used the cash I received from washing my neighbors’ cars! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s6\\\">I never visit the food area in the store because I always have a large plate of eggs and toast before I leave my house. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Sarah Chủ nhật hàng tuần, tôi bắt xe buýt số 10 đến trung tâm mua sắm lớn ở giữa thành phố. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Tôi thích đi một mình hơn vì tôi có thể dành thời gian. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Cuối tuần trước, tôi phải tìm một món quà thật đẹp để tặng sinh nhật cho em gái mình. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Tôi mua cho cô ấy một chiếc vòng cổ bạc rất đẹp. \\u003c/span>\\u003cspan id=\\\"p1s4\\\" class=\\\"vi-sent\\\">Tôi không yêu cầu bố mẹ tôi trả tiền cho việc đó. \\u003c/span>\\u003cspan id=\\\"p1s5\\\" class=\\\"vi-sent\\\">Tôi đã sử dụng số tiền nhận được từ việc rửa xe cho hàng xóm! \\u003c/span>\\u003cspan id=\\\"p1s6\\\" class=\\\"vi-sent\\\">Tôi không bao giờ ghé thăm khu vực bán đồ ăn trong cửa hàng vì tôi luôn có một đĩa lớn trứng và bánh mì nướng trước khi rời khỏi nhà. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Finn My classmates and I visit the massive department store in town almost every weekend. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">I just ride my bicycle there. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">We don’t bring our wallets because we don’t want to get any clothes or electronics. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">We just enjoy walking through the sports area to see the new trainers and chatting with each other. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">It is a fun way to spend the afternoon! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">However, by four o’clock, there are hundreds of people inside, and they play pop songs on large speakers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s6\\\">It is so loud that we can’t even hear each other speak! \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Finn Các bạn cùng lớp của tôi và tôi ghé thăm cửa hàng bách hóa lớn trong thị trấn hầu như vào mỗi cuối tuần. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Tôi chỉ đi xe đạp ở đó. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Chúng tôi không mang theo ví vì chúng tôi không muốn mang theo quần áo hay đồ điện tử. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Chúng tôi chỉ thích đi bộ qua khu thể thao để xem các huấn luyện viên mới và trò chuyện với nhau. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Đó là một cách thú vị để dành buổi chiều! \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Tuy nhiên, đến 4 giờ, bên trong đã có hàng trăm người và họ chơi những bản nhạc pop trên loa lớn. \\u003c/span>\\u003cspan id=\\\"p2s6\\\" class=\\\"vi-sent\\\">Nó ồn ào đến mức chúng tôi thậm chí không thể nghe thấy nhau nói chuyện! \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Which person buys something to give to someone else?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Which person says the store they visit is very noisy?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"Which person eats a meal while they are shopping?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Which person spends money they earned from a job?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Which person goes shopping with a family member?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5},{\"id\":6,\"type\":\"mif\",\"text\":\"Which person visits the store to look at things without buying?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6},{\"id\":7,\"type\":\"mif\",\"text\":\"Which person uses public transport to get to the store?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Jamie I love going to the huge department store near my house on Saturday mornings.\",\"My aunt always drives me there in her car, which is great because I hate taking the bus.\",\"We spend hours trying on different clothes together.\",\"I usually leave with three or four shopping bags!\",\"Walking around makes me really hungry, so before we go home, we always sit down in the restaurant on the top floor and enjoy a hot pizza.\",\"The store is usually quite peaceful early in the day, so we don’t get a headache from too much sound.\"],\"vi\":[\"Jamie Tôi thích đến cửa hàng bách hóa lớn gần nhà vào sáng thứ Bảy.\",\"Dì tôi luôn chở tôi đến đó bằng ô tô của bà, điều này thật tuyệt vì tôi ghét đi xe buýt.\",\"Chúng tôi cùng nhau dành hàng giờ để thử những bộ quần áo khác nhau.\",\"Tôi thường rời đi với ba hoặc bốn túi mua sắm!\",\"Dạo quanh thấy đói quá nên trước khi về nhà, chúng tôi luôn ngồi xuống nhà hàng trên tầng cao nhất và thưởng thức một chiếc pizza nóng hổi.\",\"Cửa hàng thường khá yên tĩnh vào sáng sớm nên chúng tôi không bị đau đầu vì quá nhiều âm thanh.\"]},{\"en\":[\"Sarah Every Sunday, I catch the number 10 bus to the big shopping centre in the middle of the city.\",\"I prefer going alone because I can take my time.\",\"Last weekend, I had to find a nice gift for my sister’s birthday.\",\"I bought her a beautiful silver necklace.\",\"I didn’t ask my parents to pay for it.\",\"I used the cash I received from washing my neighbors’ cars!\",\"I never visit the food area in the store because I always have a large plate of eggs and toast before I leave my house.\"],\"vi\":[\"Sarah Chủ nhật hàng tuần, tôi bắt xe buýt số 10 đến trung tâm mua sắm lớn ở giữa thành phố.\",\"Tôi thích đi một mình hơn vì tôi có thể dành thời gian.\",\"Cuối tuần trước, tôi phải tìm một món quà thật đẹp để tặng sinh nhật cho em gái mình.\",\"Tôi mua cho cô ấy một chiếc vòng cổ bạc rất đẹp.\",\"Tôi không yêu cầu bố mẹ tôi trả tiền cho việc đó.\",\"Tôi đã sử dụng số tiền nhận được từ việc rửa xe cho hàng xóm!\",\"Tôi không bao giờ ghé thăm khu vực bán đồ ăn trong cửa hàng vì tôi luôn có một đĩa lớn trứng và bánh mì nướng trước khi rời khỏi nhà.\"]},{\"en\":[\"Finn My classmates and I visit the massive department store in town almost every weekend.\",\"I just ride my bicycle there.\",\"We don’t bring our wallets because we don’t want to get any clothes or electronics.\",\"We just enjoy walking through the sports area to see the new trainers and chatting with each other.\",\"It is a fun way to spend the afternoon!\",\"However, by four o’clock, there are hundreds of people inside, and they play pop songs on large speakers.\",\"It is so loud that we can’t even hear each other speak!\"],\"vi\":[\"Finn Các bạn cùng lớp của tôi và tôi ghé thăm cửa hàng bách hóa lớn trong thị trấn hầu như vào mỗi cuối tuần.\",\"Tôi chỉ đi xe đạp ở đó.\",\"Chúng tôi không mang theo ví vì chúng tôi không muốn mang theo quần áo hay đồ điện tử.\",\"Chúng tôi chỉ thích đi bộ qua khu thể thao để xem các huấn luyện viên mới và trò chuyện với nhau.\",\"Đó là một cách thú vị để dành buổi chiều!\",\"Tuy nhiên, đến 4 giờ, bên trong đã có hàng trăm người và họ chơi những bản nhạc pop trên loa lớn.\",\"Nó ồn ào đến mức chúng tôi thậm chí không thể nghe thấy nhau nói chuyện!\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"Jamie\\nI love going to the huge department store near my house on Saturday mornings. My aunt always drives me there in her car, which is great because I hate taking the bus. We spend hours trying on different clothes together. I usually leave with three or four shopping bags! Walking around makes me really hungry, so before we go home, we always sit down in the restaurant on the top floor and enjoy a hot pizza. The store is usually quite peaceful early in the day, so we don’t get a headache from too much sound.\\n\\nSarah\\nEvery Sunday, I catch the number 10 bus to the big shopping centre in the middle of the city. I prefer going alone because I can take my time. Last weekend, I had to find a nice gift for my sister’s birthday. I bought her a beautiful silver necklace. I didn’t ask my parents to pay for it. I used the cash I received from washing my neighbors’ cars! I never visit the food area in the store because I always have a large plate of eggs and toast before I leave my house.\\n\\nFinn\\nMy classmates and I visit the massive department store in town almost every weekend. I just ride my bicycle there. We don’t bring our wallets because we don’t want to get any clothes or electronics. We just enjoy walking through the sports area to see the new trainers and chatting with each other. It is a fun way to spend the afternoon! However, by four o’clock, there are hundreds of people inside, and they play pop songs on large speakers. It is so loud that we can’t even hear each other speak!\",\"transText\":\"Jamie Tôi thích đến cửa hàng bách hóa lớn gần nhà vào sáng thứ Bảy.\\nDì tôi luôn chở tôi đến đó bằng ô tô của bà, điều này thật tuyệt vì tôi ghét đi xe buýt.\\nChúng tôi cùng nhau dành hàng giờ để thử những bộ quần áo khác nhau.\\nTôi thường rời đi với ba hoặc bốn túi mua sắm!\\nDạo quanh thấy đói quá nên trước khi về nhà, chúng tôi luôn ngồi xuống nhà hàng trên tầng cao nhất và thưởng thức một chiếc pizza nóng hổi.\\nCửa hàng thường khá yên tĩnh vào sáng sớm nên chúng tôi không bị đau đầu vì quá nhiều âm thanh.\\n\\nSarah Chủ nhật hàng tuần, tôi bắt xe buýt số 10 đến trung tâm mua sắm lớn ở giữa thành phố.\\nTôi thích đi một mình hơn vì tôi có thể dành thời gian.\\nCuối tuần trước, tôi phải tìm một món quà thật đẹp để tặng sinh nhật cho em gái mình.\\nTôi mua cho cô ấy một chiếc vòng cổ bạc rất đẹp.\\nTôi không yêu cầu bố mẹ tôi trả tiền cho việc đó.\\nTôi đã sử dụng số tiền nhận được từ việc rửa xe cho hàng xóm!\\nTôi không bao giờ ghé thăm khu vực bán đồ ăn trong cửa hàng vì tôi luôn có một đĩa lớn trứng và bánh mì nướng trước khi rời khỏi nhà.\\n\\nFinn Các bạn cùng lớp của tôi và tôi ghé thăm cửa hàng bách hóa lớn trong thị trấn hầu như vào mỗi cuối tuần.\\nTôi chỉ đi xe đạp ở đó.\\nChúng tôi không mang theo ví vì chúng tôi không muốn mang theo quần áo hay đồ điện tử.\\nChúng tôi chỉ thích đi bộ qua khu thể thao để xem các huấn luyện viên mới và trò chuyện với nhau.\\nĐó là một cách thú vị để dành buổi chiều!\\nTuy nhiên, đến 4 giờ, bên trong đã có hàng trăm người và họ chơi những bản nhạc pop trên loa lớn.\\nNó ồn ào đến mức chúng tôi thậm chí không thể nghe thấy nhau nói chuyện!\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Which person buys something to give to someone else?\\n2. Which person says the store they visit is very noisy?\\n3. Which person eats a meal while they are shopping?\\n4. Which person spends money they earned from a job?\\n5. Which person goes shopping with a family member?\\n6. Which person visits the store to look at things without buying?\\n7. Which person uses public transport to get to the store?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 B   2 C   3 A   4 B   5 A   6 C   7 B\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Choosing Comfortable Clothes for School\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Leo I prefer to feel completely relaxed during lessons, so I never buy sweaters or trousers in my actual size. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">Having a bit of extra space makes it much easier to sit at a school desk all day! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">I also play football on the grass during my lunch breaks, so I often get mud on myself. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">To hide this, I only choose black or dark blue items so no one notices. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">My mum always tells me it is cold outside, but I never check the temperature before I leave the house. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Leo Tôi thích cảm thấy hoàn toàn thư giãn trong giờ học nên tôi không bao giờ mua áo len hoặc quần dài theo kích cỡ thật của mình. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Có thêm một chút không gian sẽ giúp bạn dễ dàng ngồi vào bàn học cả ngày hơn! \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Tôi cũng chơi bóng đá trên sân cỏ trong giờ nghỉ trưa nên thường xuyên bị dính bùn vào người. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Để che giấu điều này, tôi chỉ chọn những món đồ màu đen hoặc xanh đậm để không ai để ý. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Mẹ tôi luôn nói với tôi rằng ngoài trời rất lạnh nhưng tôi chưa bao giờ kiểm tra nhiệt độ trước khi ra khỏi nhà. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Maya Every morning, the first thing I do is look at my phone app to see if it will be sunny or raining. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">This helps me decide if I need a heavy jacket or a light t-shirt. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">I hate wearing things that are too large because they look untidy, so everything fits me perfectly. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">We stand up a lot in my science classes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s4\\\">My toes used to ache, so now I put sports socks with soft bottoms inside my boots. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s5\\\">It really helps! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s6\\\">I always select my outfit in the morning. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Maya Mỗi buổi sáng, việc đầu tiên tôi làm là nhìn vào ứng dụng điện thoại xem trời sẽ nắng hay mưa. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Điều này giúp tôi quyết định xem mình cần một chiếc áo khoác nặng hay một chiếc áo phông nhẹ. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Tôi ghét mặc những thứ quá rộng vì chúng trông luộm thuộm nên mọi thứ đều vừa vặn với tôi. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Chúng tôi đứng lên rất nhiều trong các lớp học khoa học của tôi. \\u003c/span>\\u003cspan id=\\\"p1s4\\\" class=\\\"vi-sent\\\">Các ngón chân của tôi đã từng bị đau nên bây giờ tôi nhét tất thể thao có đế mềm vào trong ủng. \\u003c/span>\\u003cspan id=\\\"p1s5\\\" class=\\\"vi-sent\\\">Nó thực sự có ích! \\u003c/span>\\u003cspan id=\\\"p1s6\\\" class=\\\"vi-sent\\\">Tôi luôn chọn trang phục vào buổi sáng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Sam I hate rushing when I wake up. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">To save time, I always leave my uniform on a chair next to my bed in the evening. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">My house is quite far from the college, and the journey takes me about forty-five minutes on foot. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">So, my clothes must be easy to move in! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">My grey school trousers look very smart, but they are not nice to relax in. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">The minute I step inside my house after classes, I take them off and put my favorite soft shorts on. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Sam Tôi ghét việc vội vã khi thức dậy. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Để tiết kiệm thời gian, tôi luôn để đồng phục trên ghế cạnh giường vào buổi tối. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Nhà tôi khá xa trường đại học và tôi phải đi bộ khoảng 45 phút để đến trường. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Vì vậy, quần áo của tôi phải dễ dàng di chuyển! \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Chiếc quần đi học màu xám của tôi trông rất sang trọng nhưng lại không thoải mái khi mặc vào. \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Ngay khi bước vào nhà sau giờ học, tôi cởi chúng ra và mặc chiếc quần short mềm mại yêu thích của mình vào. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Who wears clothes that are bigger than they need to be?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Who checks the weather before putting their clothes on?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"Who chooses their clothes before they go to sleep?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Who wears dark clothes so they don’t look dirty?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Who wears special things on their feet to stay comfortable?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5},{\"id\":6,\"type\":\"mif\",\"text\":\"Who has to walk a long way to get to their school?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6},{\"id\":7,\"type\":\"mif\",\"text\":\"Who changes into different clothes as soon as they arrive home?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Leo I prefer to feel completely relaxed during lessons, so I never buy sweaters or trousers in my actual size.\",\"Having a bit of extra space makes it much easier to sit at a school desk all day!\",\"I also play football on the grass during my lunch breaks, so I often get mud on myself.\",\"To hide this, I only choose black or dark blue items so no one notices.\",\"My mum always tells me it is cold outside, but I never check the temperature before I leave the house.\"],\"vi\":[\"Leo Tôi thích cảm thấy hoàn toàn thư giãn trong giờ học nên tôi không bao giờ mua áo len hoặc quần dài theo kích cỡ thật của mình.\",\"Có thêm một chút không gian sẽ giúp bạn dễ dàng ngồi vào bàn học cả ngày hơn!\",\"Tôi cũng chơi bóng đá trên sân cỏ trong giờ nghỉ trưa nên thường xuyên bị dính bùn vào người.\",\"Để che giấu điều này, tôi chỉ chọn những món đồ màu đen hoặc xanh đậm để không ai để ý.\",\"Mẹ tôi luôn nói với tôi rằng ngoài trời rất lạnh nhưng tôi chưa bao giờ kiểm tra nhiệt độ trước khi ra khỏi nhà.\"]},{\"en\":[\"Maya Every morning, the first thing I do is look at my phone app to see if it will be sunny or raining.\",\"This helps me decide if I need a heavy jacket or a light t-shirt.\",\"I hate wearing things that are too large because they look untidy, so everything fits me perfectly.\",\"We stand up a lot in my science classes.\",\"My toes used to ache, so now I put sports socks with soft bottoms inside my boots.\",\"It really helps!\",\"I always select my outfit in the morning.\"],\"vi\":[\"Maya Mỗi buổi sáng, việc đầu tiên tôi làm là nhìn vào ứng dụng điện thoại xem trời sẽ nắng hay mưa.\",\"Điều này giúp tôi quyết định xem mình cần một chiếc áo khoác nặng hay một chiếc áo phông nhẹ.\",\"Tôi ghét mặc những thứ quá rộng vì chúng trông luộm thuộm nên mọi thứ đều vừa vặn với tôi.\",\"Chúng tôi đứng lên rất nhiều trong các lớp học khoa học của tôi.\",\"Các ngón chân của tôi đã từng bị đau nên bây giờ tôi nhét tất thể thao có đế mềm vào trong ủng.\",\"Nó thực sự có ích!\",\"Tôi luôn chọn trang phục vào buổi sáng.\"]},{\"en\":[\"Sam I hate rushing when I wake up.\",\"To save time, I always leave my uniform on a chair next to my bed in the evening.\",\"My house is quite far from the college, and the journey takes me about forty-five minutes on foot.\",\"So, my clothes must be easy to move in!\",\"My grey school trousers look very smart, but they are not nice to relax in.\",\"The minute I step inside my house after classes, I take them off and put my favorite soft shorts on.\"],\"vi\":[\"Sam Tôi ghét việc vội vã khi thức dậy.\",\"Để tiết kiệm thời gian, tôi luôn để đồng phục trên ghế cạnh giường vào buổi tối.\",\"Nhà tôi khá xa trường đại học và tôi phải đi bộ khoảng 45 phút để đến trường.\",\"Vì vậy, quần áo của tôi phải dễ dàng di chuyển!\",\"Chiếc quần đi học màu xám của tôi trông rất sang trọng nhưng lại không thoải mái khi mặc vào.\",\"Ngay khi bước vào nhà sau giờ học, tôi cởi chúng ra và mặc chiếc quần short mềm mại yêu thích của mình vào.\"]}],\"timeLimit\":20,\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"qTypes\":\"Matching Information: 7\",\"qCount\":7,\"lockOnTimeout\":false,\"rawInputs\":{\"rawText\":\"Leo\\nI prefer to feel completely relaxed during lessons, so I never buy sweaters or trousers in my actual size. Having a bit of extra space makes it much easier to sit at a school desk all day! I also play football on the grass during my lunch breaks, so I often get mud on myself. To hide this, I only choose black or dark blue items so no one notices. My mum always tells me it is cold outside, but I never check the temperature before I leave the house.\\n\\nMaya\\nEvery morning, the first thing I do is look at my phone app to see if it will be sunny or raining. This helps me decide if I need a heavy jacket or a light t-shirt. I hate wearing things that are too large because they look untidy, so everything fits me perfectly. We stand up a lot in my science classes. My toes used to ache, so now I put sports socks with soft bottoms inside my boots. It really helps! I always select my outfit in the morning.\\n\\nSam\\nI hate rushing when I wake up. To save time, I always leave my uniform on a chair next to my bed in the evening. My house is quite far from the college, and the journey takes me about forty-five minutes on foot. So, my clothes must be easy to move in! My grey school trousers look very smart, but they are not nice to relax in. The minute I step inside my house after classes, I take them off and put my favorite soft shorts on.\",\"transText\":\"Leo Tôi thích cảm thấy hoàn toàn thư giãn trong giờ học nên tôi không bao giờ mua áo len hoặc quần dài theo kích cỡ thật của mình.\\nCó thêm một chút không gian sẽ giúp bạn dễ dàng ngồi vào bàn học cả ngày hơn!\\nTôi cũng chơi bóng đá trên sân cỏ trong giờ nghỉ trưa nên thường xuyên bị dính bùn vào người.\\nĐể che giấu điều này, tôi chỉ chọn những món đồ màu đen hoặc xanh đậm để không ai để ý.\\nMẹ tôi luôn nói với tôi rằng ngoài trời rất lạnh nhưng tôi chưa bao giờ kiểm tra nhiệt độ trước khi ra khỏi nhà.\\n\\nMaya Mỗi buổi sáng, việc đầu tiên tôi làm là nhìn vào ứng dụng điện thoại xem trời sẽ nắng hay mưa.\\nĐiều này giúp tôi quyết định xem mình cần một chiếc áo khoác nặng hay một chiếc áo phông nhẹ.\\nTôi ghét mặc những thứ quá rộng vì chúng trông luộm thuộm nên mọi thứ đều vừa vặn với tôi.\\nChúng tôi đứng lên rất nhiều trong các lớp học khoa học của tôi.\\nCác ngón chân của tôi đã từng bị đau nên bây giờ tôi nhét tất thể thao có đế mềm vào trong ủng.\\nNó thực sự có ích!\\nTôi luôn chọn trang phục vào buổi sáng.\\n\\nSam Tôi ghét việc vội vã khi thức dậy.\\nĐể tiết kiệm thời gian, tôi luôn để đồng phục trên ghế cạnh giường vào buổi tối.\\nNhà tôi khá xa trường đại học và tôi phải đi bộ khoảng 45 phút để đến trường.\\nVì vậy, quần áo của tôi phải dễ dàng di chuyển!\\nChiếc quần đi học màu xám của tôi trông rất sang trọng nhưng lại không thoải mái khi mặc vào.\\nNgay khi bước vào nhà sau giờ học, tôi cởi chúng ra và mặc chiếc quần short mềm mại yêu thích của mình vào.\\n\",\"excelInput\":\"\",\"txtHeadingsList\":\"\",\"mifOptions\":\"A-C\",\"txtTfngMifList\":\"1. Who wears clothes that are bigger than they need to be?\\n2. Who checks the weather before putting their clothes on?\\n3. Who chooses their clothes before they go to sleep?\\n4. Who wears dark clothes so they don’t look dirty?\\n5. Who wears special things on their feet to stay comfortable?\\n6. Who has to walk a long way to get to their school?\\n7. Who changes into different clothes as soon as they arrive home?\",\"txtMatchFeature\":\"\",\"rawQuestions\":\"\",\"bulkKeyInput\":\"1 A   2 B   3 C   4 A   5 B   6 C   7 C\\n\",\"bulkLocInput\":\"\",\"bulkExpInput\":\"\",\"bulkLocExpInput\":\"\",\"qTypeRows\":[{\"type\":\"Matching Information\",\"count\":7}],\"chkDiagram\":false,\"chkFocusMode\":false,\"diagramImgUrl\":\"\",\"txtDiagramQs\":\"\",\"chkHideMifOptions\":true,\"timeLimitInput\":\"20\",\"chkLockOnTimeout\":false,\"chkMatchHeadings\":false,\"chkRemoveOpt\":false,\"chkTfngMif\":true,\"chkMatchFeature\":false,\"chkRemoveFeatureOpt\":false,\"hideMifOptions\":true}},{\"name\":\"Walking Home Through the City\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Leo I always take the same streets after school. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">It isn’t the most beautiful way to go, but it takes the least amount of time to get to my front door. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">I don’t go by the river because that makes the journey much longer. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">My path goes behind the city library and through some small streets. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">I love it because there is almost no traffic, so it is really peaceful. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s5\\\">I prefer not to wear headphones or play any music because I just like to hear the birds singing. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Leo Tôi luôn đi trên những con phố giống nhau sau giờ học. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Đó không phải là con đường đẹp nhất để đi nhưng lại mất ít thời gian nhất để đến được cửa trước của tôi. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Tôi không đi bằng đường sông vì điều đó khiến cuộc hành trình dài hơn nhiều. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Con đường của tôi đi phía sau thư viện thành phố và xuyên qua một số con phố nhỏ. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Tôi thích nó vì hầu như không có xe cộ qua lại nên rất yên bình. \\u003c/span>\\u003cspan id=\\\"p0s5\\\" class=\\\"vi-sent\\\">Tôi không thích đeo tai nghe hay bật bất kỳ bản nhạc nào vì tôi chỉ thích nghe tiếng chim hót. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Mia My walk back takes quite a long time, but I really enjoy it. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">I go through the big park in the centre of town. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">There are so many beautiful flowers and tall green spaces to see! \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">Usually, I meet my neighbours there and we stop to say a quick hello. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s4\\\">It is much friendlier than walking alone. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s5\\\">After the park, I walk down the high street. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s6\\\">I always visit the little store on the corner to pick up a new comic or magazine before I finally go inside my house. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Mia My đi bộ về mất khá nhiều thời gian nhưng tôi thực sự thích thú. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Tôi đi qua công viên lớn ở trung tâm thị trấn. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Có rất nhiều bông hoa đẹp và không gian xanh cao để xem! \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Thông thường, tôi gặp hàng xóm ở đó và chúng tôi dừng lại để chào nhanh. \\u003c/span>\\u003cspan id=\\\"p1s4\\\" class=\\\"vi-sent\\\">Nó thân thiện hơn nhiều so với việc đi bộ một mình. \\u003c/span>\\u003cspan id=\\\"p1s5\\\" class=\\\"vi-sent\\\">Sau công viên, tôi đi bộ xuống đường cao tốc. \\u003c/span>\\u003cspan id=\\\"p1s6\\\" class=\\\"vi-sent\\\">Tôi luôn ghé qua cửa hàng nhỏ ở góc phố để mua một cuốn truyện tranh hoặc tạp chí mới trước khi vào nhà. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Noah When I finish my classes, I immediately put on my headphones. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">I love hearing funny podcasts or audio shows on my mobile while I walk. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">Because of this, I rarely pause to chat with anyone on my journey. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">I usually carry a heavy reading book in my bag, so I don’t go to any shops to get more things. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">The best part of my afternoon is walking next to the long city canal. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">Seeing the boats go up and down is very relaxing, even though the main road next to it is quite loud. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Noah Khi kết thúc buổi học, tôi lập tức đeo tai nghe vào. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Tôi thích nghe những podcast hoặc chương trình âm thanh vui nhộn trên điện thoại di động khi đang đi bộ. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Vì vậy, tôi hiếm khi dừng lại để trò chuyện với bất kỳ ai trên hành trình của mình. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Tôi thường mang theo một cuốn sách đọc nặng trong túi nên tôi không đến bất kỳ cửa hàng nào để mua thêm đồ. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Điều tuyệt vời nhất trong buổi chiều của tôi là đi dạo cạnh con kênh dài của thành phố. \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Nhìn những chiếc thuyền lên xuống rất thư giãn, mặc dù con đường chính bên cạnh khá ồn ào. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"Which person walks past a place to buy something to read?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":1},{\"id\":2,\"type\":\"mif\",\"text\":\"Who says their route is the fastest way back?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"mif\",\"text\":\"Which person walks near some water on their journey?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":3},{\"id\":4,\"type\":\"mif\",\"text\":\"Who stops to talk to people on their walk?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":4},{\"id\":5,\"type\":\"mif\",\"text\":\"Which person thinks their route is very quiet?\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":5},{\"id\":6,\"type\":\"mif\",\"text\":\"Who listens to something while they are walking?\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":6},{\"id\":7,\"type\":\"mif\",\"text\":\"Which person enjoys looking at plants and trees?\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"explanation\":\"\",\"_orderId\":7}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABC\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Leo I always take the same streets after school.\",\"It isn’t the most beautiful way to go, but it takes the least amount of time to get to my front door.\",\"I don’t go by the river because that makes the journey much longer.\",\"My path goes behind the city library and through some small streets.\",\"I love it because there is almost no traffic, so it is really peaceful.\",\"I prefer not to wear headphones or play any music because I just like to hear the birds singing.\"],\"vi\":[\"Leo Tôi luôn đi trên những con phố giống nhau sau giờ học.\",\"Đó không phải là con đường đẹp nhất để đi nhưng lại mất ít thời gian nhất để đến được cửa trước của tôi.\",\"Tôi không đi bằng đường sông vì điều đó khiến cuộc hành trình dài hơn nhiều.\",\"Con đường của tôi đi phía sau thư viện thành phố và xuyên qua một số con phố nhỏ.\",\"Tôi thích nó vì hầu như không có xe cộ qua lại nên rất yên bình.\",\"Tôi không thích đeo tai nghe hay bật bất kỳ bản nhạc nào vì tôi chỉ thích nghe tiếng chim hót.\"]},{\"en\":[\"Mia My walk back takes quite a long time, but I really enjoy it.\",\"I go through the
