    .layout { display: flex; height: 100vh; width: 100vw; }

    .toolbar { height: 50px; background: #fff; border-bottom: 1px solid var(--border); display:flex; align-items:center; padding: 0 20px; font-weight:bold; color: #475569; justify-content: space-between;}
    #frame { flex: 1; width: 100%; border: none; background: #fff; }
    
    .sidebar { 
      width: 320px; background: var(--card); border-left: 1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; padding:15px; box-shadow: -2px 0 8px rgba(0,0,0,0.03); z-index:10; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease, border 0.3s ease; flex-shrink: 0;
    }
    .sidebar h2 { margin-top:0; font-size:17px; color:var(--accent2); padding-bottom:12px; border-bottom:1px solid var(--border); }
    .sidebar.collapsed { width: 0; padding: 0; border-left: none; overflow: hidden; }

    .toggle-btn { background: linear-gradient(90deg, var(--accent1), var(--accent2)); color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(37,117,252,0.15); user-select: none; }
    .toggle-btn:hover { opacity: 0.9; }
    
    ul { list-style: none; padding-left: 15px; margin: 0; }
    ul.root { padding-left: 0; }
    li { margin: 6px 0; }
    .folder-title, .file-title { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; user-select: none; transition: background 0.15s; }
    .folder-title { font-weight: 600; color: #334155; }
    .folder-title:hover { background: #f1f5f9; }
    .file-title { color: #475569; display: flex; align-items: center; gap: 6px;}
    .file-title:hover { background: #e0e7ff; color: #3730a3; }
    .file-title.active { background: var(--accent2); color: #fff; font-weight:bold; }
    
    .folder-children { display: block; }
    .folder-children.collapsed { display: none; }
    .folder-icon::before { content: '📂 '; }
    .folder-title.collapsed .folder-icon::before { content: '📁 '; }

    @media (max-width:768px){ 
      .sidebar { position: absolute; right: -320px; left: auto; height: 100%; transition: right 0.3s ease; width: 320px; }
      .sidebar.open { right: 0; width: 320px; padding: 15px; border-left: 1px solid var(--border); }
      .sidebar.collapsed { right: -320px; }
    }
  </style>

over::before, .g-slot:focus::before, .g-slot.active::before, .g-slot.highlight::before{ opacity:0.55; transform:scale(1); animation: neonPulse 2.6s linear infinite; }\n  .g-slot:hover::after, .g-slot:focus::after, .g-slot.active::after, .g-slot.highlight::after{ opacity:1; animation: neonMove 2.2s linear infinite; }\n  .g-slot.correct::before{ background: linear-gradient(90deg, rgba(16,185,129,0.9), rgba(96,165,250,0.06)); opacity:0.6; filter:blur(10px); }\n  .g-slot.correct::after{ background: linear-gradient(90deg, rgba(16,185,129,0.95), rgba(6,182,212,0.06)); opacity:1; }\n\n  @keyframes neonMove{ 0%{background-position:0% 50%} 100%{background-position:200% 50%} }\n  @keyframes neonPulse{ 0%{filter:blur(6px); opacity:0.45} 50%{filter:blur(12px); opacity:0.7} 100%{filter:blur(6px); opacity:0.45} }\n\n  .g-vie-list{display:flex; flex-wrap:wrap; gap:10px; padding-top:6px;}\n  .g-vie-item{cursor:grab; user-select:none; padding:8px 12px; border-radius:10px; background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.03);}\n  .g-vie-item.dragging{opacity:0.5; transform:scale(0.98);}\n  .g-wrong{animation:shake 300ms; border-color:rgba(239,68,68,0.6);}\n  @keyframes shake{0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)} 100%{transform:translateX(0)}}\n  \n  .g-badge{display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.02); color:var(--muted); font-weight:600;}\n  .confetti{position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index: 3000;}\n  .confetti .piece{position:absolute; width:10px; height:14px; opacity:0; transform:translateY(-20px) rotate(0deg); animation:fall 1200ms linear forwards;}\n  @keyframes fall{0%{opacity:1; transform:translateY(-10vh) rotate(0deg)} 100%{opacity:1; transform:translateY(110vh) rotate(720deg)}}\n  \n  .flash-wrap{perspective:1200px; width:100%; max-width:520px;}\n  .flashcard{width:100%; height:140px; position:relative; transform-style:preserve-3d; transition:transform 600ms cubic-bezier(.2,.9,.3,1); border-radius:12px; cursor:pointer;}\n  .flashcard.flipped{transform:rotateY(180deg);}\n  .flash-face{position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:18px; font-size:18px; text-align:center; box-shadow: 0 6px 18px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.03);}\n  .flash-face.front{background:linear-gradient(180deg, rgba(6,182,212,0.08), rgba(96,165,250,0.03)); color:#e6f9fb;}\n  .flash-face.back{transform:rotateY(180deg); background:linear-gradient(180deg, rgba(16,185,129,0.06), rgba(96,165,250,0.02)); color:#eafff0;}\n\n  .fill-list{display:flex; flex-direction:column; gap:10px;}\n  .fill-row{display:flex; gap:12px; align-items:center;}\n  .fill-row .vie{flex:0 0 48%; min-width:160px; color:var(--muted);}\n  .fill-row input{ flex:1; padding:10px 12px; border-radius:10px; border:1px solid var(--input-muted-border); background: var(--input-muted-bg); color:var(--input-muted-text); transition:box-shadow 180ms, border-color 180ms, background-color 180ms; caret-color: var(--neon-primary); }\n  .fill-row input:focus{ outline:none; border-color: rgba(6,182,212,0.45); box-shadow: 0 6px 18px rgba(6,182,212,0.06); background: rgba(255,255,255,0.025); }\n  .fill-row input.correct{ border-color: rgba(16,185,129,0.7); box-shadow: 0 6px 18px rgba(16,185,129,0.04); background: rgba(16,185,129,0.02); }\n  .fill-row input.wrong{ border-color: rgba(244,63,94,0.7); box-shadow: 0 6px 18px rgba(244,63,94,0.03); background: rgba(244,63,94,0.01); }\n  .correct-answer{color: #10b981; font-size:12px; font-weight:700}\n  .wrong-answer{color: #ef4444; font-size:12px; font-weight:700}\n  \n  @media (max-width:880px){ .g-layout{grid-template-columns:1fr; flex-direction: column;} .g-card{flex-basis:100%; width:100%;} }\n  \n  .mif-inline-box { margin-top: 15px; padding: 12px; background: #eef2ff; border: 1px dashed #a5b4fc; border-radius: 8px; }\n  .mif-inline-btn { display: flex; align-items: flex-start; gap: 8px; background: #fff; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: 0.2s; color: #475569; line-height: 1.4; }\n  .mif-inline-btn:hover { border-color: #6366f1; background: #fafafa; }\n  .mif-inline-btn.selected { background: #6366f1; color: #fff; border-color: #6366f1; box-shadow: 0 2px 4px rgba(99,102,241,0.3); }\n  .mif-inline-btn.selected .q-num-s { color: #fff; }\n  .mif-inline-btn.hidden-by-other { display: none !important; }\n  \n\n/* --- GIAO DIỆN DASHBOARD CARD --- */\n  #dashboard-view { position: fixed; inset: 0; background: #f4f7f6; z-index: 100; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }\n  .dash-title { font-size: 24px; font-weight: 800; color: #0f766e; margin-bottom: 30px; text-transform: uppercase; }\n  .card-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1200px; }\n  .test-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; width: 360px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; display: flex; flex-direction: column; }\n  .test-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }\n  .card-header { display: flex; align-items: center; gap: 10px; color: #115e59; font-weight: 700; font-size: 16px; margin-bottom: 8px; text-transform: uppercase; }\n  .card-desc { color: #64748b; font-size: 13px; text-transform: uppercase; margin-bottom: 20px; line-height: 1.4; flex: 1; }\n  .card-stats { background: #fff1f2; border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; margin-bottom: 20px; }\n  .stat-item { display: flex; align-items: center; gap: 6px; color: #9a3412; font-size: 13px; font-weight: 600; }\n  .card-actions { display: flex; justify-content: space-between; align-items: center; }\n  .btn-tag { background: #e2e8f0; color: #334155; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; border: none; }\n  .btn-tag.pro { background: #fbbf24; color: #000; }\n  .btn-enter { background: #e0f2fe; color: #0369a1; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #bae6fd; transition: 0.2s; display: flex; align-items: center; gap: 4px; }\n  .btn-enter:hover { background: #bae6fd; }\n  /* Ẩn thanh Top Bar và Container lúc ở sảnh chờ */\n  body.in-dashboard .top-bar, body.in-dashboard .container { display: none !important; }\n  \n  /* Thêm vào sau đoạn CSS Dashboard đã hướng dẫn trước đó */\n  .back-btn { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 13px; transition: 0.2s; }\n  .back-btn:hover { background: #e2e8f0; color: #1e293b; }\n  #lesson-selector { display: none !important; } /* Ẩn combo box cũ ở góc trái */\n  \n  /* Thiết kế khung chứa và các thẻ loại câu hỏi */\n  .q-types-box { background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 8px; padding: 10px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 6px; flex: 1; align-content: flex-start; }\n  .q-tag { background: #fff; border: 1px solid #e2e8f0; color: #475569; font-size: 11px; padding: 4px 8px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); display: flex; align-items: center; gap: 4px; font-weight: 600; }\n  .q-tag-count { background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 700; }\n\n/* --- Style cho MCQ Option mới --- */\n  .mcq-option {\n      display: flex; align-items: center; padding: 8px 12px; margin-bottom: 5px;\n      border: 1px solid : 12px 30px; border-radius: 30px; font-weight: 800; border: none; cursor: pointer; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(139,92,246,0.3); font-size: 15px; text-transform: uppercase; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;}\n.btn-skill-dash:hover { transform: scale(1.02); box-shadow: 0 6px 15px rgba(139,92,246,0.4); }\n  \n</style></head>\n<body>\n<div id=\"dashboard-view\">\n    <div class=\"dash-title\">DANH SÁCH BÀI TẬP</div>\n    <div class=\"card-container\" id=\"card-render-area\"></div>\n</div>\n<div id=\"hl-toolbar\">\n  <button class=\"hl-btn-item\" onmousedown=\"applyHighlight(event)\">Highlight</button>\n  <button class=\"hl-btn-item\" onmousedown=\"applyNote(event)\">Note</button>\n  <button class=\"hl-btn-item\" onmousedown=\"applyTranslate(event)\" style=\"background: #0ea5e9; border-left: 1px solid #475569;\">Dịch (Google)</button>\n  <button id=\"vocab-popup\" class=\"hidden absolute bg-green-600 text-white px-2 py-1 rounded text-xs shadow z-50 cursor-pointer hover:bg-green-700 transition\">Add to Vocab</button>\n</div>\n\n<div class=\"top-bar\">\n    <div style=\"display:flex;align-items:center;gap:12px; flex:1;\">\n        <button class=\"back-btn\" onclick=\"goBackToDashboard()\">\n            <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"15 18 9 12 15 6\"></polyline></svg>\n            QUAY LẠI\n        </button>\n        \n        <button id=\"toggle-sidebar-btn\" class=\"back-btn\" style=\"display:none; background:#e0f2fe; color:#0369a1; border-color:#bae6fd;\" onclick=\"toggleSkillSidebar()\">\n            <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\"></line><line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\"></line><line x1=\"3\" y1=\"18\" x2=\"21\
